<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#14172A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Real Living CRM">
<title>Real Living CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,450;0,9..144,550;0,9..144,650;1,9..144,450&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F4F0; --panel:#FFFFFF; --panel2:#EEECE5; --raise:#FFFFFF;
  --line:rgba(30,34,48,.11); --line2:rgba(150,116,44,.40); --goldsoft:rgba(169,129,47,.09);
  --gold:#B08A36; --gold2:#8F6E24; --goldhi:#E3C685;
  --ink:#1E2230; --cream:#1E2230; --mut:#7D8190;
  --green:#557F3F; --red:#AE4B37; --blue:#3B6C86;
  --disp:"Fraunces",Georgia,serif; --body:"Outfit",system-ui,-apple-system,sans-serif;
  --shadow:0 1px 2px rgba(22,26,40,.05),0 6px 20px rgba(22,26,40,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--body);font-weight:400;font-size:14.5px;-webkit-font-smoothing:antialiased}
h1,h2,h3,.disp{font-family:var(--disp);font-weight:550;letter-spacing:-.012em}
button{font-family:var(--body);cursor:pointer}
input,select,textarea{font-family:var(--body);font-size:14px;background:#fff;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:9px 11px;width:100%;font-weight:400}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold)}
label{display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin:12px 0 5px}
::placeholder{color:#B3A98F}
a{color:var(--gold2)}
.btn{background:linear-gradient(180deg,var(--goldhi),#C29B4B);color:#2A2210;border:none;border-radius:6px;padding:10px 18px;font-weight:500;letter-spacing:.04em;font-size:13px;box-shadow:var(--shadow)}
.btn:hover{filter:brightness(1.04)}
.btn.ghost{background:#fff;color:var(--gold2);border:1px solid var(--line2);box-shadow:none}
.btn.ghost:hover{background:var(--goldsoft)}
.btn.small{padding:6px 12px;font-size:12px}
.btn.danger{background:#fff;border:1px solid rgba(179,80,60,.5);color:var(--red);box-shadow:none}
/* ---------- login ---------- */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:
  radial-gradient(1100px 550px at 70% -10%,rgba(200,160,80,.14),transparent 60%),var(--bg);z-index:50}
.login-card{width:min(400px,92vw);background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:38px 34px;box-shadow:var(--shadow)}
.wordmark{font-family:var(--disp);font-size:30px;color:var(--gold2);line-height:1.05}
.wordmark span{display:block;font-size:12px;font-family:var(--body);font-weight:400;letter-spacing:.34em;text-transform:uppercase;color:var(--mut);margin-top:7px}
.login-err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}
.login-hint{margin-top:18px;border-top:1px solid var(--line);padding-top:14px;font-size:12px;color:var(--mut);line-height:1.7}
.login-hint b{color:var(--gold2);font-weight:500}
/* ---------- shell ---------- */
#app{display:none;height:100%}
#app.on{display:grid;grid-template-columns:222px 1fr;grid-template-rows:58px 1fr;height:100vh}
#side{grid-row:1/3;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:20px 0}
#side .wordmark{font-size:22px;padding:0 20px 18px;border-bottom:1px solid var(--line)}
#side .wordmark span{letter-spacing:.26em;font-size:10px;margin-top:5px}
nav{flex:1;padding:10px 10px;overflow:auto}
.nav-sec{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut);padding:16px 12px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;color:#6E6555;font-size:14px;font-weight:400;cursor:pointer;margin-bottom:2px;border:1px solid transparent}
.nav-item svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.6;flex:none}
.nav-item:hover{color:var(--ink)}
.nav-item.on{color:var(--gold2);background:var(--goldsoft);border-color:var(--line2)}
#whoami{padding:14px 20px;border-top:1px solid var(--line);font-size:13px}
#whoami .nm{color:var(--ink);font-weight:400}
#whoami .rl{color:var(--gold2);font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
#top{grid-column:2;display:flex;align-items:center;gap:14px;padding:0 22px;border-bottom:1px solid var(--line);background:var(--panel)}
#crumb{font-family:var(--disp);font-size:21px;color:var(--ink);white-space:nowrap}
#gsearch{position:relative;margin-left:auto;width:min(340px,40vw)}
#gsearch input{padding-left:34px;border-radius:20px;background:var(--panel2);border-color:transparent}
#gsearch input:focus{border-color:var(--gold);background:#fff}
#gsearch svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--mut);fill:none;stroke-width:2}
#gresults{position:absolute;top:110%;left:0;right:0;background:#fff;border:1px solid var(--line2);border-radius:8px;max-height:320px;overflow:auto;display:none;z-index:30;box-shadow:var(--shadow)}
#gresults .gr{padding:10px 12px;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px}
#gresults .gr:hover{background:var(--goldsoft)}
#gresults .gr small{display:block;color:var(--mut);margin-top:2px}
#main{grid-column:2;overflow:auto;padding:24px 26px 60px}
/* ---------- shared ---------- */
.grid{display:grid;gap:14px}
.cards4{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.card{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:18px 20px;box-shadow:var(--shadow)}
.card{transition:box-shadow .16s ease}
table tr.rowlink:hover td{background:rgba(176,138,54,.05)}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
.card.click{cursor:pointer}
.card.click:hover{border-color:var(--line2)}
.card .eyebrow{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut)}
.card .big{font-family:var(--disp);font-size:31px;color:var(--gold2);margin-top:6px;line-height:1}
.card .sub{font-size:12.5px;color:var(--mut);margin-top:7px}
.card .sub b{color:var(--ink);font-weight:400}
.sect{margin-top:26px}
.sect-head{display:flex;align-items:baseline;gap:12px;margin-bottom:12px}
.sect-head h2{font-size:22px}
.sect-head .cnt{color:var(--mut);font-size:13px}
.sect-head .spacer{flex:1}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);font-weight:500;text-align:left;padding:8px 12px;border-bottom:1px solid var(--line2)}
td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
tr.rowlink{cursor:pointer}
tr.rowlink:hover td{background:var(--goldsoft)}
.tag{display:inline-block;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--line2);color:var(--gold2);border-radius:20px;padding:2px 9px;white-space:nowrap;background:#fff}
.tag.gr{color:var(--green);border-color:rgba(95,138,71,.45)}
.tag.rd{color:var(--red);border-color:rgba(179,80,60,.45)}
.tag.bl{color:var(--blue);border-color:rgba(63,112,137,.45)}
.money{font-variant-numeric:tabular-nums;color:var(--gold2)}
.mut{color:var(--mut)}
.empty{border:1px dashed var(--line2);border-radius:10px;padding:30px;text-align:center;color:var(--mut);font-size:14px;background:transparent}
/* ---------- ribbon (signature) ---------- */
#ribbon{margin-top:18px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:18px 20px;box-shadow:var(--shadow)}
#ribbon .bar{display:flex;height:14px;border-radius:8px;overflow:hidden;margin:12px 0 10px;border:1px solid var(--line)}
#ribbon .seg{height:100%}
#ribbon .legend{display:flex;flex-wrap:wrap;gap:16px;font-size:12.5px;color:var(--mut)}
#ribbon .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px}
/* ---------- kanban ---------- */
.pipetabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.pipetab{border:1px solid var(--line2);background:#fff;color:#6E6555;border-radius:20px;padding:7px 15px;font-size:13px;font-weight:400}
.pipetab.on{color:#2A2210;background:linear-gradient(180deg,var(--goldhi),#C29B4B);border-color:transparent;font-weight:500}
#board{display:flex;gap:12px;overflow-x:auto;padding-bottom:14px;align-items:flex-start}
.col{min-width:236px;width:236px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;flex:none}
.col.dragover{border-color:var(--gold)}
.col-h{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;border-bottom:1px solid var(--line)}
.col-h .st{font-size:11.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--gold2)}
.col-h .n{font-size:12px;color:var(--mut)}
.col-b{padding:9px;min-height:52px;display:flex;flex-direction:column;gap:8px}
.dcard{background:#fff;border:1px solid var(--line);border-radius:8px;padding:11px 12px;cursor:pointer;box-shadow:0 1px 2px rgba(50,38,14,.06)}
.dcard:hover{border-color:var(--line2)}
.dcard .t{font-size:14px;font-weight:400;color:var(--ink)}
.dcard .s{font-size:12px;color:var(--mut);margin-top:4px}
.dcard .r{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:12px}
.dcard .link3{font-size:10.5px;color:var(--blue);letter-spacing:.06em;margin-top:6px}
/* ---------- profile ---------- */
.back{background:none;border:none;color:var(--mut);font-size:13px;padding:0;margin-bottom:14px;display:inline-flex;align-items:center;gap:6px}
.back:hover{color:var(--gold2)}
.prof-head{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.prof-head h1{font-size:34px;line-height:1.05}
.prof-head .meta{color:var(--mut);font-size:13.5px;margin-top:7px;line-height:1.8}
.prof-head .meta b{color:var(--ink);font-weight:400}
.two{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;align-items:start}
@media(max-width:980px){.two{grid-template-columns:1fr}}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:2px 18px}
.kv div{padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.kv div small{display:block;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin-bottom:3px}
.tl{list-style:none;max-height:420px;overflow:auto}
.tl li{padding:10px 0 10px 16px;border-left:1px solid var(--line2);position:relative;font-size:13.5px}
.tl li::before{content:"";position:absolute;left:-4px;top:16px;width:7px;height:7px;border-radius:50%;background:var(--gold)}
.tl li small{display:block;color:var(--mut);font-size:11.5px;margin-top:3px}
.doc{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.deal-row{display:flex;justify-content:space-between;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:11px 13px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 2px rgba(50,38,14,.05)}
.deal-row:hover{border-color:var(--line2)}
.deal-row .a{font-size:14px}.deal-row .a small{display:block;color:var(--mut);font-size:12px;margin-top:2px}
/* ---------- drawer & modal ---------- */
#ovl{position:fixed;inset:0;background:rgba(46,36,18,.32);display:none;z-index:60}
#drawer{position:fixed;top:0;right:-600px;width:min(560px,94vw);height:100%;background:var(--panel);border-left:1px solid var(--line2);z-index:61;transition:right .22s ease;overflow:auto;padding:26px 24px 50px;box-shadow:-6px 0 24px rgba(50,38,14,.10)}
#drawer.on{right:0}
#drawer h2{font-size:24px;margin-bottom:2px}
#drawer .close,#modal .close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--mut);font-size:22px;line-height:1}
#modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.97);width:min(520px,94vw);max-height:90vh;overflow:auto;background:var(--panel);border:1px solid var(--line2);border-radius:14px;padding:26px 26px 30px;z-index:62;display:none;box-shadow:var(--shadow)}
#modal.on{display:block;transform:translate(-50%,-50%)}
#modal h2{font-size:24px;margin-bottom:4px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid var(--gold);color:var(--ink);border-radius:8px;padding:11px 20px;font-size:13.5px;z-index:70;display:none;box-shadow:var(--shadow)}
/* ---------- dots / scoreboard / chart / appts ---------- */
.dots{display:inline-flex;gap:3px;align-items:center;vertical-align:middle}
.dots i{width:8px;height:8px;border-radius:50%;background:#E7E0CE;display:inline-block;flex:none}
.dots i.on.g{background:var(--green)}.dots i.on.a{background:#C9992F}.dots i.on.r{background:var(--red)}
.dots .plus{font-size:11px;color:var(--mut);margin-left:4px;white-space:nowrap}
.sdot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:baseline}
.sdot.g{background:var(--green)}.sdot.a{background:#C9992F}.sdot.r{background:var(--red)}
.kpirow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13.5px;flex-wrap:wrap}
.kpirow .lab{min-width:170px}.kpirow .lab small{display:block;color:var(--mut);font-size:11.5px;margin-top:1px}
.kpirow .val{font-family:var(--disp);font-size:19px;color:var(--gold2);min-width:70px;text-align:right}
.chart{display:flex;gap:8px;align-items:stretch;height:170px;margin-top:14px}
.cmon{flex:1;display:flex;flex-direction:column;min-width:0}
.cbar{flex:1;display:flex;flex-direction:column;justify-content:flex-end}
.cbar div{border-radius:2px;margin-top:1px}
.clab{text-align:center;font-size:11px;color:var(--mut);margin-top:6px;letter-spacing:.06em}
.ctot{text-align:center;font-size:11px;color:var(--gold2);margin-bottom:4px;font-variant-numeric:tabular-nums}
.appt{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.appt.done .who{text-decoration:line-through;color:var(--mut)}
.appt .when{min-width:86px;text-align:center;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:11.5px;color:var(--gold2);line-height:1.4}
.appt .when b{display:block;font-family:var(--disp);font-size:16px;color:var(--ink);font-weight:600}
.appt .who{flex:1}.appt .who small{display:block;color:var(--mut);font-size:12px;margin-top:1px}
.appt button{flex:none}
/* ---------- owner dashboard modules ---------- */
.delta{font-size:11px;border-radius:12px;padding:2px 8px;margin-left:8px;vertical-align:4px;font-family:var(--body);font-weight:400;letter-spacing:.02em;white-space:nowrap}
.delta.up{color:var(--green);background:rgba(95,138,71,.12)}
.delta.dn{color:var(--red);background:rgba(179,80,60,.10)}
.delta.z{color:var(--mut);background:var(--panel2)}
.card.mini{padding:14px 16px}.card.mini .big{font-size:24px}
.hbar{display:flex;align-items:center;gap:12px;margin:11px 0}
.hbar .hl{width:110px;font-size:12.5px;color:var(--mut);text-align:right}
.hbar .ht{flex:1;background:var(--panel2);border-radius:6px;height:20px;overflow:hidden}
.hbar .hf{height:100%;border-radius:6px 0 0 6px}
.hbar .hv{width:74px;font-size:13px;font-variant-numeric:tabular-nums}
.donutwrap{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
.donut{width:140px;height:140px;border-radius:50%;position:relative;flex:none}
.donut::after{content:"";position:absolute;inset:24%;background:var(--panel);border-radius:50%;box-shadow:inset 0 0 0 1px var(--line)}
.dlegend{font-size:13px;line-height:2.1}
.dlegend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:8px}
.dash-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.dash-head h2{font-size:26px}
.dash-head select{width:auto;padding:7px 30px 7px 12px}
.dash-head .mo{color:var(--mut);font-size:13px;letter-spacing:.08em;text-transform:uppercase}
.velsum{color:var(--mut);font-size:12.5px}
.foldbtn{background:none;border:none;color:var(--mut);font-size:13px;padding:2px 8px;line-height:1}
.foldbtn:hover{color:var(--gold2)}
.warn-cnt{font-size:11px;border-radius:12px;padding:2px 9px;background:rgba(179,80,60,.12);color:var(--red);letter-spacing:.04em}
.allclear{display:flex;align-items:center;gap:10px;color:var(--green);font-size:13.5px}
/* ---------- manus-style: dark sidebar, kpi cards, insets ---------- */
#side{background:linear-gradient(178deg,#171B31 0%,#12152A 46%,#101322 100%);border-right:none}
#side .wordmark{color:#E7CB8B;border-bottom:1px solid rgba(255,255,255,.08)}
#side .wordmark span{color:#7A7F99}
.nav-sec{color:#6D7189}
.nav-item{color:#9AA0B8}
.nav-item:hover{color:#fff}
.nav-item.on{color:#F1E6C8;background:rgba(231,203,139,.09);border-color:transparent;position:relative}
.nav-item.on::before{content:'';position:absolute;left:-12px;top:7px;bottom:7px;width:3px;border-radius:0 3px 3px 0;background:linear-gradient(180deg,var(--goldhi),var(--gold))}
#whoami{border-top:1px solid rgba(255,255,255,.08)}
#whoami .nm{color:#fff}
#whoami .rl{color:#C9A45C}
#whoami label{color:#6D7189}
#whoami select{background:#1D2136;border-color:rgba(255,255,255,.14);color:#E8E4D8}
#whoami .btn.ghost{border-color:rgba(255,255,255,.2);color:#E7CB8B;background:transparent}
.pill{border:1px solid var(--line2);color:var(--gold2);border-radius:16px;padding:4px 13px;font-size:12px;white-space:nowrap}
.kpi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.icobox{width:34px;height:34px;border-radius:9px;background:var(--panel2);display:flex;align-items:center;justify-content:center;flex:none}
.icobox svg{width:16px;height:16px;stroke:var(--gold2);fill:none;stroke-width:1.7}
.subsel{border:none;background:transparent;color:var(--mut);padding:3px 24px 3px 0;font-size:13px;width:auto;cursor:pointer}
.subsel:focus{border:none}
.vhead{display:flex;align-items:center;gap:11px;margin-bottom:13px}
.vhead .t{font-weight:500;font-size:14.5px;line-height:1.3}
.vhead .t small{display:block;color:var(--mut);font-size:12px;font-weight:300}
.insets{display:flex;gap:10px}
.inset{background:var(--panel2);border-radius:9px;padding:11px 14px;flex:1}
.inset .n{font-family:var(--disp);font-size:22px;color:var(--ink);line-height:1.1}
.inset .l{font-size:11px;color:var(--mut);margin-top:3px;letter-spacing:.04em}
#tip{position:fixed;z-index:80;background:#fff;border:1px solid var(--line2);box-shadow:var(--shadow);border-radius:9px;padding:10px 13px;font-size:12.5px;max-width:290px;pointer-events:none;display:none;line-height:1.55}
#tip .tt{font-weight:500;font-size:13px;color:var(--ink);margin-bottom:5px}
#tip .tr{display:flex;justify-content:space-between;gap:16px;color:var(--mut)}
#tip .tr b{color:var(--ink);font-weight:500}
#tip .money{color:var(--gold2)}
[data-tip]{cursor:pointer}
/* ---------- 360 record components ---------- */
.avatar{width:52px;height:52px;border-radius:50%;background:#14172A;color:#E7CB8B;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-size:20px;flex:none}
.prof3{display:grid;grid-template-columns:290px 1fr 320px;gap:16px;margin-top:20px;align-items:start}
@media(max-width:1150px){.prof3{grid-template-columns:1fr}}
.stepper{display:flex;gap:5px;margin:14px 0 6px}
.stepper .step{flex:1;height:8px;border-radius:4px;background:var(--line);transition:background .15s}
.stepper .step.on{background:var(--gold2)}
.stepper .step.next{cursor:pointer}
.stepper .step.next:hover{background:#D8C89E}
.stagenow{font-size:12.5px;color:var(--mut);margin-bottom:4px}
.ttabs{display:flex;gap:6px;margin:2px 0 12px;flex-wrap:wrap}
.ttab{border:1px solid var(--line2);background:transparent;border-radius:16px;padding:4px 12px;font-size:12px;color:var(--mut);cursor:pointer;font-family:var(--body)}

.cald{background:var(--panel);border:1px solid var(--line2);border-radius:9px;min-height:96px;padding:7px 8px;position:relative}
.cald.dim{opacity:.42}
.cald.today{border-color:var(--gold2);box-shadow:0 0 0 1px var(--gold2) inset}
.cald .dnum{font-size:12px;color:var(--mut);margin-bottom:5px}
.cald.today .dnum{color:var(--gold2);font-weight:500}
.cald .addday{position:absolute;top:5px;right:7px;color:var(--mut);cursor:pointer;font-size:14px;opacity:0;transition:opacity .12s}
.cald:hover .addday{opacity:1}
.calchip{font-size:11px;line-height:1.35;padding:3px 6px 3px 8px;border-radius:5px;background:var(--panel2);margin-bottom:4px;cursor:pointer;border-left:3px solid var(--gold2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.calchip small{color:var(--mut)}
.calchip.done{opacity:.5;text-decoration:line-through}

.minical .md:hover{background:var(--panel2)}
.minical .md.dim{color:#C9C2B4}
.minical .md.today{background:var(--gold2);color:#fff}

.minical .md.today .dot{background:#fff}

.fugroup.od{color:var(--red)}.fugroup.od b{color:var(--red)}

.cdir{width:24px;height:24px;border-radius:50%;background:var(--goldsoft);color:var(--gold2);display:inline-flex;align-items:center;justify-content:center;font-size:13px;flex:none;margin-right:2px}

/* ---------- pipeline velocity ---------- */
const maxStage=d=>Math.max(d.stage,...(d.hist||[]).map(h=>h.s));
function vVelocity(){
  if(!myPipes().includes(velPipe))velPipe=myPipes()[0];
  const all=S.deals.filter(d=>d.pipe===velPipe);
  const stages=PIPES[velPipe].stages;
  const rows=stages.map((st,i)=>{
    const reached=all.filter(d=>maxStage(d)>=i).length;
    const advanced=all.filter(d=>maxStage(d)>i).length;
    let days=[];
    all.forEach(d=>{(d.hist||[]).forEach((hh,k)=>{if(hh.s===i){
      const nxt=d.hist[k+1]?new Date(d.hist[k+1].at):(d.stage===i?new Date():null);
      if(nxt)days.push((nxt-new Date(hh.at))/864e5);}})});
    const avg=days.length?Math.round(days.reduce((a,b)=>a+b,0)/days.length):0;
    const inNow=all.filter(d=>d.stage===i).length;
    return {st,inNow,avg,conv:i<stages.length-1?(reached?Math.round(100*advanced/reached):null):null,
      btl:i<stages.length-1&&avg>30&&inNow>0};
  });
  const act=all.filter(d=>!isFinal(d));
  const avgDwell=act.length?Math.round(act.map(d=>{const last=d.hist&&d.hist.length?d.hist[d.hist.length-1].at:d.createdAt;return (Date.now()-new Date(last))/864e5}).reduce((a,b)=>a+b,0)/act.length):0;
  const btls=rows.filter(r=>r.btl).length;
  if(folded('vel'))return '<div class="sect"><div class="sect-head"><h2>Pipeline velocity</h2><span class="spacer"></span>'+foldBtn('vel')+'</div></div>';
  return '<div class="sect"><div class="sect-head"><h2>Pipeline velocity</h2>'+foldBtn('vel')+
    '<span class="velsum"><b>'+act.length+'</b> active · <b>'+avgDwell+'d</b> avg time in current stage · <b>'+btls+'</b> bottleneck'+(btls===1?'':'s')+'</span><span class="spacer"></span>'+
    '<select style="width:auto;padding:6px 28px 6px 10px" onchange="velPipe=this.value;refresh()">'+
    myPipes().map(p=>'<option value="'+p+'"'+(velPipe===p?' selected':'')+'>'+PIPES[p].name+'</option>').join('')+'</select></div>'+
    '<div class="card" style="padding:0;overflow:auto"><table><tr><th>Stage</th><th>In stage now</th><th>Avg time in stage</th><th>Conversion to next</th></tr>'+
    rows.map(r=>'<tr><td>'+r.st+(r.btl?' <span class="tag rd" style="margin-left:6px">Bottleneck</span>':'')+'</td><td>'+r.inNow+'</td><td>'+r.avg+'d</td><td>'+(r.conv===null?'<span class="mut">—</span>':r.conv+'%')+'</td></tr>').join('')+
    '</table></div><div class="mut" style="font-size:12px;margin-top:10px">Conversion = share of deals that ever reached a stage and moved past it. Bottleneck = deals sitting 30+ days.</div></div>';
}
/* ---------- cross-sell radar: incomplete multi-business journeys ---------- */
function opportunities(){
  /* clients being sold more than one product at once — highest-cost, highest-value, nurture hardest */
  const out=[];
  S.clients.forEach(c=>{
    const open=S.deals.filter(x=>x.clientId===c.id&&!isFinal(x)&&x.pipe!=='h2m_acq');
    if(open.length<2)return;
    const pipes=[...new Set(open.map(x=>x.pipe))];
    if(pipes.length<2)return;
    const bizs=[...new Set(open.map(x=>PIPES[x.pipe].biz))];
    const value=open.reduce((a,x)=>a+(x.revenue||0),0);
    const agents=[...new Set(open.map(x=>U(x.agentId).name))];
    const won=S.deals.filter(x=>x.clientId===c.id&&isWon(x)&&x.pipe!=='h2m_acq').length;
    out.push({key:c.id+':multi',cid:c.id,pipes,bizs,value,agents,won,
      deals:open.sort((a,b)=>b.stage-a.stage),
      t:c.name,
      s:bizs.map(b=>BIZ[b]).join(' + ')+' · '+open.length+' open deals'+(won?' · '+won+' already closed':'')});
  });
  out.sort((a,b)=>(b.bizs.length-a.bizs.length)||(b.value-a.value));
  let res=out.filter(o=>!(S.dismissed||[]).includes(o.key));
  if(me.role==='agent')res=res.filter(o=>o.deals.some(d=>d.agentId===me.id));
  else if(me.role==='manager')res=res.filter(o=>o.deals.some(d=>allowedPipes(me).includes(d.pipe)));
  return res;
}

function PB(key){return (S.playbooks&&S.playbooks[key])||PLAYBOOKS[key]}

function firePlaybook(key,c,who,propLabel){
  if(S.targets.autoPlan===false)return;

  if(c&&S.tasks.some(t=>t.clientId===c.id&&t.plan==='pb-'+key&&!t.done))return; /* no doubles */
  const fn=c?(c.name||'').split(' ')[0]:'the seller';
  PB(key).forEach(p=>{const t={id:uid('t'),
    title:p.t.replace(/\{first\}/g,fn).replace(/\{prop\}/g,propLabel||'the property'),
    clientId:c?c.id:null,agentId:who,
    due:new Date(Date.now()+p.off*864e5).toISOString().slice(0,10),done:false,createdAt:new Date().toISOString(),by:me.id==='admin'?realUid():me.id,plan:'pb-'+key};
    if(p.auto&&S.targets.autoText===true){t.auto=p.auto;t.tpl=p.tpl;}

function actState(d){
  if(isLost(d))return ['x','Closed out — '+(d.lostReason||'not moving forward')];

  const ts=S.tasks.filter(t=>t.clientId===d.clientId&&!t.done);
  if(ts.some(t=>t.due<today))return ['r','Overdue task — needs action'];
  const hasNext=ts.length||S.appts.some(a=>a.clientId===d.clientId&&!a.done&&new Date(a.dt)>=new Date(NOW().toDateString()));
  return hasNext?['g','Next step scheduled']:['x','Nothing scheduled — add a task'];
}

function doCloseOut(id,stage){
  const d=D(id);if(!d)return;
  const g=x=>{const e=document.getElementById(x);return e?e.value:''};
  const kind=g('co-kind'), notes=g('co-notes').trim();
  if(!notes){document.getElementById('co-err').textContent='Add a short note explaining what happened.';return}
  const c=d.clientId?C(d.clientId):null;
  if(kind==='sold'){
    d.soldWhat=g('co-what')||d.type;
    d.soldAddress=g('co-addr')||d.propInterest||'';
    if(g('co-prop'))d.propertyId=g('co-prop');
    if(!hideMoney()){
      if(g('co-price'))d.budget=parseFloat(g('co-price'))||0;
      if(canSetNumbers()&&g('co-rev'))d.revenue=parseFloat(g('co-rev'))||0;
      d.titleOffice=g('co-title')||d.titleOffice||'';
    }
    if(!canSetNumbers()){d.needsNumbers=true;d.revenue=d.revenue||0;}
    d.closeDate=g('co-date')||new Date().toISOString().slice(0,10);
    d.outcome='sold';d.lost=false;
    d.closedAt=new Date(d.closeDate+'T16:00:00Z').toISOString();
    d.closeNote=notes;
    moveStage(d,stage,true);
    logAct(d.id,d.clientId,'SOLD — '+d.soldWhat+(d.soldAddress?' · '+d.soldAddress:'')+(hideMoney()?'':' · revenue '+money(d.revenue))+'. '+notes);
    if(c){
      c.pastClient=true;
      const stillOpen=S.deals.some(x=>x.clientId===c.id&&x.id!==d.id&&!isFinal(x));
      if(!stillOpen)c.dormant=true;
    }
    if(d.needsNumbers){
      const owner=S.users.find(u=>u.role==='owner')||S.users[0];
      S.tasks.push({id:uid('t'),title:'💵 Enter the numbers — '+(c?c.name:dealTitle(d))+' · '+(d.soldWhat||d.type),
        who:owner?owner.id:'u1',agentId:owner?owner.id:'u1',clientId:d.clientId,dealId:d.id,plan:'numbers',
        due:new Date().toISOString().slice(0,10),done:false,createdAt:new Date().toISOString()});
      logAct(d.id,d.clientId,'Sale recorded by '+me.name+' — numbers pending from ownership.');
      toast('Closed as sold — ownership has been asked to enter the numbers');
    } else toast('Closed as sold — volume and commission recorded');
  } else if(kind==='lost'){
    d.lost=true;d.outcome='lost';d.lostReason=g('co-reason');d.closeNote=notes;
    d.closedAt=new Date().toISOString();d.revenue=0;
    logAct(d.id,d.clientId,'Closed out — '+d.lostReason+'. '+notes);
    if(c){
      c.dormant=true;
      const killed=S.tasks.filter(t=>t.clientId===c.id&&!t.done);
      killed.forEach(t=>{const i=S.tasks.indexOf(t);if(i>-1)S.tasks.splice(i,1)});
    }
    toast('Closed out and parked as dormant — nothing deleted');
  } else {
    const fu=g('co-follow');
    logAct(d.id,d.clientId,'Still waiting — '+notes);
    S.tasks.push({id:uid('t'),title:'Follow up — '+(c?c.name:dealTitle(d))+' (waiting)',who:d.agentId,agentId:d.agentId,clientId:d.clientId,due:fu||new Date().toISOString().slice(0,10),done:false,createdAt:new Date().toISOString()});
    toast('Left open — follow-up set for '+fdate(fu));
  }
  save();closeAll();refresh();
}

function moveStage(d,stage,fromCloseOut){
  if(d.stage===stage)return;
  const from=PIPES[d.pipe].stages[d.stage],to=PIPES[d.pipe].stages[stage];
  d.stage=stage;
  (d.hist=d.hist||[{s:0,at:d.createdAt}]).push({s:stage,at:new Date().toISOString()});
  if(isFinal(d)&&!d.closedAt)d.closedAt=new Date().toISOString();
  if(!isFinal(d)&&d.closedAt)delete d.closedAt;
  logAct(d.id,d.clientId,'Moved '+PIPES[d.pipe].name+' deal: '+from+' → '+to+'.');
  if(isWon(d)&&/closed|won|sold|servicing/i.test(to)&&!/lost|dead/i.test(to))reviewAsk(d);
  save();if(!fromCloseOut)toast('Moved to '+to);
}

function reviewAsk(d){
  const c=C(d.clientId);if(!c)return;
  if(S.tasks.some(t=>t.clientId===c.id&&t.plan==='review'))return; /* once per client */
  const who=d.agent||me.id;
  S.tasks.push({id:uid('t'),title:'⭐ Request a Google review from '+c.name+' — just closed!',who,clientId:c.id,
    due:new Date(Date.now()+86400000).toISOString().slice(0,10),done:false,createdAt:new Date().toISOString(),plan:'review'});
  const link=(S.targets&&S.targets.reviewLink)||'';

const PHOTO_BUCKET='property-photos';
/* Storage writes need a real Supabase session. The admin password door doesn't create one,
   so uploads silently failed with an RLS error — say so in plain words instead. */
async function storageReady(){
  if(!CLOUD||!sb)return 'This copy of the CRM is running offline — open it from the Business Suite to upload files.';
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(!session)return 'Uploads need your Business Suite login. You came in through the admin door, so there\'s no file access on this session — sign in at the portal (or paste image links under Edit property).';
  }catch(e){return 'Could not check your login: '+(e.message||e)}
  return null;
}
const MIME_BY_EXT={jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',webp:'image/webp',gif:'image/gif',heic:'image/heic',heif:'image/heif',bmp:'image/bmp',tif:'image/tiff',tiff:'image/tiff'};
function guessMime(f){
  if(f.type&&/^image\//.test(f.type))return f.type;
  const ext=(f.name||'').split('.').pop().toLowerCase();
  return MIME_BY_EXT[ext]||'';
}
function uploadHint(msg){
  const m=(msg||'').toLowerCase();
  if(m.indexOf('row-level security')>-1||m.indexOf('unauthorized')>-1||m.indexOf('jwt')>-1)
    return 'Your login doesn\'t have file access — sign in again at the Business Suite front door.';
  if(m.indexOf('exceeded the maximum allowed size')>-1||m.indexOf('payload too large')>-1)
    return 'That photo is over the 50MB limit — send a smaller version.';
  if(m.indexOf('bucket not found')>-1)return 'The photo library is missing on the server — tell Claude and it gets fixed.';
  if(m.indexOf('mime')>-1)return 'That file type isn\'t accepted — use a JPG, PNG or HEIC.';
  return msg;
}
async function addPhotos(pid,input){
  const p=P(pid);if(!p||!canEditProps())return;
  const files=[...(input.files||[])];if(!files.length)return;
  const blocked=await storageReady();
  if(blocked){toast(blocked);input.value='';return}
  p.photos=p.photos||[];let done=0,failed=0,lastErr='';
  for(const f of files){
    const mime=guessMime(f);
    if(!mime){toast('"'+f.name+'" doesn\'t look like a photo — skipped');failed++;continue}
    toast('Uploading '+(done+failed+1)+' of '+files.length+' — '+f.name);
    const path=pid+'/'+Date.now()+'-'+Math.random().toString(36).slice(2,7)+'-'+f.name.replace(/[^A-Za-z0-9._-]/g,'_').slice(-60);
    let error=null;
    try{
      const res=await sb.storage.from(PHOTO_BUCKET).upload(path,f,{contentType:mime,upsert:true});
      error=res.error;
    }catch(e){error={message:String(e&&e.message||e)}}
    if(error){lastErr=uploadHint(error.message);failed++;continue}
    const {data}=sb.storage.from(PHOTO_BUCKET).getPublicUrl(path);
    if(data&&data.publicUrl){p.photos.push(data.publicUrl);done++}else{failed++;lastErr='Uploaded but could not read the link back.'}
  }
  p.photo=p.photos[0]||null;
  if(done)logAct(null,null,done+' photo'+(done>1?'s':'')+' added to '+p.address+' by '+me.name+'.');
  input.value='';
  if(done)save();
  go('prop',pid);
  toast(done
    ? done+' photo'+(done>1?'s':'')+' added'+(failed?' · '+failed+' failed: '+lastErr:'')
    : 'Upload failed — '+(lastErr||'nothing went through'));
}

/* ================= SMART LISTS ================= */
let slSel=null;
function matchList(c,q){
  const ds=S.deals.filter(x=>x.clientId===c.id);
  if(q.source&&c.source!==q.source)return false;
  if(q.hasBiz&&!ds.some(x=>PIPES[x.pipe].biz===q.hasBiz))return false;
  if(q.missingBiz&&ds.some(x=>PIPES[x.pipe].biz===q.missingBiz))return false;
  if(q.genBy&&c.genBy!==q.genBy)return false;
  if(q.createdWithin&&(Date.now()-new Date(c.createdAt))>q.createdWithin*864e5)return false;
  if(q.activity==='active'&&!ds.some(x=>!isFinal(x)))return false;
  if(q.activity==='none'&&ds.some(x=>!isFinal(x)))return false;
  if(q.activity==='closed'&&!ds.some(x=>isFinal(x)&&x.pipe!=='h2m_acq'))return false;
  if(q.lastTouch){
    const last=lastActivityTs(c.id);
    if(last&&(Date.now()-new Date(last))<q.lastTouch*864e5)return false;
  }
  return true;
}
function listMembers(q){return S.clients.filter(c=>matchList(c,q))}

/* ================= COMMISSIONS ================= */
function splitPct(pipe){return Math.max(0,Math.min(100,(S.splits&&S.splits[pipe]!=null)?S.splits[pipe]:0))}
/* each pipeline pays the agent either a % of revenue or a flat fee per closing */
function payMode(pipe){return (S.payMode&&S.payMode[pipe]==='flat')?'flat':'pct'}
function flatFee(pipe){return Math.max(0,(S.payFlat&&S.payFlat[pipe]!=null)?S.payFlat[pipe]:0)}
function agentPay(d){
  const rev=d.revenue||0;
  if(payMode(d.pipe)==='flat')return Math.min(flatFee(d.pipe),rev); /* never pay out more than came in */
  return Math.round(rev*splitPct(d.pipe)/100);
}
const payLabel=pipe=>payMode(pipe)==='flat'?money(flatFee(pipe))+' flat':splitPct(pipe)+'% / '+(100-splitPct(pipe))+'%';
function setPayMode(pipe,mode){
  S.payMode=S.payMode||{};S.payMode[pipe]=mode;
  S.payFlat=S.payFlat||{};if(S.payFlat[pipe]==null)S.payFlat[pipe]=0;
  save();go('settings');
}
function saveSplits(){
  S.payFlat=S.payFlat||{};
  Object.keys(S.splits).forEach(p=>{
    if(payMode(p)==='flat'){const el=document.getElementById('fl-'+p);if(el)S.payFlat[p]=Math.max(0,parseFloat(el.value)||0);}
    else {const el=document.getElementById('sp-'+p);if(el)S.splits[p]=Math.max(0,Math.min(100,parseFloat(el.value)||0));}
  });
  save();go('settings');toast('Commission settings saved');
}

async function aiPbStep(key,idx){
  const prompt=(document.getElementById('pb-ai').value||'').trim();
  const err=document.getElementById('pb-ai-err');err.textContent='';
  if(!prompt){err.textContent='Describe the step first.';return}
  if(!CLOUD||!sb||!SEAT_ID){err.textContent=DEV?'You\'re in the dev door — it has no real login, so the server can\'t verify ownership. Sign in with your owner account (your email + password) and this button goes live.':'AI step-writing needs the hosted cloud version with a signed-in owner account.';return}
  const btn=document.getElementById('pb-ai-go');btn.disabled=true;btn.textContent='Writing…';
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(SUPABASE_URL+'/functions/v1/ai',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
      body:JSON.stringify({kind:'pbstep',vertical:PB_META[key].name,prompt})});
    const out=await res.json();
    if(!res.ok||out.error)throw new Error(out.error||'AI error');
    aiApplySteps(key,idx,out.steps);
  }catch(e){err.textContent=String(e.message||e);}
  btn.disabled=false;btn.textContent='Generate with AI';
}
function aiApplySteps(key,idx,steps){
  if(!steps||!steps.length)return;
  if(steps.length===1){
    _pbGen={t:steps[0].t,tpl:steps[0].tpl||''};
    document.getElementById('pb-ai-out').innerHTML=pbGenPreview();
    const offEl=document.getElementById('pb-off');
    if(offEl&&(!offEl.value||offEl.value==='0'))offEl.value=steps[0].off;
  }else{
    window._aiSteps=steps;
    document.getElementById('pb-ai-out').innerHTML='<div style="margin-top:10px">'+steps.map(p=>
      '<div class="kpirow"><span class="tag" style="border-color:var(--gold2);color:var(--gold2)">Day '+p.off+'</span><span class="lab" style="flex:1">'+esc(p.t)+(p.tpl?' <span class="tag" style="font-size:10px;border-color:var(--gold2);color:var(--gold2)">auto-text</span>':'')+'</span></div>').join('')+
      '<button class="btn small" style="margin-top:10px" onclick="pbAddMany(\''+key+'\')">Add all '+steps.length+' steps</button></div>';
  }
}
function pbAddMany(key){
  const steps=window._aiSteps||[];if(!steps.length)return;
  if(!S.playbooks)S.playbooks=JSON.parse(JSON.stringify(PLAYBOOKS));
  steps.forEach(p=>{const st={off:p.off,t:p.t};if(p.tpl){st.auto='sms';st.tpl=p.tpl;}S.playbooks[key].push(st);});
  S.playbooks[key].sort((a,b)=>a.off-b.off);
  window._aiSteps=null;
  save();closeAll();refresh();toast(steps.length+' steps added to '+PB_META[key].name);
}
function savePbStep(key,idx){
  const off=parseInt(document.getElementById('pb-off').value,10)||0;
  if(!_pbGen||!_pbGen.t){toast('Describe the task and hit Generate first');return}
  const t=_pbGen.t.trim();
  const tpl=(_pbGen.tpl||'').trim();
  if(!S.playbooks)S.playbooks=JSON.parse(JSON.stringify(PLAYBOOKS));
  const step={off,t};if(tpl){step.auto='sms';step.tpl=tpl;}
  if(idx>=0)S.playbooks[key][idx]=step;else S.playbooks[key].push(step);
  S.playbooks[key].sort((a,b)=>a.off-b.off);

function rmPbStep(key,idx){

let impHeaders=null,impRows=null;
const IMP_FIELDS={'':'— ignore —',name:'Full name',first:'First name',last:'Last name',phone:'Phone',email:'Email',address:'Address',spouseName:'Spouse name',spousePhone:'Spouse phone',spouseEmail:'Spouse email',source:'Lead source',createdAt:'Date added',note:'Note → timeline'};
function parseCSV(text){
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else if(ch==='"')q=true;
    else if(ch===','){row.push(cur);cur='';}
    else if(ch==='\n'||ch==='\r'){ if(ch==='\r'&&text[i+1]==='\n')i++; row.push(cur);cur=''; if(row.some(x=>x.trim()!==''))rows.push(row); row=[]; }
    else cur+=ch;
  }
  if(cur!==''||row.length){row.push(cur);if(row.some(x=>x.trim()!==''))rows.push(row);}
  return rows;
}
function guessField(h){
  h=h.toLowerCase();
  if(/first/.test(h))return 'first'; if(/last|surname/.test(h))return 'last';
  if(/spouse.*(phone|cell)/.test(h))return 'spousePhone'; if(/spouse.*mail/.test(h))return 'spouseEmail'; if(/spouse|partner|co.?borrower/.test(h))return 'spouseName';
  if(/name/.test(h))return 'name';
  if(/phone|mobile|cell/.test(h))return 'phone'; if(/e.?mail/.test(h))return 'email';
  if(/address|city|area|street/.test(h))return 'address';
  if(/source|origin|channel/.test(h))return 'source';
  if(/date|created|added/.test(h))return 'createdAt';
  if(/note|comment/.test(h))return 'note';
  return '';
}
function impFile(input){
  const f=input.files&&input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{const rows=parseCSV(String(r.result));
    if(rows.length<2){toast('That file needs a header row plus at least one contact');return}
    impHeaders=rows[0].map(x=>x.trim());impRows=rows.slice(1);go('settings');};
  r.readAsText(f);
}
function vImport(){
  let h='<div class="card"><div class="sect-head" style="margin-bottom:6px"><h2 style="font-size:19px">Import contacts (CSV)</h2></div>'+
    '<div class="mut" style="font-size:13px;margin-bottom:10px">Bring your existing book of business in. Export any list as CSV (Excel: File → Save As → CSV), drop it here, confirm the column mapping, import. Duplicates are detected by phone or email and skipped. Imported contacts don\'t trigger the auto follow-up plan.</div>'+
    '<label class="btn ghost small" style="display:inline-block;cursor:pointer;text-transform:none;letter-spacing:0">Choose CSV file<input type="file" accept=".csv,text/csv" style="display:none" onchange="impFile(this)"></label>';
  if(impHeaders){
    h+='<div style="margin-top:14px"><div class="eyebrow" style="margin-bottom:8px">'+impRows.length+' rows — map the columns</div>'+
      '<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr))">'+
      impHeaders.map((hd,i)=>{const g=guessField(hd);
        return '<div><label>'+esc(hd)+'<span class="mut" style="text-transform:none;letter-spacing:0"> — e.g. "'+esc((impRows[0][i]||'').slice(0,26))+'"</span></label>'+
        '<select id="im-'+i+'">'+Object.entries(IMP_FIELDS).map(([k,l])=>'<option value="'+k+'"'+(k===g?' selected':'')+'>'+l+'</option>').join('')+'</select></div>'}).join('')+'</div>'+
      '<button class="btn" style="margin-top:16px" onclick="doImport()">Import '+impRows.length+' contacts</button> '+
      '<button class="btn ghost" style="margin-top:16px" onclick="impHeaders=null;impRows=null;go(\'settings\')">Cancel</button></div>';
  }
  return h+'</div>';
}
function doImport(){
  const map=impHeaders.map((_,i)=>{const el=document.getElementById('im-'+i);return el?el.value:''});
  if(!map.includes('name')&&!(map.includes('first')||map.includes('last'))){toast('Map at least a name column');return}
  const phones=new Set(S.clients.map(c=>(c.phone||'').replace(/\D/g,'').slice(-10)).filter(Boolean));
  const emails=new Set(S.clients.map(c=>(c.email||'').toLowerCase()).filter(Boolean));
  let added=0,skipped=0;
  impRows.forEach(row=>{
    const v={};map.forEach((fld,i)=>{if(fld)v[fld]=(v[fld]?v[fld]+' ':'')+String(row[i]||'').trim()});
    const name=(v.name||((v.first||'')+' '+(v.last||'')).trim());
    if(!name){skipped++;return}
    const pd=(v.phone||'').replace(/\D/g,'').slice(-10);
    const em=(v.email||'').toLowerCase();
    if((pd&&phones.has(pd))||(em&&emails.has(em))){skipped++;return}
    if(pd)phones.add(pd);if(em)emails.add(em);
    const c={id:uid('c'),name,phone:v.phone||'',email:v.email||'',address:v.address||'',
      spouseName:v.spouseName||'',spousePhone:v.spousePhone||'',spouseEmail:v.spouseEmail||'',
      source:v.source||'Imported',genBy:me.id==='admin'?realUid():me.id,
      createdAt:(v.createdAt&&!isNaN(new Date(v.createdAt)))?new Date(v.createdAt).toISOString():new Date().toISOString(),
      docs:[],interests:[]};
    S.clients.push(c);
    logAct(null,c.id,'Imported from CSV — source '+c.source+'.');
    if(v.note)logAct(null,c.id,v.note.slice(0,400));
    added++;
  });
  save();impHeaders=null;impRows=null;go('settings');
  toast(added+' imported'+(skipped?' · '+skipped+' skipped (duplicates / no name)':''));
}

function localListing(p){

      (p.down||p.monthly?'Se necesita '+(p.down?money(p.down)+' de enganche':'un enganche')+(p.monthly?' y '+money(p.monthly)+' al mes':'')+(p.rate?' con '+p.rate+'% de interés':'')+'. ':'')+
      (ti?'Los impuestos y el seguro son aproximadamente '+money(ti)+' al mes adicionales. ':'')+
      'Sin calificar con el banco — pregúntanos qué se necesita para recibir las llaves.';
  } else if(cat==='Wholesale'){
    title='Fix-and-flip opportunity on '+street;

      (p.listPrice?'Priced at '+money(p.listPrice)+'. ':'')+
      (p.rehab?'Rehab is estimated around '+money(p.rehab)+(p.arv?', with an ARV near '+money(p.arv):'')+'. ':(p.arv?'ARV is around '+money(p.arv)+'. ':''))+

      (p.listPrice?'Precio: '+money(p.listPrice)+'. ':'')+
      (p.rehab?'La remodelación se estima en '+money(p.rehab)+(p.arv?', con un valor después de reparaciones cerca de '+money(p.arv):'')+'. ':'')+
      'Se vende en las condiciones actuales — traiga a su contratista y sus propios números.';
  } else if(cat==='Multifamily'){
    title='Multifamily investment on '+street;
    desc='Multifamily investment at '+p.address+where+'. '+(p.listPrice?'Offered at '+money(p.listPrice)+'. ':'')+
      (p.rehab?'Budget about '+money(p.rehab)+' in work'+(p.arv?', with an ARV near '+money(p.arv):'')+'. ':'')+
      'Ask us for the unit mix and the rent roll.';
    descEs='Inversión multifamiliar en '+p.address+whereEs+'. '+(p.listPrice?'Precio: '+money(p.listPrice)+'. ':'')+
      'Pregúntanos por el detalle de las unidades y las rentas.';
  } else if(cat==='Commercial'){
    title='Commercial investment opportunity on '+street;
    desc='Commercial investment opportunity at '+p.address+where+size+'. '+
      (p.listPrice?'Offered at '+money(p.listPrice)+'. ':'')+'Ask us for the details on the building and the terms.';
    descEs='Oportunidad de inversión comercial en '+p.address+whereEs+sizeEs+'. '+

  } else {

      (p.listPrice?'Offered at '+money(p.listPrice)+'. ':'')+'Reach out to set up a walkthrough.';

    taxes:+g('mp-taxes')||0,insurance:+g('mp-ins')||0,rehab:+g('mp-rehab')||0,arv:+g('mp-arv')||0};
  const set=(id,val)=>{const el=document.getElementById(id);if(el&&val)el.value=val};

  let why='';
  try{
    if(!CLOUD||!sb||!SEAT_ID)throw new Error(DEV?'the admin door has no server login':'this copy runs offline');
    const {data:{session}}=await sb.auth.getSession();
    if(!session)throw new Error('your session expired');
    const res=await fetch(SUPABASE_URL+'/functions/v1/ai',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
      body:JSON.stringify({kind:'listing',prop})});
    const out=await res.json();
    if(!res.ok||out.error)throw new Error(out.error||'AI error');
    set('mp-title',out.title);set('mp-desc',out.desc);set('mp-descEs',out.descEs);
    err.style.color='var(--green)';
    err.textContent='Written for a '+(cat||'general')+' property — read it over and change anything before you save.';
    btn.disabled=false;btn.textContent='✨ Write the listing for me';return;
  }catch(e){why=String(e.message||e);}
  /* the AI leg didn't run — write it here from the same facts so the button always delivers */
  const w=localListing(prop);
  set('mp-title',w.title);set('mp-desc',w.desc);set('mp-descEs',w.descEs);
  err.style.color='var(--amber)';
  err.textContent='Drafted here from the form ('+why+'). Edit freely — once an Anthropic key is vaulted this writes richer copy.';
  btn.disabled=false;btn.textContent='✨ Write the listing for me';
}

async function saveUser(editId){
  const g=x=>{const el=document.getElementById(x);return el?el.value:''};
  if(!g('mu-name').trim()||!g('mu-email').trim()){toast('Name and email are required');return}
  if(editId){
    const u=S.users.find(x=>x.id===editId);if(!u||!canManageSeat(u))return;
    const nx=g('mu-ext').trim();
    if(nx&&S.users.some(x=>x.id!==u.id&&x.ext===nx)){toast('Extension '+nx+' is taken');return}
    u.name=g('mu-name').trim();u.email=g('mu-email').trim().toLowerCase();u.phone=g('mu-phone').trim();u.ext=nx||u.ext;
    u.role=g('mu-role');u.business=g('mu-biz')||null;
    if(me.role==='owner'||me.id==='admin'){const ps=Object.keys(PIPES).filter(p=>{const el=document.getElementById('mu-pipe-'+p);return el&&el.checked});if(ps.length)u.pipes=ps;else delete u.pipes;}
    save();closeAll();renderWho();go('settings');toast('Team member updated');return;
  }
  let ext=g('mu-ext').trim();
  if(!ext||S.users.some(x=>x.ext===ext)){let n=101;while(S.users.some(x=>x.ext===String(n)))n++;ext=String(n);}
  const seat={id:uid('u'),name:g('mu-name').trim(),email:g('mu-email').trim().toLowerCase(),phone:g('mu-phone').trim(),ext,role:g('mu-role'),business:g('mu-biz')||null};
  if(me.role==='owner'||me.id==='admin'){const ps=Object.keys(PIPES).filter(p=>{const el=document.getElementById('mu-pipe-'+p);return el&&el.checked});if(ps.length)seat.pipes=ps;}
  let invite=null;
  if(CLOUD&&sb&&!DEV){
    document.getElementById('mu-go').disabled=true;document.getElementById('mu-go').textContent='Creating login…';
    try{
      const {data:{session}}=await sb.auth.getSession();
      const res=await fetch(SUPABASE_URL+'/functions/v1/admin-create-user',{method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
        body:JSON.stringify({email:seat.email,name:seat.name,role:seat.role,business:seat.business,seat_id:seat.id})});
      const out=await res.json();
      if(!res.ok||out.error)throw new Error(out.error||'Could not create login');
      invite={email:out.email,pass:out.tempPass};
    }catch(e){
      document.getElementById('mu-err').textContent=String(e.message||e);
      document.getElementById('mu-go').disabled=false;document.getElementById('mu-go').textContent='Add team member';return;
    }
  }
  S.users.push(seat);
  save();renderWho();
  if(invite){mInviteReady(seat,invite)}else{closeAll();go('settings');toast('Team member added')}
}

const TWILIO_FN=SUPABASE_URL+'/functions/v1/twilio';
async function twilioAction(body){
  const {data:{session}}=await sb.auth.getSession();
  const res=await fetch(TWILIO_FN,{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
    body:JSON.stringify(body)});
  const out=await res.json();
  if(!res.ok||out.error)throw new Error(out.error||'Twilio request failed');
  const now=new Date().toISOString();
  const rows=[{collection:'touches',id:out.touch.id,data:out.touch,updated_at:now,deleted:false}];
  if(out.act)rows.push({collection:'acts',id:out.act.id,data:out.act,updated_at:now,deleted:false});
  applyRemote(rows);localStorage.setItem(LS,JSON.stringify(S));
  return out;
}

function saveTouch(kind){
  const g=x=>document.getElementById(x);
  const cid=g('mx-client').value,dir=g('mx-dir').value;
  const t={id:uid('t'),clientId:cid,agentId:me.id==='admin'?realUid():me.id,ts:new Date().toISOString(),kind:kind+'_'+dir};
  if(kind==='call')t.dur=Math.max(0,parseInt(g('mx-dur').value)||0)*60;
  S.touches.push(t);
  const note=g('mx-note').value.trim();
  logAct(null,cid,(dir==='out'?'Outgoing':'Incoming')+' '+(kind==='call'?'call'+(t.dur?' — '+Math.round(t.dur/60)+' min':''):'text')+(note?': '+note:'')+'.');
  save();closeAll();refresh();toast((kind==='call'?'Call':'Text')+' logged');
}

function mAddAppt(clientId,dateStr){
  const today=dateStr||new Date().toISOString().slice(0,10);
  const defBiz=(me.business)||'RL';
  modal('<h2>New appointment</h2>'+
  '<label>Client</label><select id="ma-client">'+S.clients.map(c=>'<option value="'+c.id+'"'+(c.id===clientId?' selected':'')+'>'+esc(c.name)+'</option>').join('')+'</select>'+
  '<div class="frow"><div><label>With</label><select id="ma-agent">'+S.users.filter(u=>u.role!=='marketing').map(u=>'<option value="'+u.id+'"'+(u.id===me.id?' selected':'')+'>'+esc(u.name)+'</option>').join('')+'</select></div>'+
  '<div><label>Vertical</label><select id="ma-biz">'+Object.keys(BIZ).map(b=>'<option value="'+b+'"'+(b===defBiz?' selected':'')+'>'+BIZ[b]+'</option>').join('')+'</select></div></div>'+
  '<div class="frow"><div><label>Date</label><input id="ma-date" type="date" value="'+today+'"></div><div><label>Time</label><input id="ma-time" type="time" value="10:00"></div></div>'+
  '<div class="frow"><div><label>Type</label><select id="ma-type"><option>Consult</option><option>Showing</option><option>Listing Appt</option><option>Closing</option><option>Follow-up</option></select></div>'+
  '<div><label>Repeat weekly</label><select id="ma-rep"><option value="1">Just once</option><option value="2">2 weeks</option><option value="4">4 weeks</option><option value="8">8 weeks</option><option value="12">12 weeks</option></select></div></div>'+
  '<button class="btn" style="margin-top:18px" onclick="saveAppt()">Book appointment</button>');
  document.getElementById('ma-agent').onchange=e=>{const u=U(e.target.value);if(u&&u.business)document.getElementById('ma-biz').value=u.business;};
}
function saveAppt(){
  const g=x=>document.getElementById(x).value;
  if(!g('ma-date')){toast('Pick a date');return}
  const rep=parseInt((document.getElementById('ma-rep')||{value:'1'}).value,10)||1;
  const base=new Date(g('ma-date')+'T12:00');
  for(let i=0;i<rep;i++){
    const day=new Date(base);day.setDate(base.getDate()+7*i);
    S.appts.push({id:uid('ap'),clientId:g('ma-client'),agentId:g('ma-agent'),biz:document.getElementById('ma-biz').value,
      dt:day.toISOString().slice(0,10)+'T'+(g('ma-time')||'10:00'),type:g('ma-type'),done:false,series:rep>1?base.toISOString().slice(0,10):null});
  }
  logAct(null,g('ma-client'),g('ma-type')+' appointment booked with '+U(g('ma-agent')).name+(rep>1?' — weekly ×'+rep+' starting ':' for ')+fdate(g('ma-date'))+'.');
  /* marketing pre-book → booking with an agent hands the lead off and starts THEIR workflow */
  (function(){
    const cid=g('ma-client'),agentId=g('ma-agent');
    const mkt=S.tasks.filter(t=>t.clientId===cid&&t.plan==='pb-mkt'&&!t.done);
    if(mkt.length&&U(agentId)&&U(agentId).role!=='marketing'){
      const setT=mkt.find(t=>/set the appointment/i.test(t.title));
      if(setT){setT.done=true;setT.doneAt=new Date().toISOString();}
      const cc=C(cid);
      /* the RECEIVING agent's vertical decides the workflow — ASAP, owner finance, wholesale, dispo, or licensed */
      const ag=U(agentId);const agPipes=allowedPipes(ag);
      const deal=S.deals.find(d=>d.clientId===cid&&agPipes.includes(d.pipe))||S.deals.find(d=>d.clientId===cid&&PIPES[d.pipe].biz===(document.getElementById('ma-biz').value||''));
      const key=deal?(pbKey(deal.pipe)||'rl'):(pbKey(agPipes.find(p=>pbKey(p)))||'rl');
      firePlaybook(key,cc,agentId);
      logAct(null,cid,'Handoff — appointment set, '+U(agentId).name+' takes over from marketing.');
    }
  })();
  if(/showing|viewing|tour/i.test(g('ma-type'))){
    const cc=C(g('ma-client'));const fn2=cc?cc.name.split(' ')[0]:'client';
    const prep=new Date(base);prep.setDate(base.getDate()-1);
    S.tasks.push({id:uid('t'),title:'Send '+fn2+' the property list & confirm for '+fdate(base.toISOString()),
      clientId:g('ma-client'),agentId:g('ma-agent'),due:prep.toISOString().slice(0,10),done:false,createdAt:new Date().toISOString(),by:g('ma-agent'),plan:'appt-prep'});
  }
  save();closeAll();refresh();toast(rep>1?rep+' weekly appointments booked':'Appointment booked');
}
function rmAppt(id){
  const a=S.appts.find(x=>x.id===id);if(!a)return;
  if(me.role==='agent'&&a.agentId!==me.id){toast('Not your appointment');return}
  if(!confirm('Cancel this appointment?'))return;
  S.appts=S.appts.filter(x=>x.id!==id);
  logAct(null,a.clientId,'Appointment cancelled — '+a.type+' on '+fdate(a.dt)+'.');
  save();refresh();toast('Appointment cancelled');
}
function apptDone(id){apptOutcome(id,'showed')}
function apptOutcome(id,kind){
  const a=S.appts.find(x=>x.id===id);if(!a)return;
  const c=C(a.clientId);const fn=c?c.name.split(' ')[0]:'client';
  a.done=true;a.outcome=kind;
  if(kind==='showed'){
    logAct(null,a.clientId,a.type+' appointment — showed ✓ ('+U(a.agentId).name+').');
    const isShowing=/showing|viewing|tour/i.test(a.type);
    S.tasks.push({id:uid('t'),title:isShowing?'Collect '+fn+'\'s feedback on the properties viewed':'Send '+fn+' a recap + next steps',
      clientId:a.clientId,agentId:a.agentId,due:new Date(Date.now()+864e5).toISOString().slice(0,10),done:false,createdAt:new Date().toISOString(),by:a.agentId,plan:'appt-loop'});
    toast('Marked showed — follow-through task created');
  }else if(kind==='noshow'){
    logAct(null,a.clientId,a.type+' appointment — NO-SHOW ('+U(a.agentId).name+').');
    S.tasks.push({id:uid('t'),title:'Call '+fn+' to reschedule — no-show on '+fdate(a.dt),
      clientId:a.clientId,agentId:a.agentId,due:NOW().toISOString().slice(0,10),done:false,createdAt:new Date().toISOString(),by:a.agentId,plan:'appt-loop'});
    toast('No-show logged — reschedule task created for today');
  }else if(kind==='resched'){
    logAct(null,a.clientId,a.type+' appointment rescheduled.');
    save();refresh();mAddAppt(a.clientId);return;
  }
  save();refresh();
}
function needsOutcome(){
  return S.appts.filter(a=>!a.done&&!a.outcome&&!isDormant(C(a.clientId))&&new Date(a.dt)<NOW());

/* ================= CLOUD SYNC ENGINE =================
   One generic 'records' table holds every collection as JSON rows.
   save() stamps changed rows; the engine pushes them and pulls
   teammates' changes every 15s. Newest row wins per record. */
const SYNC_COLS=['clients','deals','properties','acts','appts','touches','users','tasks','smartlists'];
let _snap={},_del={},_pushQ={},_lastPull='1970-01-01T00:00:00Z',_syncTimer=null,_pushing=false;
function snapKey(o){return JSON.stringify(o)}
function stampChanges(){
  const now=new Date().toISOString();
  SYNC_COLS.forEach(col=>{
    const cur={},prev=_snap[col]||{};
    (S[col]||[]).forEach(r=>{cur[r.id]=snapKey(r)});
    for(const id in cur)if(cur[id]!==prev[id]){(_pushQ[col]=_pushQ[col]||{})[id]=now;}
    for(const id in prev)if(!(id in cur)){(_del[col]=_del[col]||{})[id]=now;}
    _snap[col]=cur;
  });
  const tKey=snapKey(S.targets);
  if(_snap._targets!==tKey){(_pushQ.meta=_pushQ.meta||{}).targets=now;_snap._targets=tKey;}
  const dKey=snapKey(S.dismissed);
  if(_snap._dismissed!==dKey){(_pushQ.meta=_pushQ.meta||{}).dismissed=now;_snap._dismissed=dKey;}
  const sKey=snapKey(S.splits);
  if(_snap._splits!==sKey){(_pushQ.meta=_pushQ.meta||{}).splits=now;_snap._splits=sKey;}
  const pKey=snapKey(S.playbooks);
  if(_snap._playbooks!==pKey){(_pushQ.meta=_pushQ.meta||{}).playbooks=now;_snap._playbooks=pKey;}
}
function setSyncDot(state,msg){
  const el=document.getElementById('syncdot');if(!el)return;
  el.innerHTML='<span class="sdot '+(state==='ok'?'g':state==='err'?'r':'a')+'"></span>'+msg;
}
async function pushChanges(){
  if(!sb||!SEAT_ID||_pushing)return;_pushing=true;
  try{
    const rows=[];
    for(const col in _pushQ)for(const id in _pushQ[col]){
      let data;
      if(col==='meta'&&id==='targets')data=S.targets;
      else if(col==='meta'&&id==='dismissed')data=S.dismissed;
      else if(col==='meta'&&id==='splits')data=S.splits;
      else if(col==='meta'&&id==='playbooks')data=S.playbooks;
      else data=(S[col]||[]).find(r=>r.id===id);
      if(data)rows.push({collection:col,id,data,updated_at:_pushQ[col][id],deleted:false});
    }
    for(const col in _del)for(const id in _del[col])
      rows.push({collection:col,id,data:{},updated_at:_del[col][id],deleted:true});
    if(rows.length){
      const {error}=await sb.from('records').upsert(rows);
      if(error)throw error;
      _pushQ={};_del={};
    }
    /* presence + sessions ride along */
    const uid=realUid(),now=new Date().toISOString();
    await sb.from('records').upsert([
      {collection:'presence',id:uid,data:{ts:S.presence[uid]||now},updated_at:now,deleted:false},
      {collection:'sessions',id:uid,data:S.sessions[uid]||{},updated_at:now,deleted:false}
    ]);
    setSyncDot('ok','Synced · live');
  }catch(e){console.error('[sync push]',e);setSyncDot('err','Sync error — retrying');}
  _pushing=false;
}
function applyRemote(rows){
  let changed=false;
  rows.forEach(r=>{
    if(r.updated_at>_lastPull)_lastPull=r.updated_at;
    if(r.collection==='meta'&&r.id==='targets'){S.targets=r.data;changed=true;return}
    if(r.collection==='meta'&&r.id==='dismissed'){S.dismissed=r.data;changed=true;return}
    if(r.collection==='meta'&&r.id==='splits'){S.splits=r.data;changed=true;return}
    if(r.collection==='meta'&&r.id==='playbooks'){S.playbooks=r.data;changed=true;return}
    if(r.collection==='presence'){S.presence[r.id]=r.data.ts;changed=true;return}
    if(r.collection==='sessions'){S.sessions[r.id]=r.data;changed=true;return}
    if(!SYNC_COLS.includes(r.collection))return;
    const arr=S[r.collection];const i=arr.findIndex(x=>x.id===r.id);
    const pendingLocal=_pushQ[r.collection]&&_pushQ[r.collection][r.id]&&_pushQ[r.collection][r.id]>r.updated_at;
    if(pendingLocal)return; /* our newer local edit wins; it will push */
    if(r.deleted){if(i>-1){arr.splice(i,1);changed=true}}
    else if(i>-1){if(snapKey(arr[i])!==snapKey(r.data)){arr[i]=r.data;changed=true}}
    else{arr.push(r.data);changed=true}
    (_snap[r.collection]=_snap[r.collection]||{})[r.id]=snapKey(r.data);
  });
  return changed;
}
async function pullAll(first){
  if(!sb||!SEAT_ID)return;
  try{
    const q=sb.from('records').select('*');
    const {data,error}=first?await q:await q.gt('updated_at',_lastPull);
    if(error)throw error;
    if(first){
      /* if the cloud is empty, this device seeds it (first team login) */
      if(!data.length){stampChanges();SYNC_COLS.forEach(col=>{(S[col]||[]).forEach(r=>{(_pushQ[col]=_pushQ[col]||{})[r.id]=new Date().toISOString()})});(_pushQ.meta={targets:new Date().toISOString()});await pushChanges();return}
      SYNC_COLS.forEach(col=>{S[col]=[]});
    }
    const changed=applyRemote(data||[]);
    if(changed){localStorage.setItem(LS,JSON.stringify(S));if(me&&!first)refresh();}
    setSyncDot('ok','Synced · live');
  }catch(e){console.error('[sync pull]',e);setSyncDot('err','Offline — using local copy');}
}
function startSync(){
  if(!sb||_syncTimer)return;
  setSyncDot('ok','Synced · live');
  _syncTimer=setInterval(async()=>{
    const ae=document.activeElement;
    if(ae&&/INPUT|SELECT|TEXTAREA/.test(ae.tagName))return;
    await pushChanges();await pullAll(false);
  },15000);
}

document.addEventListener('mousemove',e=>{
  const tipEl=document.getElementById('tip');if(!tipEl)return;
  const t=e.target&&e.target.closest?e.target.closest('[data-tip]'):null;
  if(t){
    tipEl.innerHTML=t.getAttribute('data-tip');tipEl.style.display='block';
    let x=e.clientX+14,y=e.clientY+14;
    const r=tipEl.getBoundingClientRect();
    if(x+r.width>window.innerWidth-8)x=Math.max(8,e.clientX-r.width-14);
    if(y+r.height>window.innerHeight-8)y=Math.max(8,e.clientY-r.height-14);
    tipEl.style.left=x+'px';tipEl.style.top=y+'px';
  }else tipEl.style.display='none';
});
