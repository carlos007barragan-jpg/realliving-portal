        "content": "<h2>Finding &amp; Qualifying Buyers</h2><p>Your ability to find and qualify the right buyers is the core of your role. A qualified buyer wants a home, can make the down payment, and can afford the monthly payment — even if a bank turned them down.</p><h2>Our Ideal Buyer</h2><ul><li>Self-employed or 1099 with hard-to-document income</li><li>Uses an ITIN instead of an SSN</li><li>Low or no credit score</li><li>Recent bankruptcy or financial hardship</li><li>Tired of renting and ready to build equity now</li><li>Wants to skip the slow bank process</li></ul><div class=\"callout-box highlight\"><div class=\"cb-title\">Treat Every Buyer With Dignity</div><p>Our buyers are good people in tough situations who deserve a real path to homeownership. The respect you show them is the Real Living brand. It's also what earns referrals.</p></div><h2>Where to Find Buyers</h2><ul><li><strong>Facebook groups &amp; Marketplace</strong> — your primary channel; post daily</li><li><strong>Swap &amp; shop / community pages</strong> — high volume, low cost</li><li><strong>Spanish-language outreach</strong> — an underserved, highly motivated market</li><li><strong>Apartment complexes &amp; renter neighborhoods</strong> — target people ready to stop renting</li><li><strong>Referrals</strong> — from past buyers, community, and your network</li></ul><h2>The Qualifying Questions</h2><p>From the H2M process, ask every interested lead:</p><ul><li>Are you buying for yourself or as an investment?</li><li>Are you interested in creative financing, lease option, or cash?</li><li>What area of Kansas City are you looking in?</li><li>What's your target monthly payment range?</li><li>How much do you have available for a down payment?</li><li>What's your timeline — how soon do you need to move?</li><li>Are you currently renting or do you own?</li></ul><div class=\"callout-box critical\"><div class=\"cb-title\">Quality Over Quantity</div><p>One qualified buyer is worth ten tire-kickers. Pre-qualify on the phone before you book an appointment or pull the Sales Manager into an intake. A buyer with a down payment, steady income, and a real timeline is who you want in front of a property.</p></div><div class=\"callout-box info\"><div class=\"cb-title\">Log It Immediately</div><p>Every qualified lead goes into the CRM right away with their answers to these questions. That information is what lets you — and your Sales Manager — match them to the right property.</p></div>",

 class=\"callout-box critical\"><div class=\"cb-title\">Notice the Pattern</div><p>Every time a buyer pushes toward specific terms, rates, or payments, you redirect to the manager. You handle the relationship and the general explanation; the Sales Manager handles every specific. This keeps you compliant <em>and</em> moves the deal forward.</p></div><h2>Booking the Appointment</h2><div class=\"script-block\"><em>\"Here's what I'd suggest — let's get you in to meet with me and my manager. We'll go over exactly what you're looking for and match you to properties that fit. Can we set that up?\"</em></div><div class=\"callout-box info\"><div class=\"cb-title\">The Full Script Book</div><p>Your complete Script Book lives in the Document Hub with scripts for every scenario — inbound messages, follow-ups, showings, and more.</p></div>",

        "content": "<h2>Your Career Path</h2><p>H2M is built as a career, not a job. The path from Marketer to Sales Manager is clear, every promotion is earned through performance, and the earnings are real. How fast you climb is up to you.</p><h2>The Ladder</h2><p>Marketer → Senior Marketer → Team Lead → Sales Manager, with the Co-CEOs (Carlos Barragan &amp; Laylani Gonzalez) at the top and Paul Do as Operations Director &amp; Sales Manager.</p><h2>Level 1 — Marketer</h2><div class=\"callout-box highlight\"><div class=\"cb-title\">Your Starting Compensation</div><p><strong>Base:</strong> $750 per deal ($5K+ deals) / $450 (below $5K)<br><strong>Escalator:</strong> +$50 added to your base every 2 deals you close — <strong>permanent, never resets</strong><br><strong>Example:</strong> Close 10 deals → ~$1,000/deal. Close 20 → ~$1,250/deal.</p></div><p>Earnings scale fast with volume: 5 deals/month ≈ $3,950/mo ($47K/yr); 10 deals ≈ $8,500/mo ($102K/yr); 15 deals ≈ $13,700/mo ($164K/yr); 20 deals ≈ $19,500/mo ($234K/yr).</p><div class=\"callout-box critical\"><div class=\"cb-title\">The $100K Milestone Bonus</div><p>When you close your first <strong>$100,000 in revenue</strong> as a Marketer, you earn a <strong>$10,000 cash bonus</strong> AND are promoted to Senior Marketer with higher base pay. This is your first major milestone — typically reached in months 6-12.</p></div><h2>Level 2 — Senior Marketer</h2><p>Base jumps to <strong>$800/deal</strong> with the same +$50 escalator. Earned at 50+ deals plus the $100K revenue milestone.</p><h2>Level 3 — Team Lead</h2><p>You earn <strong>$900 flat per personal deal</strong> (no escalation) PLUS <strong>$250 for every deal your team members close</strong>. Now your income multiplies through your team. A Team Lead with an active team earning on 40-60 team deals/month can reach $19,000-$24,000/month.</p><h2>Level 4 — Sales Manager</h2><p>You earn <strong>$1,150 flat per personal deal</strong> PLUS <strong>$450 for every marketer deal</strong> AND <strong>$450 for every team lead deal</strong>. You earn on the entire organization below you.</p><div class=\"callout-box info\"><div class=\"cb-title\">The Cascade</div><p>When you close one deal, everyone above you earns too. That's why H2M is built to push you up — the better you do, the better everyone does. Every deal moves you closer to the next level: more money now, higher base pay, and eventually earnings from an entire team.</p></div>",

        "content": "<h2>Welcome to the Real Living Real Estate Team</h2><p>Welcome aboard. You're joining a real estate team built differently from a traditional brokerage — one with three connected income engines and a model designed to help you build a real, lasting business. This module sets your foundation: who we are, how we operate, and what it means to be a Real Living licensed agent.</p><div class=\"callout-box critical\"><div class=\"cb-title\">The Most Important Thing to Understand</div><p>Real Living is a <strong>TEAM operating under eXp Realty</strong> — not a standalone brokerage. eXp is the licensed brokerage that holds your license. Real Living is the team you work within, providing leads, training, tools, support, and a path to grow. Keep this distinction clear from day one.</p></div><h2>Our Mission</h2><p>Real Living exists to help people achieve homeownership and build wealth through real estate — and to help our agents build careers doing it. We serve buyers, sellers, and investors across the Greater Kansas City market on both the Kansas and Missouri sides.</p><h2>The Three Real Living Verticals</h2><p>What makes Real Living unique is that you sit at the center of three connected businesses:</p><ul><li><strong>Real Living Licensed (you)</strong> — traditional licensed real estate: representing buyers and sellers in standard transactions</li><li><strong>Real Living | H2M</strong> — our creative financing division, selling off-market properties on contract for deed to buyers who can't use a traditional bank</li><li><strong>ASAP Lending</strong> — our hard money and investment lending arm, funding real estate investors</li></ul><div class=\"callout-box highlight\"><div class=\"cb-title\">Your Built-In Advantage</div><p>Most agents have one tool: a traditional sale. You have three. When a client can't qualify for a bank loan, you have H2M. When an investor needs fast funding, you have ASAP. You can serve clients other agents have to turn away — and earn from referrals across all three. We'll cover this cross-company advantage in depth later in the track.</p></div><h2>What It Means to Be a Real Living Agent</h2><p>As a licensed agent on this team, you represent buyers and sellers in real estate transactions. Unlike our H2M marketers, you ARE a licensed professional — you can negotiate, advise, and handle contracts. With that license comes responsibility: professionalism, compliance, and putting your clients' interests first, always.</p><div class=\"callout-box info\"><div class=\"cb-title\">What's Ahead in This Track</div><p>Over the next modules you'll learn how the team and eXp work, buyer and seller representation, lead generation, scripts, contracts and transaction management, vendors and building your book of business, marketing, the CRM and follow-up, commission and compliance — and you'll finish with a certification exam. Let's build your business.</p></div>",

        "video": "",
        "content": "<h2>Getting Licensed & How the Team Works</h2><p>Before you list a home or write an offer, you need to understand the business you're operating inside — how eXp works, how you get paid, and what the team provides. This is the licensed-agent equivalent of knowing your own engine.</p><h2>Your Real Estate License</h2><p>Your license is what legally allows you to represent buyers and sellers, negotiate on their behalf, and earn commission. It also binds you to a code of ethics and a duty to act in your clients' best interests. Keep your license active, your continuing education current, and your conduct above reproach.</p><h2>How eXp Realty Works</h2><p>eXp is a cloud-based brokerage — there's no traditional brick-and-mortar office. Everything runs through eXp's online platform. Key things to understand:</p><ul><li><strong>Cloud brokerage</strong> — you work from anywhere; training, meetings, and support happen virtually through eXp World</li><li><strong>Commission split</strong> — you split a percentage of each commission with eXp until you reach your annual cap</li><li><strong>The cap</strong> — once you've paid eXp a set amount in splits for the year, you keep 100% of your commission after that</li><li><strong>Revenue share</strong> — eXp pays agents a share of revenue from agents they attract to the brokerage</li><li><strong>Stock ownership</strong> — eXp offers agents opportunities to earn equity in the company</li></ul><div class=\"callout-box highlight\"><div class=\"cb-title\">The Cap Explained Simply</div><p>Think of the cap as the maximum eXp collects from you in a year. Before the cap, you and eXp split commissions. After you hit the cap, the splits stop and you keep nearly all of every commission for the rest of the year. The more you produce, the better your effective split becomes.</p></div><h2>How the Real Living Team Fits In</h2><p>Real Living is your team within eXp. In exchange for a team split, the team provides what a solo agent has to build alone:</p><ul><li>Leads and lead-generation systems</li><li>Training and onboarding (this Training Center)</li><li>The CRM, tools like the Deal Analyzer, and systems</li><li>Mentorship and deal support from team leadership</li><li>Access to the H2M and ASAP verticals for clients who need them</li></ul><div class=\"callout-box info\"><div class=\"cb-title\">Your Status</div><p>You are an independent contractor. You're responsible for your own taxes, expenses, and business costs. You receive no employee benefits. You run your real estate business — the team and brokerage give you the platform to run it on.</p></div><div class=\"callout-box critical\"><div class=\"cb-title\">Know Your Numbers</div><p>Understand your specific split with the team and your eXp cap before your first closing. Ask leadership for your exact numbers. An agent who doesn't know their splits can't run their business profitably.</p></div>",

        "content": "<h2>Buyer Representation</h2><p>Representing a buyer means guiding someone through one of the largest purchases of their life. Done well, it earns you a client for life and a stream of referrals. This module covers the full buyer journey from first conversation to accepted offer.</p><h2>The Buyer Consultation</h2><p>Every buyer relationship should start with a <strong>buyer consult</strong> — a structured conversation, ideally before you ever show a home. The consult sets expectations, qualifies the buyer, and positions you as a professional rather than a door-opener.</p><p>In the buyer consult, cover:</p><ul><li><strong>Their why</strong> — what's driving the move and their timeline</li><li><strong>Needs vs. wants</strong> — must-haves versus nice-to-haves</li><li><strong>Budget and financing</strong> — are they pre-approved? If not, connect them with a lender</li><li><strong>The process</strong> — walk them through what to expect, start to finish</li><li><strong>Buyer agency</strong> — explain how you represent them and get the agreement signed</li></ul><div class=\"callout-box highlight\"><div class=\"cb-title\">Pre-Approval First</div><p>A buyer who isn't pre-approved isn't ready to shop. Before showing homes, make sure they're working with a lender and know their budget. This is where your vendor relationships — covered in a later module — become invaluable. A buyer who can't get conventional financing may be a perfect fit for H2M creative financing.</p></div><h2>Buyer Agency Agreements</h2><p>The buyer agency agreement formalizes that you represent the buyer's interests. It protects you and clarifies the relationship. Always explain it clearly and get it signed — representing a buyer without an agreement leaves you exposed and unpaid.</p><h2>Showing Homes</h2><p>Once a buyer is qualified and under agreement, you show homes that fit their criteria. Effective showings mean:</p><ul><li>Previewing or knowing the properties before you show them</li><li>Listening more than you talk — let them react</li><li>Pointing out both positives and potential concerns honestly</li><li>Helping them picture living there</li><li>Reading their signals and guiding toward a decision</li></ul><h2>Writing & Presenting Offers</h2><p>When your buyer finds the right home, you move quickly and professionally to write a competitive offer. You'll advise on price based on comparable sales, structure terms and contingencies, and present the offer to the listing agent. Your job is to position your buyer to win the home on the best possible terms — and to negotiate skillfully on their behalf.</p><div class=\"callout-box info\"><div class=\"cb-title\">Always Be Guiding to the Next Step</div><p>Every buyer interaction should end with a clear next step — book the consult, get pre-approved, schedule showings, write the offer. Never leave a buyer without a defined next action. Log everything in the CRM.</p></div>",

        "content": "<h2>Seller Representation</h2><p>Representing a seller — taking a listing — is the cornerstone of a sustainable real estate business. A listing markets itself, generates buyer leads, and builds your reputation in a neighborhood. This module covers the full seller side, including open houses.</p><h2>The Seller / Listing Consultation</h2><p>Like buyers, sellers start with a <strong>seller consult</strong> (the listing appointment). This is where you win the listing. Cover:</p><ul><li><strong>Their goals and timeline</strong> — why they're selling and when they need to be out</li><li><strong>The home</strong> — walk it, note features and needed repairs</li><li><strong>Pricing</strong> — present your market analysis (CMA)</li><li><strong>Your marketing plan</strong> — how you'll sell it</li><li><strong>The listing agreement</strong> — terms, commission, and timeline</li></ul><h2>Pricing the Home — The CMA</h2><p>Pricing is the single most important factor in selling a home. Price too high and it sits; price right and it sells fast, often with multiple offers. You'll prepare a <strong>Comparative Market Analysis (CMA)</strong> — looking at recently sold comparable homes — to recommend a price backed by data, not emotion.</p><div class=\"callout-box highlight\"><div class=\"cb-title\">Price Is Everything</div><p>The market — not the seller and not you — sets the price. Your job is to present the data honestly, even when the seller wants to hear a higher number. A correctly priced home is the best marketing there is.</p></div><h2>The Listing Agreement</h2><p>The listing agreement authorizes you to market and sell the home, sets the commission, and defines the timeline. Explain it thoroughly and set clear expectations about the process.</p><h2>Open Houses</h2><p>Open houses are a powerful seller-side tool — they market the listing AND generate buyer leads for your business.</p><ul><li><strong>Promote it</strong> — social media, signage, neighborhood invitations</li><li><strong>Prepare the home</strong> — clean, bright, decluttered, welcoming</li><li><strong>Work the room</strong> — greet everyone, capture contact info, qualify attendees</li><li><strong>Follow up</strong> — every visitor goes into the CRM with same-day follow-up</li></ul><div class=\"callout-box info\"><div class=\"cb-title\">Two Wins From One Open House</div><p>A great open house serves your seller (exposure for their home) and your business (new buyer leads). Many visitors aren't right for that house but are buyers you can help with another — or candidates for H2M creative financing.</p></div><h2>Managing Showings</h2><p>Once listed, you coordinate showings on the seller's home — scheduling, gathering feedback, and keeping the seller informed. Communication is everything; a seller who hears from you regularly is a happy seller.</p><h2>Disclosures</h2><div class=\"callout-box critical\"><div class=\"cb-title\">Disclosures Protect Everyone</div><p>Sellers are legally required to disclose known material defects about the property. Required disclosures protect the seller from liability and the buyer from surprises. Follow Real Living's disclosure standards on every listing — never let a seller hide a known issue. When in doubt, disclose.</p></div><h2>Handling Offers</h2><p>When offers come in, you present each one to your seller, explain the terms and trade-offs, and negotiate on their behalf to get the best price and terms. In multiple-offer situations, you guide the seller through comparing offers — not just on price, but on financing strength, contingencies, and certainty of close.</p>",

        "content": "<h2>Lead Generation & Social Media</h2><p>No leads, no business. Lead generation is the engine of your real estate career, and it's a daily activity — not something you do when you're slow. This module covers where your leads come from and the standards for generating them.</p><h2>Your Income Is Your Pipeline</h2><p>Just like every other role at Real Living, your income is a direct reflection of your pipeline. The agents who win are the ones who generate leads consistently, every single day, even when they're busy closing deals. The feast-and-famine cycle destroys careers; consistent lead-gen prevents it.</p><h2>Outbound Leads</h2><p>Outbound is lead generation you initiate — you go find the business:</p><ul><li>Calling your sphere of influence and past clients</li><li>Prospecting expired listings and for-sale-by-owners</li><li>Door knocking and farming a neighborhood</li><li>Networking and asking for referrals</li></ul><h2>Inbound Leads</h2><p>Inbound is business that comes to you — and speed is everything:</p><ul><li>Online leads from listings and ads</li><li>Open house visitors</li><li>Referrals from past clients and your network</li><li>Social media inquiries</li></ul><div class=\"callout-box critical\"><div class=\"cb-title\">Speed to Lead</div><p>Inbound leads go cold fast. Respond within minutes during business hours — the agent who responds first usually wins the client. Every inbound lead goes into the CRM the moment it arrives.</p></div><h2>Social Media Standards</h2><p>Social media is a primary lead source and your public face as a Real Living agent. Our standards:</p><ul><li>Post consistently — listings, market updates, wins, and value-driven content</li><li>Represent the Real Living brand professionally at all times</li><li>Respond to every comment and inquiry promptly</li><li>Mix content: property posts, education, personal/community, and clear calls to action</li><li>Stay compliant — follow fair housing rules in all posts and never         "content": "<h2>Scripts & Objection Handling</h2><p>Knowing where leads come from is half the battle. The other half is knowing what to <em>say</em>. These scripts are proven frameworks — internalize them so you sound natural, confident, and helpful, never robotic.</p><h2>The Buyer Lead Script</h2><div class=\"script-block\"><em>\"Hi [Name], this is [Your Name] with Real Living. I saw you were interested in [property/area] — I'd love to help. Before we look at homes, I like to do a quick buyer consultation so I understand exactly what you're looking for and can point you to the right properties. Do you have a few minutes, or can we set up a time?\"</em></div><h2>The Seller / Listing Script</h2><div class=\"script-block\"><em>\"Hi [Name], thanks for reaching out about selling. The best next step is a listing consultation where I'll walk through your home, show you what comparable homes have sold for, and lay out exactly how I'd market and sell it. When works for you this week?\"</em></div><h2>Open House Conversation</h2><div class=\"script-block\"><em>\"Welcome in! Feel free to look around — I'm [Your Name] with Real Living. Are you working with an agent yet, or are you just starting to look? ... What's bringing you out today?\"</em></div><p>The goal at an open house is simple: capture contact info and identify whether they're a buyer (or seller) you can help.</p><h2>Handling Common Objections</h2><h3>\"Why should I use you / your commission is too high.\"</h3><div class=\"script-block\"><em>\"That's a fair question. What I bring is [pricing expertise, marketing, negotiation, the Real Living systems]. My job is to net you more and make the process smoother than you could on your own — and I'm happy to show you exactly how. What matters most to you in this sale?\"</em></div><h3>\"We're just looking / not ready yet.\"</h3><div class=\"script-block\"><em>\"Totally understand — no pressure at all. Let me be a resource while you look. Can I set you up with listings that match what you want so you're ready when the right one comes along?\"</em></div><h3>\"I want to talk to my spouse / think about it.\"</h3><div class=\"script-block\"><em>\"Of course — this is a big decision and you should both be on the same page. What questions can I answer now to help that conversation? And let's set a time to reconnect once you've talked.\"</em></div><div class=\"callout-box highlight\"><div class=\"cb-title\">Acknowledge, Then Redirect to Value</div><p>The structure for any objection: acknowledge the concern honestly, then redirect to the value you provide and the client's goals. Never argue. The objection tells you exactly what to address.</p></div><div class=\"callout-box info\"><div class=\"cb-title\">Always Close Toward the Next Step</div><p>End every conversation by closing toward the next step — the consult, the showing, the listing appointment, the signed agreement. Then confirm it in the CRM.</p></div>",

        "video": "",
        "content": "<h2>Contracts & Transaction Management</h2><p>Getting an offer accepted is the beginning, not the end. From accepted offer to closing, dozens of details, deadlines, and documents have to be managed flawlessly. This module covers the contract-to-close process and the tools you'll use.</p><h2>The Contract-to-Close Process</h2><p>Once an offer is accepted, the transaction enters the closing process — typically a few weeks of coordinated steps:</p><ul><li>Earnest money is deposited</li><li>Inspections are scheduled and negotiated</li><li>The appraisal is ordered (by the lender)</li><li>The buyer's financing is finalized</li><li>Title work and closing are coordinated</li><li>Final walkthrough and signing</li></ul><div class=\"callout-box critical\"><div class=\"cb-title\">Deadlines Are Everything</div><p>Real estate contracts run on strict deadlines — inspection periods, financing contingencies, closing dates. Miss one and your client can lose money or the deal. Track every deadline obsessively. This is what transaction management means.</p></div><h2>Using dotloop</h2><p><strong>dotloop</strong> is a transaction management platform for creating, sharing, and e-signing real estate documents. With dotloop you:</p><ul><li>Create a 'loop' for each transaction</li><li>Use templates for standard contracts and forms</li><li>Send documents for secure electronic signature</li><li>Keep all parties and paperwork organized in one place</li></ul><h2>Using Skyslope</h2><p><strong>Skyslope</strong> is a transaction and compliance management platform. It's where you store complete transaction files, ensure every required document is present, and stay compliant with brokerage and legal requirements. Skyslope keeps your files audit-ready.</p><div class=\"callout-box highlight\"><div class=\"cb-title\">Two Tools, Two Jobs</div><p>Think of dotloop as where you create and sign documents, and Skyslope as where you store and compliance-check the complete file. Your team will show you the exact workflow for both — master them early; clean files protect you and the brokerage.</p></div><h2>Key Contracts & Forms</h2><p>You'll handle purchase agreements, addenda, disclosures, agency agreements, and amendments. Know what each does and when it's used. When a contract question is beyond your knowledge, ask your broker or team leadership — never guess on a binding legal document.</p><h2>Coordinating the Players</h2><p>A transaction involves many people: the other agent, the lender, the title company, the inspector, the appraiser. Your job is to keep them all moving toward the closing date, communicate proactively with your client, and solve problems before they derail the deal.</p><div class=\"callout-box info\"><div class=\"cb-title\">Communication Wins</div><p>The number one complaint clients have about agents is poor communication. Keep your client informed at every step — even when there's no news, a quick 'here's where we are' update builds trust and referrals.</p></div>",

      {
        "id": "rl_8",
        "title": "Vendors & Building Your Book of Business",
        "desc": "Lenders, inspectors, appraisals, and your referral network",
        "minutes": 22,
        "roles": [
          "licensed_agent"
        ],
        "video": "",
        "content": "<h2>Vendors & Building Your Book of Business</h2><p>You don't close deals alone. Behind every transaction is a team of vendors — lenders, inspectors, appraisers, title companies, contractors. The agents who build strong vendor relationships close more deals, solve problems faster, and earn referrals back. This module covers who these vendors are, how to work with them, and how to build a book of business around relationships.</p><h2>Lenders — Your Most Important Partner</h2><p>A great lender is your most valuable vendor relationship. They get your buyers pre-approved, keep financing on track, and close on time. What partnering with a lender looks like:</p><ul><li>You refer buyers to them for pre-approval; they get your buyers ready to shop</li><li>They communicate proactively so financing never derails the deal</li><li>The relationship is two-way — good lenders refer buyers back to you</li></ul><div class=\"callout-box highlight\"><div class=\"cb-title\">Your Built-In Lending Advantage</div><p>You have ASAP Lending in-house for investor and hard-money deals, and H2M creative financing for buyers who can't qualify conventionally. Build relationships with strong conventional lenders too — between all three, you can find financing for almost any buyer. That's a competitive edge most agents don't have.</p></div><h2>Inspectors</h2><p>A home inspector evaluates a property's condition and produces a report on its systems and defects. What you need to know:</p><ul><li>Inspections typically happen during the buyer's inspection period after an accepted offer</li><li>The inspection report drives repair negotiations</li><li>A good inspector is thorough, clear, and explains findings to your buyer without scaring them off a sound home</li><li>Build relationships with reliable inspectors you can recommend</li></ul><h2>Understanding Appraisals — for Buyers AND Sellers</h2><p>An <strong>appraisal</strong> is a licensed appraiser's professional opinion of a home's value, ordered by the lender to protect their loan. Every agent must understand appraisals:</p><ul><li><strong>For buyers:</strong> if the appraisal comes in below the offer price, the lender won't finance the full amount — the buyer must renegotiate, pay the difference, or walk. You guide them through it.</li><li><strong>For sellers:</strong> a low appraisal can threaten a deal. You may need to provide comparable sales to support the price or renegotiate with the buyer.</li><li><strong>Pricing connection:</strong> this is why correct pricing (your CMA) matters — a home priced far above what it will appraise for creates problems at the appraisal stage.</li></ul><div class=\"callout-box critical\"><div class=\"cb-title\">The Appraisal Gap</div><p>When appraised value is below the contract price, that difference is the 'appraisal gap.' Knowing how to handle it — for both buyers and sellers — separates professional agents from amateurs. Lean on your team leadership early until you've handled a few.</p></div><h2>Other Key Vendors</h2><p>Title companies (handle closing and title insurance), contractors and handymen (for repairs), stagers, photographers, and more. Build a reliable roster you can recommend with confidence.</p><h2>How to Find Vendors & Build Relationships</h2><ul><li><strong>Ask your team</strong> — start with the vendors Real Living and experienced agents already trust</li><li><strong>Network</strong> — meet vendors at closings, events, and through other agents</li><li><strong>Vet them</strong> — recommend only vendors who make you look good; a bad referral reflects on you</li><li><strong>Make it two-way</strong> — the best vendor relationships send business back to you</li></ul><div class=\"callout-box info\"><div class=\"cb-title\">Building Your Book of Business</div><p>Your 'book of business' is your network of clients, past clients, and vendor relationships that generate ongoing referrals. Nurture it constantly — stay in touch, add value, and be the connector. Over time, your book becomes the engine that feeds you deals without cold prospecting. Track every relationship in the CRM.</p></div>",

ness you'll ever get comes from past clients and referrals. A client you served well and stayed in touch with will send you their friends and family for years. Never let a closed client go cold.</p></div><h2>Daily CRM Standards</h2><p>Run your business with daily discipline: clear your follow-up tasks, log every new contact and interaction, advance deals through their stages, and end each day with zero overdue tasks. Consistency in the CRM is consistency in your income.</p><div class=\"callout-box info\"><div class=\"cb-title\">Systems Over Memory</div><p>Never rely on your memory to follow up. Put it in the CRM, set the reminder, and trust the system. That's how you handle a growing business without dropping clients.</p></div>",

Unique Edge</h2><p>Here's an advantage no ordinary agent has. Real Living's three verticals connect, and you can move clients between them:</p><ul><li><strong>Buyer can't qualify for a bank loan?</strong> Refer them to H2M creative financing instead of losing them</li><li><strong>Investor needs fast funding?</strong> Connect them with ASAP Lending</li><li><strong>H2M or ASAP client needs traditional representation?</strong> That business can come to you</li></ul><div class=\"callout-box highlight\"><div class=\"cb-title\">Serve Clients Other Agents Turn Away</div><p>A typical agent loses every buyer who can't get conventional financing. You don't — you have H2M. A typical agent can't help an investor needing hard money. You can — you have ASAP. This cross-company ability means more closings, more income, and clients for life. Learn how to spot which vertical fits each client and make the referral.</p></div><div class=\"callout-box info\"><div class=\"cb-title\">The Whole Is Greater</div><p>The three Real Living businesses are designed to feed each other. Every client you can't serve one way, you may be able to serve another. That's the power of the platform you're standing on — use it.</p></div>",

let CU=null, users=[], progress={};

function ls(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch(x){return fb;}}
function sl(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(x){}}

// ═══ ROLE / MODULE FILTERING ═══
function getMyTracks(){
  const r=ROLES[CU.role]; return r?r.tracks:[];
}
function moduleVisibleToMe(mod){
  if(!mod.roles||!mod.roles.length) return true;
  if(mod.roles.includes('ALL')) return true; // universal modules (Sales Fundamentals)
  const myKey=ROLE_MODULE_KEY[CU.role];
  const r=ROLES[CU.role];
  if(r&&r.admin&&(CU.role==='owner'||CU.role==='ops_director')) return true; // owners/ops see all modules
  return mod.roles.includes(myKey);
}
function myModules(trackId){
  const t=TRACKS[trackId]; if(!t) return [];
  return t.modules.filter(moduleVisibleToMe);
}

// ═══ PROGRESS ═══
function getProg(uid,tid){return (progress[uid]||{})[tid]||{};}
/* Until the SSO bridge started setting CU.id, every signed-in person's module
   progress was filed under the literal key "undefined". Giving them a real id
   orphaned that history — the modules were still finished, but the hub looked in
   a bucket that had never been written to, so it read as a wiped account and
   re-locked everything. Move the old bucket across once, and only when the real
   one is still empty, so nobody who has since made progress gets overwritten. */
function adoptLegacyProgress(){
  try{
    if(!CU||!CU.id)return;
    const legacy=progress['undefined'];
    if(!legacy||!Object.keys(legacy).length)return;
    const mine=progress[CU.id];
    if(mine&&Object.keys(mine).length)return;
    progress[CU.id]=legacy;
    sl('rl_tc3_progress',progress);
    if(typeof pushProgress==='function')pushProgress();
  }catch(e){console.warn('[progress adopt]',e&&e.message)}
}
/* A finished track is recorded on the server, but the tick against each module only
   ever lived in the learner's own browser. Clear that browser and the hub re-locks a
   track the company already has them down as having completed, and they are made to
   click through it again. Where the server says a track is done, restore the modules
   to match. Only ever fills in — it cannot un-tick anything. */
async function reconcileCompletedTracks(){
  try{
    if(!CU||!CU.id||!window.RLOnboard||!RLOnboard.client)return;
    const sb=RLOnboard.client(); if(!sb)return;
    const {data}=await sb.from('records').select('data')
      .eq('collection','onboarding').eq('id',CU.id).maybeSingle();
    const done=(data&&data.data&&data.data.tracks)||{};
    if(!Object.keys(done).length)return;
    let changed=false;
    Object.keys(done).forEach(tid=>{
      if(!done[tid]||!TRACKS[tid])return;
      const mods=myModules(tid); if(!mods.length)return;
      if(!progress[CU.id])progress[CU.id]={};
      if(!progress[CU.id][tid])progress[CU.id][tid]={};
      const bucket=progress[CU.id][tid];
      mods.forEach(m=>{
        if(!bucket[m.id]||!bucket[m.id].done){
          bucket[m.id]={done:true,score:null,ts:Date.parse(done[tid])||Date.now(),restored:true};
          changed=true;
        }
      });
    });
    if(changed){sl('rl_tc3_progress',progress);pushProgress();if(typeof renderDash==='function')renderDash();}
  }catch(e){console.warn('[track reconcile]',e&&e.message)}
}
function setModDone(tid,mid,score){
  const uid=CU.id;
  if(!progress[uid])progress[uid]={};
  if(!progress[uid][tid])progress[uid][tid]={};
  progress[uid][tid][mid]={done:true,score,ts:Date.now()};
  sl('rl_tc3_progress',progress);
  pushProgress();
}
/* Module progress lived only in this browser's localStorage, so ownership could see
   that a track was finished but never where someone had reached inside it — and the
   record died with a cleared cache or a second laptop. Mirror a compact per-track
   summary to Supabase so Team & Access can report real position. Best effort: a
   failure here must never block someone from finishing a module. */
async function pushProgress(){
  try{
    const sb=window.RLOnboard&&window.RLOnboard.client&&window.RLOnboard.client();
    if(!sb||!CU||!CU.id)return;
    const {data:{session}}=await sb.auth.getSession();
    if(!session)return;
    const mine=(ROLES[CU.role]&&ROLES[CU.role].tracks)||[];
    const out={};
    mine.forEach(id=>{
      const t=TRACKS[id]; if(!t)return;
      const mods=myModules(id), p=getProg(CU.id,id);
      const done=mods.filter(m=>p[m.id]&&p[m.id].done);
      const next=mods.find(m=>!(p[m.id]&&p[m.id].done));
      out[id]={label:t.name||id,done:done.length,total:mods.length,
               last:done.length?done[done.length-1].title:null,
               next:next?next.title:null};
    });
    await sb.from('records').upsert({
      collection:'training', id:CU.id,
      data:{name:CU.name,role:CU.role,tracks:out,updatedAt:new Date().toISOString()},
      updated_at:new Date().toISOString(), deleted:false
    },{onConflict:'collection,id'});
  }catch(e){console.warn('[progress sync]',e&&e.message)}
}
function isModDone(tid,mid){return !!(getProg(CU.id,tid)[mid]&&getProg(CU.id,tid)[mid].done);}
function isAdminViewer(){const r=ROLES[CU.role];return !!(r&&r.admin);}
function isModUnlocked(tid,mid){
  if(isAdminViewer()) return true; // owners/admins can freely click through every module
  const mods=myModules(tid);
  const idx=mods.findIndex(m=>m.id===mid);
  if(idx<=0) return true;
  return isModDone(tid,mods[idx-1].id);
}
function trackPct(tid){
  const mods=myModules(tid).filter(m=>m.quiz&&m.quiz.length);
  if(!mods.length) return 0;
  const done=mods.filter(m=>isModDone(tid,m.id)).length;
  return Math.round(done/mods.length*100);
}

  const head=document.createElement('div'); head.className='page-head';
  const reviewNote = isAdminViewer()
    ? '<div class="page-sub">You\'re viewing as <strong>'+roleInfo.label+'</strong>. All modules across every track are unlocked — click into any module to review its content, audio and quiz. You don\'t need to complete them in order.</div>'
    : '<div class="page-sub">Your training as a <strong>'+roleInfo.label+'</strong>. Complete each module in order — read or listen to the material, then pass the knowledge check to unlock the next. Pass the final exam to earn your certification.</div>';
  head.innerHTML='<div class="page-title">Welcome, '+CU.name+'</div>'+reviewNote;
  wrap.appendChild(head);
  const tracks=getMyTracks();
  if(!tracks.length){wrap.innerHTML+='<div style="text-align:center;padding:60px;color:var(--text-3)">No training tracks are assigned to your role yet.</div>';return;}
  tracks.forEach(tid=>{const c=buildTrackCard(tid); if(c) wrap.appendChild(c);});
}

function buildTrackCard(tid){
  const track=TRACKS[tid]; if(!track) return null;
  const mods=myModules(tid);
  if(!mods.length) return null;
  const pct=trackPct(tid);
  const card=document.createElement('div'); card.className='track-card';
  const hdr=document.createElement('div'); hdr.className='track-hdr';
  if(track.comingSoon){
    hdr.innerHTML='<div><div class="track-title-row"><span class="track-dot" style="background:'+track.color+'"></span><span class="track-title" style="color:'+track.color+'">'+track.name+'</span></div><div class="track-tagline">'+track.tagline+'</div></div><span class="mod-badge locked">Coming Soon</span>';
    card.appendChild(hdr);
    const banner=document.createElement('div'); banner.className='coming-soon-banner';
    banner.innerHTML='This training track is in development. Full modules with content, audio, video, and certification will be published here soon.';
    card.appendChild(banner);
    return card;
  }
  hdr.innerHTML='<div><div class="track-title-row"><span class="track-dot" style="background:'+track.color+'"></span><span class="track-title" style="color:'+track.color+'">'+track.name+'</span></div><div class="track-tagline">'+track.tagline+'</div></div><div class="track-prog"><div class="prog-pct" style="color:'+track.color+'">'+pct+'%</div><div class="prog-lbl">Complete</div></div>';
  const bar=document.createElement('div'); bar.className='prog-bar';
  bar.innerHTML='<div class="prog-fill" style="width:'+pct+'%;background:'+track.color+'"></div>';
  const list=document.createElement('div'); list.className='modules-list';
  const adminView=isAdminViewer();
  mods.forEach((mod,i)=>{
    const done=isModDone(tid,mod.id), unlocked=isModUnlocked(tid,mod.id);
    let state=done?'done':unlocked?'active':'locked';
    // In admin review mode an unlocked-but-incomplete module shows as active (not locked styling)
    const p=getProg(CU.id,tid);
    const scoreTxt=(p[mod.id]&&p[mod.id].score!=null)?' · '+p[mod.id].score+'%':'';
    const row=document.createElement('div'); row.className='mod-row'+(unlocked?' clickable':'');
    const numStyle=state==='active'?' style="background:'+track.color+'"':'';
    let badgeTxt;
    if(done) badgeTxt='Done'+scoreTxt;
    else if(adminView) badgeTxt=mod.isFinal?'Review Exam':'Review';
    else if(unlocked) badgeTxt=mod.isFinal?'Final Exam':'Start';
    else badgeTxt='Locked';
    row.innerHTML='<div class="mod-num '+state+'"'+numStyle+'>'+(done?'✓':(i+1))+'</div><div class="mod-info"><div class="mod-title'+(state==='locked'?' locked':'')+'">'+mod.title+'</div><div class="mod-meta">'+(mod.minutes?mod.minutes+' min · ':'')+mod.desc+'</div></div><span class="mod-badge '+state+'">'+badgeTxt+'</span>';
    if(unlocked) row.onclick=()=>openModule(tid,mod.id);
    list.appendChild(row);
  });
  card.appendChild(hdr); card.appendChild(bar); card.appendChild(list);
  return card;
}
function backToDash(){stopAudio();renderDash();window.scrollTo(0,0);}

// ═══ MODULE VIEW ═══
let curTid=null, curMid=null;
function openModule(tid,mid){
  stopAudio();
  curTid=tid; curMid=mid;
  const track=TRACKS[tid], mod=track.modules.find(m=>m.id===mid);
  e('dashView').style.display='none'; e('moduleView').style.display='block';
  window.scrollTo(0,0);
  e('modCrumb').textContent=track.name+' → '+mod.title;
  const wrap=e('modContent'); wrap.innerHTML='';

  const hdr=document.createElement('div'); hdr.className='mod-header';
  const done=isModDone(tid,mid), p=getProg(CU.id,tid);
  let sub=mod.desc;
  if(done&&p[mid]) sub+=' · <span style="color:var(--green);font-weight:600">✓ Completed ('+p[mid].score+'%)</span>';
  hdr.innerHTML='<span class="biz-tag" style="background:'+track.colorL+';color:'+track.color+'">'+track.name+'</span><h1>'+mod.title+'</h1><div class="subtitle">'+sub+'</div>';
  wrap.appendChild(hdr);

  // VIDEO SLOT
  /* Only render a video slot when this module actually has a video.
     Add a URL to the module's "video" field in TRACKS and the player appears
     here on its own; leave it empty and the module simply has no video box. */
  if(mod.video&&mod.video.trim()){
    const vid=document.createElement('div'); vid.className='video-slot';
    const src=mod.video.trim();
    if(/\.(mp4|webm|mov)(\?|$)/i.test(src)){
      /* a real file — use a proper player rather than an iframe */
      /* offer webm alongside mp4 so every browser has a format it can play */
      vid.innerHTML='<video controls playsinline preload="metadata" '+
        'style="width:100%;display:block;aspect-ratio:16/10;background:#000">'+
        '<source src="'+src+'" type="video/mp4">'+
        '</video>';
    } else {
      vid.innerHTML='<iframe src="'+src+'" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>';
    }
    wrap.appendChild(vid);
  }

  // AUDIO BAR
  const abar=document.createElement('div'); abar.className='audio-bar';
  abar.innerHTML='<span class="a-icon">🔊</span><span style="font-size:.78rem;color:rgba(255,255,255,.65);flex-shrink:0">Listen</span><div class="audio-prog" id="audioProg"><div class="audio-fill" id="audioFill"></div></div><span class="audio-time" id="audioTime"></span><button class="audio-btn" id="audioPlayBtn" onclick="toggleAudio()">▶ Play</button>';
  wrap.appendChild(abar);

  // CONTENT — micro-lessons (Cardone style) if present, else single content block
  const content=document.createElement('div'); content.id='modBody';
  if(mod.lessons && mod.lessons.length){
    // Render each micro-lesson as its own numbered card
    mod.lessons.forEach((lesson,li)=>{
      const card=document.createElement('div'); card.className='content-card lesson-card';
      card.innerHTML='<div class="lesson-tag"><span class="lesson-num">Lesson '+(li+1)+' of '+mod.lessons.length+'</span><span class="lesson-title">'+lesson.t+'</span></div>'+lesson.c;
      content.appendChild(card);
    });
  } else {
    // Existing single-content module
    const card=document.createElement('div'); card.className='content-card';
    card.innerHTML=mod.content;
    content.appendChild(card);
  }
  wrap.appendChild(content);

  // QUIZ
  if(mod.quiz&&mod.quiz.length) renderQuiz(wrap,tid,mid,mod);

// ═══ AUDIO (TTS) — natural continuous narration ═══
let synth=window.speechSynthesis, chunks=[], cIdx=0, aPlaying=false, bestVoice=null, voicesReady=false;

// Pick the most natural available English voice once, and re-pick when the list loads.
function pickVoice(){
  const vs=synth.getVoices();
  if(!vs.length) return null;
  // Preference order: known high-quality natural voices, then any en-US, then any en.
  const prefs=[
    v=>/en-US/i.test(v.lang)&&/Google US English/i.test(v.name),
    v=>/en-US/i.test(v.lang)&&/(Samantha|Ava|Allison|Susan|Zoe|Evan|Tom)/i.test(v.name),
    v=>/en-GB/i.test(v.lang)&&/(Daniel|Kate|Serena|Google UK English)/i.test(v.name),
    v=>/en[-_]/i.test(v.lang)&&/natural|neural|premium|enhanced/i.test(v.name),
    v=>/en-US/i.test(v.lang),
    v=>/^en/i.test(v.lang)
  ];
  for(const test of prefs){const m=vs.find(test);if(m)return m;}
  return vs[0];
}
if(synth){
  bestVoice=pickVoice();
  synth.onvoiceschanged=()=>{voicesReady=true;bestVoice=pickVoice();};
}

// Build narration chunks from the rendered content: one chunk per paragraph/heading/list-item group.
// Larger continuous chunks = smooth, natural speech instead of choppy sentence-by-sentence.
function buildChunks(){
  const body=e('modBody'); if(!body) return [];
  const out=[];
  /* Read everything that carries words, including image captions and table cells,
     so nothing on the page is silently skipped by the narrator. */
  const blocks=body.querySelectorAll('h2,h3,h4,p,li,.cb-title,.script-block,.lesson-title,.lesson-num,figcaption,.figcap,td,th,blockquote');
  blocks.forEach(el=>{
    let txt=(el.innerText||el.textContent||'').replace(/\s+/g,' ').trim();
    if(!txt) return;
    // Expand a few symbols so they read naturally.
    txt=txt.replace(/%/g,' percent').replace(/\$/g,' dollars ').replace(/&/g,' and ').replace(/\//g,' ');
    out.push({el, text:txt});
  });
  return out;
}

function toggleAudio(){
  if(aPlaying){pauseAudio();return;}
  if(synth.paused && cIdx>0){synth.resume();aPlaying=true;updateBtn();return;}
  startAudio();
}
function startAudio(){
  synth.cancel();
  chunks=buildChunks();
  if(!chunks.length) return;
  if(!bestVoice) bestVoice=pickVoice();
  cIdx=0; aPlaying=true; updateBtn();
  speakChunk();
}
function speakChunk(){
  if(cIdx>=chunks.length){finishAudio();return;}
  const u=new SpeechSynthesisUtterance(chunks[cIdx].text);
  u.rate=1.0;       // natural conversational pace
  u.pitch=1.0;
  u.volume=1.0;
  if(bestVoice) u.voice=bestVoice;
  u.onstart=()=>{
    const f=e('audioFill'); if(f) f.style.width=Math.round(cIdx/chunks.length*100)+'%';
    const t=e('audioTime'); if(t) t.textContent=Math.round((cIdx+1)/chunks.length*100)+'%';
    highlightChunk(cIdx);
  };
  u.onend=()=>{ if(aPlaying){ cIdx++; speakChunk(); } };
  u.onerror=()=>{ if(aPlaying){ cIdx++; speakChunk(); } };
  synth.speak(u);
}
function finishAudio(){
  aPlaying=false; cIdx=0; updateBtn(); clearHL();
  const f=e('audioFill'); if(f) f.style.width='100%';
  const t=e('audioTime'); if(t) t.textContent='Done';
  setTimeout(()=>{const f2=e('audioFill');if(f2&&!aPlaying)f2.style.width='0%';const t2=e('audioTime');if(t2&&!aPlaying)t2.textContent='';},1500);
}
function pauseAudio(){synth.pause();aPlaying=false;updateBtn();}
function stopAudio(){if(synth)synth.cancel();aPlaying=false;cIdx=0;updateBtn();clearHL();const f=e('audioFill');if(f)f.style.width='0%';const t=e('audioTime');if(t)t.textContent='';}
function updateBtn(){const b=e('audioPlayBtn');if(b)b.textContent=aPlaying?'⏸ Pause':(cIdx>0&&synth&&synth.paused?'▶ Resume':'▶ Play');}
function highlightChunk(idx){
  clearHL();
  const c=chunks[idx]; if(!c||!c.el) return;
  c.el.classList.add('reading-highlight');
  const r=c.el.getBoundingClientRect();
  // Only scroll if the element is out of comfortable view — avoids constant jumpy scrolling.
  if(r.top<90||r.bottom>window.innerHeight-60){
    c.el.scrollIntoView({behavior:'smooth',block:'center'});
  }
}
function clearHL(){document.querySelectorAll('.reading-highlight').forEach(el=>el.classList.remove('reading-highlight'));}

// ═══ QUIZ ═══
let qAns={}, qDone=false;
function renderQuiz(wrap,tid,mid,mod){
  qAns={}; qDone=false;
  const card=document.createElement('div'); card.className='quiz-card'; card.id='quizCard';
  const pass=mod.passingScore||70;
  card.innerHTML='<div class="quiz-hdr"><span class="q-icon">📝</span><div><h2>'+(mod.isFinal?'Final Certification Exam':'Knowledge Check')+'</h2><div class="q-sub">Answer all questions · '+pass+'% required to pass'+(mod.isFinal?' · Earn your certification':'')+'</div></div></div>';
  mod.quiz.forEach((q,qi)=>{
    const item=document.createElement('div'); item.className='q-item';
    item.innerHTML='<div class="q-num">Question '+(qi+1)+' of '+mod.quiz.length+'</div><div class="q-text">'+q.q+'</div>';
    q.opts.forEach((opt,oi)=>{
      const op=document.createElement('div'); op.className='option'; op.dataset.qi=qi; op.dataset.oi=oi;
      op.innerHTML='<div class="opt-radio"></div><span>'+opt+'</span>';
      op.onclick=()=>{if(qDone)return;document.querySelectorAll('.option[data-qi="'+qi+'"]').forEach(o=>o.classList.remove('selected'));op.classList.add('selected');qAns[qi]=oi;};
      item.appendChild(op);
    });
    card.appendChild(item);
  });
  const btn=document.createElement('button'); btn.className='btn btn-gold btn-lg btn-block'; btn.textContent='Submit Answers';
  btn.onclick=()=>submitQuiz(tid,mid,mod,card,btn);
  card.appendChild(btn);
  wrap.appendChild(card);
}
function submitQuiz(tid,mid,mod,card,btn){
  if(Object.keys(qAns).length<mod.quiz.length){toast('Please answer all questions first.');return;}
  qDone=true; btn.style.display='none';
  let correct=0;
  mod.quiz.forEach((q,qi)=>{
    const chosen=qAns[qi];
    document.querySelectorAll('.option[data-qi="'+qi+'"]').forEach(op=>{
      const oi=parseInt(op.dataset.oi);op.classList.remove('selected');
      if(oi===q.ans)op.classList.add(chosen===oi?'correct':'reveal');
      else if(oi===chosen)op.classList.add('wrong');
    });
    if(chosen===q.ans)correct++;
  });
  const score=Math.round(correct/mod.quiz.length*100);
  const passScore=mod.passingScore||70;
  const passed=score>=passScore;
  const res=document.createElement('div'); res.className='quiz-result '+(passed?'pass':'fail');
  res.innerHTML='<div class="qr-score" style="color:'+(passed?'var(--green)':'var(--red)')+'">'+score+'%</div><div class="qr-label" style="color:'+(passed?'var(--green)':'var(--red)')+'">'+(passed?'✓ Passed':'✗ Not Passed')+'</div><div class="qr-msg">'+(passed?('Great work! You got '+correct+' of '+mod.quiz.length+' correct.'):('You got '+correct+' of '+mod.quiz.length+' correct. You need '+passScore+'% to pass.'))+'</div>';
  if(passed){
    setModDone(tid,mid,score);
    const mods=myModules(tid), idx=mods.findIndex(m=>m.id===mid);
    if(idx<mods.length-1){
      const nb=document.createElement('button');nb.className='btn btn-green btn-lg';nb.style.marginTop='14px';
      nb.textContent='Continue to '+mods[idx+1].title+' →';
      nb.onclick=()=>openModule(tid,mods[idx+1].id);
      res.appendChild(nb);
    } else { setTimeout(()=>showCert(tid),500); }
  } else {
    const rb=document.createElement('button');rb.className='btn btn-outline btn-lg';rb.style.marginTop='14px';rb.textContent='↺ Retake';
    rb.onclick=()=>openModule(tid,mid);
    res.appendChild(rb);
  }
  card.appendChild(res);
  res.scrollIntoView({behavior:'smooth',block:'center'});
}
function showCert(tid){
  const track=TRACKS[tid];
  const cert=document.createElement('div'); cert.className='cert';
  cert.innerHTML='<div class="cert-icon">🏆</div><div class="cert-title">Certified</div><div class="cert-name">'+CU.name+'</div><div style="font-size:.86rem;color:var(--gold);margin:6px 0">'+track.name+' Certification</div><div class="cert-sub">Completed '+new Date().toLocaleDateString()+' · All modules passed</div><button class="btn btn-outline" style="margin-top:16px;border-color:var(--gold);color:var(--gold)" onclick="backToDash()">← Back to Training</button>';
  e('modContent').appendChild(cert);
  cert.scrollIntoView({behavior:'smooth',block:'center'});
}

// ═══ ADMIN ═══
function openAdmin(){
  const wrap=e('progressTable');
  const agents=users.filter(u=>{const r=ROLES[u.role];return r&&!(u.role==='owner'||u.role==='ops_director');});
  if(!agents.length){wrap.innerHTML='<p style="font-size:.78rem;color:var(--text-3)">No agents added yet.</p>';}
  else{
    let t='<table class="admin-table"><thead><tr><th>Name</th><th>Role</th><th>Track</th><th>Progress</th></tr></thead><tbody>';
    agents.forEach(u=>{
      const r=ROLES[u.role]; if(!r)return;
      r.tracks.forEach(tid=>{
        const track=TRACKS[tid]; if(!track||track.comingSoon)return;
        const savedCU=CU; CU=u;
        const pct=trackPct(tid); const dn=myModules(tid).filter(m=>m.quiz&&m.quiz.length&&isModDone(tid,m.id)).length;
        const tot=myModules(tid).filter(m=>m.quiz&&m.quiz.length).length;
        CU=savedCU;
        t+='<tr><td><strong>'+u.name+'</strong></td><td>'+r.label+'</td><td>'+track.name+'</td><td><span style="font-weight:600;color:'+(pct===100?'var(--green)':'var(--gold)')+'">'+pct+'%</span> <span style="color:var(--text-3);font-size:.72rem">('+dn+'/'+tot+')</span></td></tr>';
      });
    });
    t+='</tbody></table>'; wrap.innerHTML=t;
  }
  const ul=e('ulist'); ul.innerHTML='';
  users.forEach(u=>{
    const r=ROLES[u.role]||{label:u.role};
    const isSelf=u.id===(CU&&CU.id);
    const row=document.createElement('div'); row.className='si';
    row.innerHTML='<div><div style="font-size:.83rem;font-weight:600">'+u.name+(isSelf?' <span style="font-size:.62rem;color:var(--gold)">(you)</span>':'')+'</div><div style="font-size:.7rem;color:var(--text-3)">'+r.label+' · PIN: '+u.pin+'</div></div>';
    if(!isSelf){const d=document.createElement('button');d.className='btn btn-sm';d.style.cssText='background:var(--red-l);color:var(--red);border:none';d.textContent='Remove';d.onclick=()=>{users=users.filter(x=>x.id!==u.id);sl('rl_tc3_users',users);openAdmin();toast('Removed '+u.name);};row.appendChild(d);}
    ul.appendChild(row);
  });
  e('adminModal').classList.add('open');
}
function addUser(){
  const n=e('uname').value.trim(),p=e('upin').value.trim(),role=e('urole').value;
  if(!n||!p){toast('Name and PIN required');return;}
  users.push({id:'u'+Date.now(),name:n,pin:p,role});

function closeM(id){e(id).classList.remove('open');}
document.querySelectorAll('.ov').forEach(o=>o.addEventListener('click',ev=>{if(ev.target===o)o.classList.remove('open');}));
function toast(m){const t=e('toast');t.textContent=m;t.className='toast show';clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);}
init();
</script>
