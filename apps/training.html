<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Real Living — Training Center</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#B8972A;--gold-l:#FBF6E0;--gold-d:#7A6010;
  --black:#0E0E0E;--off:#F8F7F4;--white:#fff;
  --border:rgba(0,0,0,.08);--border-med:rgba(0,0,0,.13);
  --text:#1a1a1a;--text-2:#6b6b6b;--text-3:#9a9a9a;
  --green:#1A6B2A;--green-l:#EAF3DE;
  --red:#B82020;--red-l:#FDECEA;
  --blue:#1848A0;--blue-l:#E6EDF8;
  --asap:#C0392B;--asap-l:#FDECEA;
  --h2m:#1A6B2A;--h2m-l:#EAF3DE;
  --lic:#1848A0;--lic-l:#E6EDF8;
  --r:12px;--r-sm:7px;
  --shadow:0 1px 4px rgba(0,0,0,.05),0 4px 18px rgba(0,0,0,.06);
  --shadow-lg:0 12px 40px rgba(0,0,0,.16);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--off);color:var(--text);min-height:100vh}

/* BAR */
.bar{background:var(--black);height:58px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:2.5px solid var(--gold);position:sticky;top:0;z-index:100;gap:12px}
.bar-brand{display:flex;align-items:baseline;gap:9px;min-width:0}
.brand{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:#fff;font-weight:400;white-space:nowrap}
.brand em{color:var(--gold);font-style:normal}
.bsub{font-size:.58rem;color:rgba(255,255,255,.32);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.bar-r{display:flex;gap:7px;align-items:center;flex-shrink:0}
.utag{font-size:.68rem;color:rgba(255,255,255,.55);padding:4px 11px;border:1px solid rgba(255,255,255,.13);border-radius:20px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 15px;border-radius:var(--r-sm);font-size:.76rem;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;text-decoration:none;-webkit-appearance:none}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:var(--gold-d)}.btn-gold:active{transform:scale(.98)}
.btn-ghost{background:rgba(255,255,255,.08);color:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.15)}.btn-ghost:hover{color:var(--gold);border-color:var(--gold)}
.btn-outline{background:var(--white);color:var(--text);border:1.5px solid var(--border-med)}.btn-outline:hover{border-color:var(--gold);color:var(--gold-d)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#14571f}
.btn-sm{padding:6px 11px;font-size:.71rem}
.btn-lg{padding:12px 26px;font-size:.88rem;font-weight:600}
.btn-block{width:100%}

/* LOGIN */
#loginView{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.lbox{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:42px 38px;width:100%;max-width:380px;box-shadow:var(--shadow-lg)}
.llogo{text-align:center;margin-bottom:30px}
.llogo-mark{font-family:'Cormorant Garamond',serif;font-size:2.5rem;color:var(--black);line-height:1}
.llogo-mark em{color:var(--gold);font-style:normal}
.llogo-sub{font-size:.64rem;color:var(--text-3);margin-top:7px;text-transform:uppercase;letter-spacing:.16em;font-weight:500}
.llogo-div{width:38px;height:2px;background:var(--gold);margin:13px auto 0;border-radius:2px}
.ig{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.ig label{font-size:.68rem;font-weight:500;color:var(--text-2)}
.ig input,.ig select{border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px 13px;font-size:.88rem;font-family:'DM Sans',sans-serif;background:var(--off);color:var(--text);width:100%;transition:all .15s}
.ig input:focus,.ig select:focus{outline:none;border-color:var(--gold);background:var(--white);box-shadow:0 0 0 3px rgba(184,151,42,.1)}

/* DASHBOARD */
#mainView{display:none}
.wrap{max-width:920px;margin:0 auto;padding:26px 16px 90px}
.page-head{margin-bottom:24px}
.page-title{font-family:'Cormorant Garamond',serif;font-size:1.75rem;color:var(--black)}
.page-sub{font-size:.8rem;color:var(--text-2);margin-top:5px;line-height:1.6}

/* TRACK CARD */
.track-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:18px;box-shadow:var(--shadow)}
.track-hdr{padding:20px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;border-bottom:1px solid var(--border)}
.track-title-row{display:flex;align-items:center;gap:11px}
.track-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.track-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:500}
.track-tagline{font-size:.7rem;color:var(--text-3);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.track-prog{text-align:right;min-width:80px}
.prog-pct{font-size:1.5rem;font-weight:600;line-height:1}
.prog-lbl{font-size:.61rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.prog-bar{height:5px;background:var(--off);margin:0;overflow:hidden}
.prog-fill{height:100%;transition:width .6s cubic-bezier(.4,0,.2,1)}
.modules-list{padding:8px 24px 20px}
.mod-row{display:flex;align-items:center;gap:13px;padding:12px 0;border-bottom:1px solid var(--border)}
.mod-row:last-child{border-bottom:none}
.mod-row.clickable{cursor:pointer}.mod-row.clickable:hover .mod-title{color:var(--gold-d)}
.mod-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0}
.mod-num.done{background:var(--green);color:#fff}
.mod-num.active{color:#fff}
.mod-num.locked{background:var(--off);color:var(--text-3);border:1.5px solid var(--border)}
.mod-info{flex:1;min-width:0}
.mod-title{font-size:.86rem;font-weight:600;color:var(--text);line-height:1.3}
.mod-title.locked{color:var(--text-3)}
.mod-meta{font-size:.69rem;color:var(--text-3);margin-top:2px}
.mod-badge{font-size:.6rem;font-weight:600;padding:3px 9px;border-radius:11px;white-space:nowrap}
.mod-badge.done{background:var(--green-l);color:var(--green)}
.mod-badge.active{background:var(--gold-l);color:var(--gold-d)}
.mod-badge.locked{background:var(--off);color:var(--text-3)}
.coming-soon-banner{padding:24px;text-align:center;color:var(--text-3);font-size:.82rem;line-height:1.6}

/* MODULE VIEW */
#moduleView{display:none}
.mod-topbar{background:var(--black);height:46px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:58px;z-index:90;border-top:1px solid rgba(255,255,255,.06)}
.mod-crumb{font-size:.73rem;color:rgba(255,255,255,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;text-align:center;padding:0 10px}
.mod-wrap{max-width:780px;margin:0 auto;padding:26px 16px 90px}
.mod-header{background:var(--white);border-radius:var(--r);padding:24px 28px;margin-bottom:18px;border:1.5px solid var(--border);box-shadow:var(--shadow)}
.biz-tag{font-size:.62rem;font-weight:700;padding:4px 10px;border-radius:5px;text-transform:uppercase;letter-spacing:.06em;display:inline-block;margin-bottom:11px}
.mod-header h1{font-family:'Cormorant Garamond',serif;font-size:1.85rem;color:var(--black);margin-bottom:6px;line-height:1.15}
.mod-header .subtitle{font-size:.79rem;color:var(--text-2);line-height:1.5}

/* VIDEO */
.video-slot{background:var(--black);border-radius:var(--r);overflow:hidden;margin-bottom:18px;box-shadow:var(--shadow);position:relative}
.video-slot iframe{width:100%;aspect-ratio:16/9;display:block;border:none}
.video-placeholder{aspect-ratio:16/9;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#1a1a1a,#2a2a2a);color:rgba(255,255,255,.5);cursor:default}
.video-placeholder .vp-icon{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:1.4rem;border:1.5px solid rgba(255,255,255,.15)}
.video-placeholder .vp-text{font-size:.78rem;font-weight:500}
.video-placeholder .vp-sub{font-size:.66rem;color:rgba(255,255,255,.3)}

/* AUDIO */
.audio-bar{background:var(--black);border-radius:var(--r);padding:13px 18px;display:flex;align-items:center;gap:13px;margin-bottom:18px}
.audio-bar .a-icon{font-size:1.05rem}
.audio-prog{flex:1;height:5px;background:rgba(255,255,255,.13);border-radius:3px;overflow:hidden;cursor:pointer}
.audio-fill{height:100%;background:var(--gold);border-radius:3px;width:0%;transition:width .3s}
.audio-time{font-size:.65rem;color:rgba(255,255,255,.42);white-space:nowrap;min-width:54px;text-align:right}
.audio-btn{background:var(--gold);color:#fff;border:none;border-radius:20px;padding:7px 16px;font-size:.74rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.audio-btn:active{transform:scale(.97)}

/* CONTENT */
.content-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:30px 34px;margin-bottom:18px;box-shadow:var(--shadow);font-size:.94rem;line-height:1.85;color:#1e1e1e}
.content-card h2{font-family:'Cormorant Garamond',serif;font-size:1.55rem;color:var(--black);margin:1.6em 0 .5em;padding-bottom:.3em;border-bottom:1.5px solid var(--gold-l)}
.content-card h2:first-child{margin-top:0}
.content-card h3{font-size:.82rem;font-weight:700;color:var(--black);margin:1.4em 0 .4em;text-transform:uppercase;letter-spacing:.05em}
.content-card p{margin-bottom:.9em}
.content-card ul,.content-card ol{margin:.5em 0 1em 1.5em}
.content-card li{margin-bottom:.4em;line-height:1.7}
.content-card strong{font-weight:700;color:var(--black)}
.callout-box{border-radius:var(--r-sm);padding:15px 18px;margin:1.3em 0}
.callout-box .cb-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.callout-box.highlight{background:var(--gold-l);border-left:3px solid var(--gold)}
.callout-box.highlight .cb-title{color:var(--gold-d)}
.callout-box.critical{background:var(--red-l);border-left:3px solid var(--red)}
.callout-box.critical .cb-title{color:var(--red)}
.callout-box.info{background:var(--blue-l);border-left:3px solid var(--blue)}
.callout-box.info .cb-title{color:var(--blue)}
.callout-box p:last-child,.callout-box ul:last-child{margin-bottom:0}
.script-block{background:rgba(0,0,0,.03);border:1px dashed var(--border-med);border-radius:var(--r-sm);padding:13px 16px;font-size:.88rem;line-height:1.6;color:var(--text)}
.reading-highlight{background:rgba(184,151,42,.2)!important;border-radius:3px;transition:background .3s}
.lesson-card{position:relative}
.lesson-tag{display:flex;flex-direction:column;gap:3px;margin-bottom:14px;padding-bottom:13px;border-bottom:2px solid var(--gold-l)}
.lesson-num{font-size:.62rem;font-weight:700;color:var(--gold-d);text-transform:uppercase;letter-spacing:.08em}
.lesson-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--black);font-weight:500;line-height:1.15}

/* QUIZ */
.quiz-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:30px 34px;margin-bottom:18px;box-shadow:var(--shadow)}
.quiz-hdr{display:flex;align-items:center;gap:12px;margin-bottom:22px;padding-bottom:16px;border-bottom:1.5px solid var(--border)}
.quiz-hdr .q-icon{font-size:1.5rem}
.quiz-hdr h2{font-family:'Cormorant Garamond',serif;font-size:1.35rem;color:var(--black)}
.quiz-hdr .q-sub{font-size:.72rem;color:var(--text-2);margin-top:3px}
.q-item{margin-bottom:24px}
.q-item .q-num{font-size:.64rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.q-item .q-text{font-size:.91rem;font-weight:600;color:var(--black);margin-bottom:11px;line-height:1.5}
.option{display:flex;align-items:center;gap:11px;padding:11px 15px;border:1.5px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px;cursor:pointer;transition:all .14s;font-size:.85rem}
.option:hover{border-color:var(--gold);background:var(--gold-l)}
.option.selected{border-color:var(--gold);background:var(--gold-l);color:var(--gold-d)}
.option.correct{border-color:var(--green);background:var(--green-l);color:var(--green);cursor:default}
.option.wrong{border-color:var(--red);background:var(--red-l);color:var(--red);cursor:default}
.option.reveal{border-color:var(--green);background:var(--green-l);color:var(--green);cursor:default}
.opt-radio{width:19px;height:19px;border-radius:50%;border:2px solid var(--border-med);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .14s}
.option.selected .opt-radio{background:var(--gold);border-color:var(--gold)}
.option.correct .opt-radio,.option.reveal .opt-radio{background:var(--green);border-color:var(--green)}
.option.wrong .opt-radio{background:var(--red);border-color:var(--red)}
.opt-radio::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff;display:none}
.option.selected .opt-radio::after,.option.correct .opt-radio::after,.option.wrong .opt-radio::after,.option.reveal .opt-radio::after{display:block}
.quiz-result{padding:22px;border-radius:var(--r);text-align:center;margin-top:22px}
.quiz-result.pass{background:var(--green-l);border:1.5px solid rgba(26,107,42,.2)}
.quiz-result.fail{background:var(--red-l);border:1.5px solid rgba(184,32,32,.15)}
.qr-score{font-size:2.6rem;font-weight:700;line-height:1}
.qr-label{font-size:.8rem;margin-top:6px;font-weight:600}
.qr-msg{font-size:.82rem;color:var(--text-2);margin-top:9px;line-height:1.6}

/* CERT */
.cert{background:var(--black);border-radius:var(--r);padding:30px;text-align:center;margin-bottom:18px;border:2px solid var(--gold)}
.cert-icon{font-size:2.6rem;margin-bottom:13px}
.cert-title{font-family:'Cormorant Garamond',serif;font-size:1.7rem;color:var(--gold);margin-bottom:6px}
.cert-name{font-size:1.05rem;color:#fff;margin-bottom:5px}
.cert-sub{font-size:.74rem;color:rgba(255,255,255,.5)}

/* ADMIN */
.admin-table{width:100%;border-collapse:collapse;font-size:.82rem}
.admin-table th{background:var(--black);color:var(--gold);font-weight:600;padding:9px 13px;text-align:left;font-size:.71rem;text-transform:uppercase;letter-spacing:.05em}
.admin-table td{padding:9px 13px;border-bottom:1px solid var(--border)}
.admin-table tr:last-child td{border-bottom:none}
.admin-table tr:nth-child(even) td{background:var(--off)}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.modal{background:var(--white);border-radius:18px 18px 0 0;padding:26px 22px 38px;width:100%;max-width:540px;box-shadow:var(--shadow-lg);max-height:90vh;overflow-y:auto}
@media(min-width:600px){.ov{align-items:center}.modal{border-radius:16px;padding:28px}}
.modal-handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
@media(min-width:600px){.modal-handle{display:none}}
.modal h3{font-family:'Cormorant Garamond',serif;font-size:1.35rem;margin-bottom:.3rem}
.modal p{font-size:.76rem;color:var(--text-2);margin-bottom:.9rem;line-height:1.6}
.dvd{font-size:.62rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.09em;margin:16px 0 9px;padding-bottom:.3rem;border-bottom:1.5px dashed var(--border)}
.si{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--black);color:#fff;padding:11px 20px;border-radius:24px;font-size:.78rem;font-weight:500;z-index:400;opacity:0;transition:all .26s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:600px){
  .bar{padding:0 14px;height:54px}.utag{display:none}
  .wrap,.mod-wrap{padding:16px 12px 90px}
  .content-card,.quiz-card{padding:20px 17px}
  .mod-header{padding:18px 19px}
  .content-card h2{font-size:1.35rem}.mod-header h1{font-size:1.5rem}
  .track-hdr{padding:16px 18px}.modules-list{padding:6px 18px 16px}
  .mod-topbar{top:54px}
}
@media print{.video-slot,.audio-bar,.mod-topbar,.bar{display:none!important}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView">
  <div class="lbox">
    <div class="llogo">
      <div class="llogo-mark">Real <em>Living</em></div>
      <div class="llogo-sub">Training Center</div>
      <div class="llogo-div"></div>
    </div>
    <div class="ig"><label>Your name</label><input id="lname" type="text" placeholder="Full name" autofocus autocomplete="name"></div>
    <div class="ig" style="margin-bottom:16px"><label>PIN</label><input id="lpin" type="password" placeholder="••••" maxlength="8" autocomplete="current-password"></div>
    <div id="lerr" style="color:var(--red);font-size:.72rem;margin-bottom:10px;text-align:center;display:none;background:var(--red-l);padding:9px;border-radius:var(--r-sm)"></div>
    <button class="btn btn-gold btn-lg btn-block" onclick="doLogin()">Sign In →</button>
  </div>
</div>

<!-- MAIN -->
<div id="mainView">
  <div class="bar">
    <div class="bar-brand"><span class="brand">Real <em>Living</em></span><span class="bsub">Training</span></div>
    <div class="bar-r">
      <span class="utag" id="utag"></span>
      <button class="btn btn-ghost btn-sm" id="adminBtn" style="display:none" onclick="openAdmin()">⚙ Admin</button>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div id="dashView" class="wrap"></div>
  <div id="moduleView">
    <div class="mod-topbar">
      <button class="btn btn-ghost btn-sm" onclick="backToDash()">← Back</button>
      <div class="mod-crumb" id="modCrumb"></div>
      <div style="width:60px"></div>
    </div>
    <div class="mod-wrap" id="modContent"></div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div class="ov" id="adminModal">
  <div class="modal">
    <span class="modal-handle"></span>
    <h3>Training Admin</h3>
    <p>View agent progress across all tracks and manage users. Each user sees only the training for their role.</p>
    <div class="dvd">Agent Progress</div>
    <div id="progressTable" style="overflow-x:auto;margin-bottom:16px"></div>
    <div class="dvd">Add User</div>
    <div class="g2" style="margin-bottom:9px">
      <div class="ig"><label>Full name</label><input id="uname" type="text" placeholder="Name"></div>
      <div class="ig"><label>PIN</label><input id="upin" type="text" placeholder="e.g. 4321"></div>
    </div>
    <div class="ig" style="margin-bottom:13px"><label>Role</label>
      <select id="urole">
        <option value="marketer">Marketer (H2M)</option>
        <option value="senior_marketer">Senior Marketer (H2M)</option>
        <option value="team_lead">Team Lead (H2M)</option>
        <option value="sales_manager">Sales Manager (H2M)</option>
        <option value="marketing_director">Marketing Director (H2M)</option>
        <option value="asap_agent">ASAP Lending Agent</option>
        <option value="asap_team_lead">ASAP Team Lead</option>
        <option value="licensed_agent">Licensed Agent (RL)</option>
        <option value="ops_director">Operations Director (all)</option>
        <option value="owner">Owner (all)</option>
      </select>
    </div>
    <button class="btn btn-green btn-lg btn-block" onclick="addUser()">Add User</button>
    <div class="dvd" style="margin-top:18px">All Users</div>
    <div id="ulist"></div>
    <button class="btn btn-outline btn-block" style="margin-top:14px" onclick="closeM('adminModal')">Close</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══ TRAINING DATA ═══
const TRACKS = {
  "crm": {
    "name": "How to Use the CRM",
    "tagline": "The working manual for the system you live in every day",
    "color": "#2C6E8E",
    "colorL": "#E8F2F7",
    "modules": [
      {
        "id": "crm_1",
        "title": "Getting started",
        "desc": "What the CRM is, what your dashboard shows you, and how to move around it",
        "minutes": 26,
        "roles": [

        "video": "vid/crm_1.mp4",
        "lessons": [
          {
            "t": "What this module covers",
            "c": "<p>What the CRM is, what your dashboard shows you, and how to move around it</p><p>Work through it in order \u2014 each part builds on the one before.</p><ul><li>What the CRM is</li><li>What the dashboard is, and what it does</li><li>Needs attention \u2014 the most important panel on the screen</li><li>Your counters \u2014 what they mean</li><li>Multi-product clients, and why they get their own panel</li><li>Moving around \u2014 the left rail</li><li>Filtering, and adding things without losing your place</li><li>Signing in, and what to do when you cannot</li></ul><p>It should take about 26 minutes. There is a short knowledge check at the end.</p>"
          },
          {
            "t": "What the CRM is",
            "c": "<p>The CRM is the single place where every person, property, deal and conversation in the business is recorded. If it is not in here, it did not happen \u2014 that is not a figure of speech, it is how the company actually operates. Commission is calculated from it, reports are drawn from it, and when someone is away, it is the only way anyone else can pick up their work.</p><p>All four businesses run inside it. ASAP Lending, H2M, the licensed RL team and Transaction Coordination share one system rather than four. The screens, the buttons and the way everything behaves are <strong>identical</strong> across all of them. The only thing that changes from one person to the next is which pipelines appear down the left-hand side.</p><p>That matters for you personally. If you start on ASAP and later pick up owner-finance work, there is nothing new to learn about the tool \u2014 only about the work itself. The skills you build in your first week carry across every part of the company.</p>"
          },
          {
            "t": "What the dashboard is, and what it does",
            "c": "<p>The dashboard is the screen you land on every time you sign in. Its job is to answer one question before you have to ask it: <em>what needs me today?</em></p><p>It is not a summary of the business and it is not a report. It is a worklist, arranged in the order you should deal with things. Everything urgent is at the top, everything informative is below. If you read it from the top down and work as you go, you will have handled the most valuable thing available to you before you have made a single decision about what to do.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/dash.png\" style=\"width:100%;display:block\" alt=\"The dashboard. Urgent items at the top, your numbers in the middle, your day at the bottom.\"/><div style=\"position:absolute;left:0.00%;top:0.00%;width:15.42%;height:100.00%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div><div style=\"position:absolute;left:17.22%;top:17.67%;width:80.97%;height:29.33%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">The dashboard. Urgent items at the top, your numbers in the middle, your day at the bottom.</figcaption></figure><p>Reading down it, you will see four things: what needs attention right now, your counters for the month, the clients who are worth protecting hardest, and then your calendar and upcoming appointments.</p>"
          },
          {
            "t": "Needs attention \u2014 the most important panel on the screen",
            "c": "<p>The top block is called <strong>Needs attention</strong>, and it holds two kinds of item: tasks that are past their due date, and deals that have not moved in a while.</p><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_needs.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Each row tells you the client, what is wrong, which business it belongs to, which stage it is sitting in, and whose deal it is. The dot on the left is severity \u2014 red is overdue, amber is drifting.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Each row tells you the client, what is wrong, which business it belongs to, which stage it is sitting in, and whose deal it is. The dot on the left is severity \u2014 red is overdue, amber is drifting.</figcaption></figure><p>The second kind matters more than it looks. A deal that has stopped moving is the most common way money is lost in this business, and it never announces itself. Nobody calls to say they have gone cold. They simply stop replying, and unless something surfaces that silence, the deal quietly dies while everyone assumes it is fine.</p><p>The CRM watches the clock on every open deal and pushes the quiet ones up here. Working this panel first, every day, is the single highest-value habit in the whole system.</p><div class=\"callout-box info\"><div class=\"cb-title\">What to do with a row</div><p>Every row has a button. Overdue tasks can be marked done from here. Drifting deals open straight into the deal so you can call the client, log what happened and move it on. You should be able to clear this panel most mornings.</p></div>"
          },
          {
            "t": "Your counters \u2014 what they mean",
            "c": "<p>Below the urgent block sits a row of counters describing your month.</p><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_counters.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Left to right: appointments booked in the next seven days, closings so far this month with how many are at the table, active deals with how many opened this month, active properties, and revenue generated month-to-date with whether you are on pace.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Left to right: appointments booked in the next seven days, closings so far this month with how many are at the table, active deals with how many opened this month, active properties, and revenue generated month-to-date with whether you are on pace.</figcaption></figure><p>These are live. They move as you work, which is the point \u2014 they are meant to be glanced at several times a day rather than studied once a week. The arrows beside some of them show the direction of travel against the previous period, so a green arrow means you are ahead of where you were.</p><p>On the right-hand end is a breakdown of deals closed by vertical for the year. If you work more than one side of the business, that is where you see which one is actually producing for you.</p>"
          },
          {
            "t": "Multi-product clients, and why they get their own panel",
            "c": "<p>Further down is a panel listing clients who are buying from more than one of our businesses at the same time \u2014 someone taking an ASAP loan who is also buying a house through the licensed team, for example.</p><p>They get their own panel because those relationships are the hardest to win and the most expensive to lose. A client with one deal is a customer. A client with three is a relationship, and a bad experience on any one of them puts all three at risk. The panel exists so nobody treats one of these people as just another row in a pipeline.</p>"
          },
          {
            "t": "Moving around \u2014 the left rail",
            "c": "<p>The rail down the left is how you get everywhere. It is grouped by business, and underneath those groups is a shared section that everyone has regardless of role.</p><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_rail.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Your business groups come first \u2014 you only see the ones you work. Underneath sits the shared section: Contacts, Properties, Calendar, Communications, Reports, Commissions, Follow-Ups and Settings.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Your business groups come first \u2014 you only see the ones you work. Underneath sits the shared section: Contacts, Properties, Calendar, Communications, Reports, Commissions, Follow-Ups and Settings.</figcaption></figure><p>The shared section is the same for everyone in the company. The business groups are not \u2014 they are drawn from your seat. An ASAP agent sees ASAP. Someone working two sides sees both.</p><div class=\"callout-box info\"><div class=\"cb-title\">If a whole section seems to be missing</div><p>That is almost always access rather than a fault. Your seat controls which pipelines appear. Ask an owner to check it rather than assuming the CRM is broken.</p></div>"
          },
          {
            "t": "Filtering, and adding things without losing your place",
            "c": "<p>If you work more than one business, the dashboard shows you a blended picture by default, which describes neither one accurately.</p><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_vertfilter.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"The vertical filter narrows the entire dashboard \u2014 every panel and every counter \u2014 down to one business at a time.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">The vertical filter narrows the entire dashboard \u2014 every panel and every counter \u2014 down to one business at a time.</figcaption></figure><p>Along the top right sit the quick-add buttons. These work from wherever you are, so when a client mentions something mid-call you can capture it immediately rather than trying to remember it afterwards.</p><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_quickadd.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"A contact, a deal, an appointment or a logged call can be started from any screen. The form opens over the top of what you were doing and returns you to it when you save.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">A contact, a deal, an appointment or a logged call can be started from any screen. The form opens over the top of what you were doing and returns you to it when you save.</figcaption></figure>"
          },
          {
            "t": "Signing in, and what to do when you cannot",
            "c": "<p>You have <strong>one</strong> login for everything. You sign in once through the Business Suite and that carries you into the CRM, the Document Hub, the Training Center and the inventory app without signing in again.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/settings.png\" style=\"width:100%;display:block\" alt=\"Settings, where your own details live\"/></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">Settings, where your own details live</figcaption></figure><p>If you cannot get in, reset your password from the Business Suite sign-in screen rather than from inside any individual app. If you can sign in but a whole app or section is missing, that is not a password problem \u2014 it is what your seat allows, and an owner can change it in seconds.</p>"
          },
          {
            "t": "Quick reference",
            "c": "<p>The short version, for coming back to later.</p><ul><li>The dashboard answers one question: what needs me today. Work it top-down.</li><li>Needs attention holds overdue tasks and deals that have stopped moving. Clear it every morning.</li><li>Counters are live \u2014 glance at them through the day, do not study them weekly.</li><li>The rail is grouped by business. A missing section means your seat, not a fault.</li><li>One login covers every app. Reset from the Business Suite sign-in screen.</li></ul><p>The video at the top of this module walks through all of it on screen.</p>"
          },
          {
            "t": "Before you move on",
            "c": "<p>Quick recap of what you should now be able to do.</p><ul><li>What the CRM is</li><li>What the dashboard is, and what it does</li><li>Needs attention \u2014 the most important panel on the screen</li><li>Your counters \u2014 what they mean</li><li>Multi-product clients, and why they get their own panel</li><li>Moving around \u2014 the left rail</li><li>Filtering, and adding things without losing your place</li><li>Signing in, and what to do when you cannot</li></ul><p>If any of those are still unclear, scroll back up to that section before taking the knowledge check. You can return to this module at any time.</p>"
          }
        ],

      {
        "id": "crm_2",
        "title": "Contacts \u2014 the people",
        "desc": "What a contact is, why one person means one record, and how to add someone properly",
        "minutes": 30,
        "roles": [
          "ALL"
        ],
        "video": "vid/crm_2.mp4",
        "lessons": [
          {
            "t": "What this module covers",
            "c": "<p>What a contact is, why one person means one record, and how to add someone properly</p><p>Work through it in order \u2014 each part builds on the one before.</p><ul><li>What a contact is</li><li>One person means one record, for life</li><li>What you see inside a contact</li><li>Adding someone \u2014 what is actually required</li><li>Lead source \u2014 optional in theory, essential in practice</li><li>Spouses, co-buyers and everyone else on the deal</li><li>The guided intake \u2014 for live calls</li></ul><p>It should take about 30 minutes. There is a short knowledge check at the end.</p>"
          },
          {
            "t": "What a contact is",
            "c": "<p>A contact is a person. Not a lead, not a deal, not an opportunity \u2014 a human being with a phone number, who may do business with us once, five times, or never.</p><p>That distinction matters because of how the rest of the CRM hangs together. Deals attach to contacts. Appointments attach to contacts. Calls, texts, tasks and notes all attach to contacts. The contact record is the spine, and everything else is ribs coming off it.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/contacts.png\" style=\"width:100%;display:block\" alt=\"The contacts list. Every buyer, seller, investor and lender in the business.\"/><div style=\"position:absolute;left:66.04%;top:9.11%;width:15.28%;height:4.00%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div><div style=\"position:absolute;left:17.22%;top:22.44%;width:80.97%;height:76.00%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">The contacts list. Every buyer, seller, investor and lender in the business.</figcaption></figure><p>What that gives you is a single place to answer the question <em>what is going on with this person?</em> \u2014 without having to check four screens and hope you remembered all of them.</p>"
          },
          {
            "t": "One person means one record, for life",
            "c": "<p>Each person gets <strong>one</strong> contact record and keeps it forever. Someone who buys a house from us in March and sells one through us two years later is the same contact with a second deal attached \u2014 not a new person who happens to share a name.</p><p>This is the rule people break most often, usually with good intentions. They cannot immediately find someone, so they create them again. Now there are two.</p><p>The damage is not tidiness, it is real. Their history splits in half \u2014 some calls on one record, some on the other. The follow-up system looks at both and concludes both have gone cold, so it nags you about a client you spoke to yesterday. Worst of all, two people on the team can be working the same person from different records without either of them knowing, which the client absolutely notices.</p><div class=\"callout-box critical\"><div class=\"cb-title\">Search before you create</div><p>Name, phone or email. It takes three seconds. It is the single easiest thing you can do to keep this database worth trusting, and it costs nothing.</p></div>"
          },
          {
            "t": "What you see inside a contact",
            "c": "<p>Opening someone gives you their whole relationship with the company on one page.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/contact_detail.png\" style=\"width:100%;display:block\" alt=\"A contact record: their details, their deals, and the full timeline of everything that has happened.\"/><div style=\"position:absolute;left:15.42%;top:6.44%;width:84.58%;height:93.56%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">A contact record: their details, their deals, and the full timeline of everything that has happened.</figcaption></figure><p>You get their contact details and lead source at the top, every deal they have with us \u2014 across all four businesses, not just yours \u2014 and underneath, a timeline of every call, text, appointment, task and note in date order.</p><p>That timeline is what makes a handover possible. If you are covering for someone, you read the last few entries and you know where things stand before you dial.</p>"
          },
          {
            "t": "Adding someone \u2014 what is actually required",
            "c": "<p>The form looks long. It is not; almost all of it is optional.</p><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_name.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Full name. Required.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Full name. Required.</figcaption></figure><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_phone.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Phone number. Required. That is genuinely the whole minimum.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Phone number. Required. That is genuinely the whole minimum.</figcaption></figure><p>Everything else can be filled in later as you learn it. This is deliberate, because the alternative is worse: a perfect record you never created because the call ended before you finished typing. Get the person into the system <em>during</em> the conversation, then go back and enrich it.</p>"
          },
          {
            "t": "Lead source \u2014 optional in theory, essential in practice",
            "c": "<p>Lead source is not a required field and it should be treated as one anyway.</p><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_source.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Where this person came from \u2014 a campaign, a referral, a portal, a sign. Pick the closest match rather than leaving it blank.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Where this person came from \u2014 a campaign, a referral, a portal, a sign. Pick the closest match rather than leaving it blank.</figcaption></figure><p>It is the only way the company learns which advertising actually produces business. Every contact saved without a source makes the marketing picture slightly less true, and enough of them make it useless. Decisions about where to spend money next month are made from this field.</p><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_route.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Routing to a vertical puts the person in front of the right pipeline from the moment they are created, rather than sitting unassigned until someone notices.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Routing to a vertical puts the person in front of the right pipeline from the moment they are created, rather than sitting unassigned until someone notices.</figcaption></figure>"
          },
          {
            "t": "Spouses, co-buyers and everyone else on the deal",
            "c": "<p>A married couple buying together is one household making one decision, not two unrelated contacts who happen to share an address.</p><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_spouse.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Add the second person here, on the same record, so the household stays together and either partner can be reached from the same place.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Add the second person here, on the same record, so the household stays together and either partner can be reached from the same place.</figcaption></figure><p>Practically, this means whoever picks up the file can see both names and both numbers without hunting. It also stops the same household being counted twice in your pipeline, which inflates your numbers and makes your follow-ups messy.</p>"
          },
          {
            "t": "The guided intake \u2014 for live calls",
            "c": "<p>Intake is a structured version of the conversation you should be having anyway. It walks the qualifying questions in order, on screen, while you are talking.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/f_intake.png\" style=\"width:100%;display:block\" alt=\"The guided intake. Work down it during the call rather than reconstructing it afterwards.\"/><div style=\"position:absolute;left:31.94%;top:29.56%;width:36.11%;height:40.89%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">The guided intake. Work down it during the call rather than reconstructing it afterwards.</figcaption></figure><p>It exists because the single most common cause of a dead deal is a question nobody asked at the start. You find out in week three that there was never a down payment, or no clear exit, or that the property was never actually under contract. Intake front-loads those questions so you find out in minute three instead.</p><p>Using it live feels awkward for about two calls. After that it becomes the reason your files are cleaner than everyone else's and your deals stop dying at week three.</p><div class=\"callout-box highlight\"><div class=\"cb-title\">The green light</div><p>A property in mind, a clear exit or plan, and money available to close. When all three are true you have a real deal in front of you \u2014 move it the same day rather than letting it cool.</p></div>"
          },
          {
            "t": "Quick reference",
            "c": "<p>The short version, for coming back to later.</p><ul><li>One person, one contact record, for life. Search before you create.</li><li>Only name and phone are required. Fill the rest as you learn it.</li><li>Lead source drives every decision about where we spend money. Never leave it blank.</li><li>A duplicate splits their history and misfires follow-ups. It is the costliest mistake here.</li><li>Spouses and co-buyers go on the same record \u2014 one household, one decision.</li><li>Use the guided intake live, during the call, not afterwards.</li></ul><p>The video at the top of this module walks through all of it on screen.</p>"
          },
          {
            "t": "Before you move on",
            "c": "<p>Quick recap of what you should now be able to do.</p><ul><li>What a contact is</li><li>One person means one record, for life</li><li>What you see inside a contact</li><li>Adding someone \u2014 what is actually required</li><li>Lead source \u2014 optional in theory, essential in practice</li><li>Spouses, co-buyers and everyone else on the deal</li><li>The guided intake \u2014 for live calls</li></ul><p>If any of those are still unclear, scroll back up to that section before taking the knowledge check. You can return to this module at any time.</p>"
          }

        "lessons": [
          {
            "t": "What this module covers",
            "c": "<p>Importing lists, saving the searches you repeat, and finding anything fast</p><p>Work through it in order \u2014 each part builds on the one before.</p><ul><li>What importing is for</li><li>The column mapping is the entire job</li><li>Smart lists \u2014 saving a search you keep running</li><li>Cross-search \u2014 when you only half remember</li></ul><p>It should take about 22 minutes. There is a short knowledge check at the end.</p>"
          },
          {
            "t": "What importing is for",
            "c": "<p>Importing takes a list of people held somewhere else \u2014 a spreadsheet from a campaign, a purchased list, an export from another system \u2014 and turns each row into a contact record.</p><p>The rule of thumb is simple. More than a handful of people belongs in an import. Fewer than that is faster typed in by hand.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/f_import.png\" style=\"width:100%;display:block\" alt=\"The import screen. Upload the file, map the columns, check the preview, confirm.\"/><div style=\"position:absolute;left:15.42%;top:6.44%;width:84.58%;height:93.56%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">The import screen. Upload the file, map the columns, check the preview, confirm.</figcaption></figure>"
          },
          {
            "t": "The column mapping is the entire job",
            "c": "<p>A spreadsheet has columns and the CRM has fields, and they almost never line up on their own. Mapping is where you tell the system which column holds the name, which holds the phone, which holds the email.</p><p>This is the step that decides whether the import is useful or a disaster. There is no clever recovery afterwards \u2014 a bad mapping writes phone numbers into the name field across hundreds of records at once, and unpicking that costs vastly more than the import ever saved.</p><div class=\"callout-box critical\"><div class=\"cb-title\">Read three rows before you confirm</div><p>Once mapped, the preview shows you what the CRM is about to create. Read three or four rows properly \u2014 not glance, read. If those are right, the rest almost certainly are. If any one of them is wrong, fix the mapping and look again.</p></div><p>After confirming, imported people are contacts like any other. They can be given a source, routed to a vertical, put on a follow-up cadence and worked. An import nobody then works is not a lead list, it is just a bigger database.</p>"
          },
          {
            "t": "Smart lists \u2014 saving a search you keep running",
            "c": "<p>A smart list is a saved search. You build a filter once \u2014 everyone untouched in thirty days, everyone new this week, everyone with no active deal \u2014 give it a name, and it is waiting for you every day after that.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/f_smartlist.png\" style=\"width:100%;display:block\" alt=\"Building a smart list. Set the conditions once and name it.\"/><div style=\"position:absolute;left:31.94%;top:25.67%;width:36.11%;height:48.67%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">Building a smart list. Set the conditions once and name it.</figcaption></figure><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_savelist.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Save it and it appears in your lists from then on, always current \u2014 it re-runs the filter every time you open it rather than freezing a snapshot.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Save it and it appears in your lists from then on, always current \u2014 it re-runs the filter every time you open it rather than freezing a snapshot.</figcaption></figure><p>The value is repetition. Most people work the same three or four groups over and over. Saving them turns a two-minute filtering job into one click, which is the difference between doing it daily and doing it when you remember.</p>"
          },
          {
            "t": "Cross-search \u2014 when you only half remember",
            "c": "<p>Cross-search looks across contacts, properties and deals at the same time and returns anything that matches.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/xsearch.png\" style=\"width:100%;display:block\" alt=\"Cross-search. One box, everything in the system.\"/></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">Cross-search. One box, everything in the system.</figcaption></figure><p>Use it when you know a fragment but not where it lives \u2014 half a surname, a street name, a phone number you were given without context. It saves you guessing which screen the thing was on, which is the usual reason people give up and create a duplicate.</p>"
          },
          {
            "t": "Before you move on",
            "c": "<p>Quick recap of what you should now be able to do.</p><ul><li>What importing is for</li><li>The column mapping is the entire job</li><li>Smart lists \u2014 saving a search you keep running</li><li>Cross-search \u2014 when you only half remember</li></ul><p>If any of those are still unclear, scroll back up to that section before taking the knowledge check. You can return to this module at any time.</p>"
          }

      {
        "id": "crm_4",
        "title": "Properties",
        "desc": "What a property record is, why category drives everything, photos, and matching buyers",
        "minutes": 38,
        "roles": [
          "ALL"
        ],
        "video": "vid/crm_4.mp4",
        "lessons": [
          {
            "t": "What this module covers",
            "c": "<p>What a property record is, why category drives everything, photos, and matching buyers</p><p>Work through it in order \u2014 each part builds on the one before.</p><ul><li>What a property is in this system</li><li>Category \u2014 the choice that shapes the entire form</li><li>Wholesale and multifamily \u2014 the investor numbers</li><li>Owner finance, commercial and on-market</li><li>Photos, and why the cover shot matters more than the rest</li><li>Writing the listing</li><li>Matching a property to a buyer</li></ul><p>It should take about 38 minutes. There is a short knowledge check at the end.</p>"
          },
          {
            "t": "What a property is in this system",
            "c": "<p>A property is a house, held as its own record, separate from any deal about it.</p><p>That separation is deliberate and it is worth understanding. One house can pass through several deals across its life \u2014 we acquire it, we sell it on owner finance, the buyer refinances two years later. If the property only existed inside the first deal, its history would end when that deal closed. Kept separately, the address accumulates everything that ever happened to it.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/props.png\" style=\"width:100%;display:block\" alt=\"The property list. Everything we currently have, with price, status and category.\"/><div style=\"position:absolute;left:17.22%;top:17.89%;width:80.97%;height:8.67%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">The property list. Everything we currently have, with price, status and category.</figcaption></figure><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/property_detail.png\" style=\"width:100%;display:block\" alt=\"A property record: photos, the numbers, the status, and the deals attached to it.\"/><div style=\"position:absolute;left:15.42%;top:6.44%;width:84.58%;height:93.56%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">A property record: photos, the numbers, the status, and the deals attached to it.</figcaption></figure>"
          },
          {
            "t": "Category \u2014 the choice that shapes the entire form",
            "c": "<p>The first thing you pick when creating a property is its category, and it is not a label. It changes which money fields the form even shows you.</p><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_category.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Set this before anything else. Get it right and the form asks for exactly the numbers that matter; get it wrong and you will be staring at fields that make no sense for the deal in front of you.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Set this before anything else. Get it right and the form asks for exactly the numbers that matter; get it wrong and you will be staring at fields that make no sense for the deal in front of you.</figcaption></figure><p>The reason is that the numbers which matter are genuinely different depending on what we are doing with the house. A wholesale flip and an owner-finance sale have almost nothing in common financially, so asking for the same fields would force you to leave half of them blank and guess at the rest.</p><div class=\"callout-box info\"><div class=\"cb-title\">If the fields look wrong, the category is wrong</div><p>This is the most reliable diagnostic in the property form. Being asked for a rehab budget on an on-market listing means you picked the wrong category. Change it at the top and the form rebuilds itself around the right numbers.</p></div>"
          },
          {
            "t": "Wholesale and multifamily \u2014 the investor numbers",
            "c": "<p>For anything we are buying to sell on, the form asks for four figures, and together they are what the whole investor case is built from.</p><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_acq.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Acquisition price \u2014 what we are paying for it.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Acquisition price \u2014 what we are paying for it.</figcaption></figure><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_rehab.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Rehab budget \u2014 what it needs spending on it.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Rehab budget \u2014 what it needs spending on it.</figcaption></figure><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_arv.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"ARV, the after-repair value \u2014 what it is worth once the work is done.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">ARV, the after-repair value \u2014 what it is worth once the work is done.</figcaption></figure><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_buyerprice.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"And the price to the buyer \u2014 what we are selling it on for.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">And the price to the buyer \u2014 what we are selling it on for.</figcaption></figure><p>From those four the CRM works out the spread and what the deal looks like to an investor. Because they are calculated rather than typed, they are only as good as what you enter \u2014 a rough guess at ARV produces a confident-looking return that is simply wrong.</p><div class=\"callout-box info\"><div class=\"cb-title\">Acquisition price is deliberately walled off</div><p>What we paid is not shown to everyone in the company. It sits behind the investor side rather than on the general property record. That is a decision, not an accident, so do not go repeating it into fields that are visible more widely.</p></div>"
          },
          {
            "t": "Owner finance, commercial and on-market",
            "c": "<p><strong>Residential owner-finance</strong> asks for the sales price, the down payment, the monthly payment, the interest rate, and taxes and insurance. As you type, it shows you the taxes-and-insurance figure live, so you can see what the buyer's real monthly cost is rather than the headline number.</p><p><strong>Commercial and on-market</strong> ask for a sales price and a note, and nothing else. These are properties where we are not carrying the financing, so the extra fields would be noise.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/f_prop.png\" style=\"width:100%;display:block\" alt=\"The property form with category at the top. The money section below it changes completely depending on what you choose there.\"/><div style=\"position:absolute;left:31.94%;top:5.00%;width:36.11%;height:90.00%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">The property form with category at the top. The money section below it changes completely depending on what you choose there.</figcaption></figure>"
          },
          {
            "t": "Photos, and why the cover shot matters more than the rest",
            "c": "<p>You can upload as many photos as you like to a property, and then set one as the cover.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/f_photos.png\" style=\"width:100%;display:block\" alt=\"The photo manager. Upload, reorder, and choose which one leads.\"/></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">The photo manager. Upload, reorder, and choose which one leads.</figcaption></figure><p>The cover is the one that shows up everywhere else \u2014 in the inventory app, on any sheet you share with a buyer, in the listing feed. It is very often the only photo someone looks at before deciding whether to look at the rest. Choose the shot that sells the house, not the first one that came off the phone.</p><p>Order matters after that. Buyers scroll in sequence and make up their minds early, so lead with the exterior, then the kitchen and main living space, then bedrooms, then everything else. Photos can be dragged into order at any time.</p>"
          },
          {
            "t": "Writing the listing",
            "c": "<p>Each property carries a headline and a description, and those are what the public inventory and any shared material actually display.</p><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_headline.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"The headline and description. There is a button here that will draft both for you, in English and Spanish, from the details you have already entered.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">The headline and description. There is a button here that will draft both for you, in English and Spanish, from the details you have already entered.</figcaption></figure><p>The draft is a starting point rather than a finished listing. It is generally faster to edit something than to face a blank box, but read what it produces before it goes anywhere near a buyer.</p>"
          },
          {
            "t": "Matching a property to a buyer",
            "c": "<p>When a buyer tells you they want a specific property from our inventory, you record that against them rather than remembering it.</p><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_interestprop.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Pick the property they are interested in. From that point the interest is a fact in the system, not something living in your head or your notebook.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Pick the property they are interested in. From that point the interest is a fact in the system, not something living in your head or your notebook.</figcaption></figure><p>What this buys you is timing. When that property drops in price, or a deal on it falls through, or it comes back available, you can see immediately who was waiting on it and call them the same hour. Without the link, that moment passes and nobody acts on it \u2014 the information existed but was never connected to the person it mattered to.</p>"
          },
          {
            "t": "Quick reference",
            "c": "<p>The short version, for coming back to later.</p><ul><li>Category first \u2014 it decides which money fields you see.</li><li>Wholesale and multifamily: acquisition, rehab, ARV, price to buyer.</li><li>Owner finance: sales price, down, monthly, rate, taxes and insurance.</li><li>Commercial and on-market: sales price and a note, nothing more.</li><li>If the fields look wrong, the category is wrong. Change it at the top.</li><li>Acquisition price is deliberately walled off from general view.</li><li>The cover photo shows everywhere \u2014 pick the shot that sells.</li></ul><p>The video at the top of this module walks through all of it on screen.</p>"
          },
          {
            "t": "Before you move on",
            "c": "<p>Quick recap of what you should now be able to do.</p><ul><li>What a property is in this system</li><li>Category \u2014 the choice that shapes the entire form</li><li>Wholesale and multifamily \u2014 the investor numbers</li><li>Owner finance, commercial and on-market</li><li>Photos, and why the cover shot matters more than the rest</li><li>Writing the listing</li><li>Matching a property to a buyer</li></ul><p>If any of those are still unclear, scroll back up to that section before taking the knowledge check. You can return to this module at any time.</p>"
          }

      {
        "id": "crm_5",
        "title": "Deals \u2014 creating and working them",
        "desc": "What a deal is, what pipelines do, and how work moves through them",
        "minutes": 32,
        "roles": [
          "ALL"
        ],
        "video": "",
        "lessons": [
          {
            "t": "What this module covers",
            "c": "<p>What a deal is, what pipelines do, and how work moves through them</p><p>Work through it in order \u2014 each part builds on the one before.</p><ul><li>What a deal is</li><li>Pipeline first \u2014 it decides everything after it</li><li>What makes a deal useful to everyone else</li><li>How a pipeline works</li><li>H2M runs four pipelines, not one</li><li>The licensed side and transaction coordination</li></ul><p>It should take about 32 minutes. There is a short knowledge check at the end.</p>"
          },
          {
            "t": "What a deal is",
            "c": "<p>A deal is one piece of business with one person. A loan we are trying to write. A house someone is trying to buy. A file we are coordinating to closing.</p><p>It has a person attached, usually a property, a stage that says where it has got to, and a set of numbers. Everything the company measures \u2014 revenue, closings, commission, conversion \u2014 is counted from deals, which is why the state of your deals is effectively the state of your work.</p>"
          },
          {
            "t": "Pipeline first \u2014 it decides everything after it",
            "c": "<p>When you create a deal, the first choice is which business and pipeline it belongs to. Make that choice carefully, because it determines three separate things at once.</p><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_pipeline.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Choose this before anything else. It sets which fields you see, which stages exist for this deal, and how commission on it will be worked out.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Choose this before anything else. It sets which fields you see, which stages exist for this deal, and how commission on it will be worked out.</figcaption></figure><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_dealclient.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Then the person it belongs to. A deal without a client is not a deal, it is a note.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Then the person it belongs to. A deal without a client is not a deal, it is a note.</figcaption></figure><p>Getting it wrong is not fatal but it is annoying \u2014 you will be asked for numbers that do not apply, the stages will not describe your work, and the commission treatment will be the wrong one until somebody notices.</p>"
          },
          {
            "t": "What makes a deal useful to everyone else",
            "c": "<p>Three things, and only three, determine whether a deal is any use to the people around you.</p><ul><li>A <strong>person</strong> it belongs to, so anyone can see who to call.</li><li>A <strong>property</strong> if there is one, so the address and its numbers are attached rather than described in a note.</li><li>A <strong>stage that reflects reality</strong>, so the team knows what is actually happening without asking you.</li></ul><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/new_deal.png\" style=\"width:100%;display:block\" alt=\"Creating a deal. Business and pipeline at the top, then the client.\"/><div style=\"position:absolute;left:31.94%;top:19.78%;width:36.11%;height:60.44%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">Creating a deal. Business and pipeline at the top, then the client.</figcaption></figure><p>The third is the one people get wrong. A deal sitting in the wrong stage is worse than no deal at all, because everyone downstream is planning off it \u2014 forecasting, resourcing, chasing. A deal that says it is under contract when it is not sends people to do work that does not need doing.</p>"
          },
          {
            "t": "How a pipeline works",
            "c": "<p>A pipeline is your deals laid out by stage, left to right, in the order the work actually happens. Your job is to move things right.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/pipeline_asap.png\" style=\"width:100%;display:block\" alt=\"The ASAP pipeline. New lead, application, underwriting, term sheet, approved, funded.\"/><div style=\"position:absolute;left:17.22%;top:57.44%;width:80.97%;height:16.00%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">The ASAP pipeline. New lead, application, underwriting, term sheet, approved, funded.</figcaption></figure><p>Each column is a stage, and each stage means something specific about what has been done and what happens next. Moving a deal to the next column is how you tell the whole company that something has progressed \u2014 it is not administration, it is communication.</p><div class=\"callout-box info\"><div class=\"cb-title\">Stage honesty</div><p>Move a deal when the work has actually happened, not when you hope it will. Optimistic stages feel harmless and cause real problems: forecasts overstate, managers stop chasing things that need chasing, and the person covering for you next week believes something that is not true.</p></div>"
          },
          {
            "t": "H2M runs four pipelines, not one",
            "c": "<p>H2M is the most complex side of the business because it does four different things, and each gets its own pipeline with its own stages.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/pipeline_h2m.png\" style=\"width:100%;display:block\" alt=\"H2M acquisitions \u2014 finding and buying.\"/><div style=\"position:absolute;left:17.22%;top:66.67%;width:80.97%;height:21.89%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">H2M acquisitions \u2014 finding and buying.</figcaption></figure><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/pipeline_of.png\" style=\"width:100%;display:block\" alt=\"Owner finance \u2014 taking a buyer from pre-qualified through to servicing.\"/><div style=\"position:absolute;left:17.22%;top:42.56%;width:80.97%;height:12.89%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">Owner finance \u2014 taking a buyer from pre-qualified through to servicing.</figcaption></figure><p>Acquisitions is about buying. Wholesale is about assigning contracts. Dispositions is about selling what we hold. Owner finance is about carrying the paper ourselves. Those are genuinely different jobs with different steps, which is why one shared set of stages would fit none of them.</p>"
          },
          {
            "t": "The licensed side and transaction coordination",
            "c": "<p>The RL pipeline covers licensed work and splits into buy side and list side \u2014 representing someone buying, or representing someone selling.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/pipeline_rl.png\" style=\"width:100%;display:block\" alt=\"RL Team \u2014 buy side and list side.\"/><div style=\"position:absolute;left:17.22%;top:54.89%;width:80.97%;height:21.89%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">RL Team \u2014 buy side and list side.</figcaption></figure><p>Transaction coordination is different again. TC does not source business; it takes files that are already agreed and drives them to closing. Its pipeline runs from opened through to fee collected, and it is the one place where the measure of success is that nothing went wrong.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/tc.png\" style=\"width:100%;display:block\" alt=\"The TC dashboard, tracking files from open to fee collected.\"/><div style=\"position:absolute;left:17.22%;top:61.11%;width:80.97%;height:10.11%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">The TC dashboard, tracking files from open to fee collected.</figcaption></figure>"
          },
          {
            "t": "Before you move on",
            "c": "<p>Quick recap of what you should now be able to do.</p><ul><li>What a deal is</li><li>Pipeline first \u2014 it decides everything after it</li><li>What makes a deal useful to everyone else</li><li>How a pipeline works</li><li>H2M runs four pipelines, not one</li><li>The licensed side and transaction coordination</li></ul><p>If any of those are still unclear, scroll back up to that section before taking the knowledge check. You can return to this module at any time.</p>"
          }

        "id": "crm_6",
        "title": "The money on a deal",
        "desc": "The numbers a deal carries, closing it out, and why outcomes matter",
        "minutes": 24,
