        "video": "",
        "lessons": [
          {
            "t": "What this module covers",
            "c": "<p>The numbers a deal carries, closing it out, and why outcomes matter</p><p>Work through it in order \u2014 each part builds on the one before.</p><ul><li>What the deal numbers are</li><li>Why a guess is worse than a blank</li><li>Closing a deal captures what happened</li><li>Dead deals need closing too</li></ul><p>It should take about 24 minutes. There is a short knowledge check at the end.</p>"
          },
          {
            "t": "What the deal numbers are",
            "c": "<p>Every deal carries its own set of figures \u2014 what it is worth, what it costs, what it is expected to produce. They live on the deal rather than the property because they describe <em>this</em> transaction, not the house.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/f_numbers.png\" style=\"width:100%;display:block\" alt=\"The deal numbers screen.\"/><div style=\"position:absolute;left:31.94%;top:23.00%;width:36.11%;height:54.11%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">The deal numbers screen.</figcaption></figure><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_savenumbers.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Saving here is what pushes those figures out into everything else \u2014 the reports, the commission calculation and the investor maths all read from this.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Saving here is what pushes those figures out into everything else \u2014 the reports, the commission calculation and the investor maths all read from this.</figcaption></figure>"
          },
          {
            "t": "Why a guess is worse than a blank",
            "c": "<p>There is a strong temptation to put something in every box. Resist it.</p><p>A number you typed to avoid an empty field does not stay in that field. It becomes a line in a report, which becomes a total, which becomes a figure somebody quotes in a meeting and makes a decision on. Nobody who sees it downstream knows it was a placeholder.</p><p>A blank field is honest and visible \u2014 someone can see it needs filling. A wrong number is invisible and confident. If you do not know a figure yet, leave it.</p>"
          },
          {
            "t": "Closing a deal captures what happened",
            "c": "<p>Closing is not just flipping the status to closed. The close-out asks what the deal actually did \u2014 what it closed at, and why it ended the way it did.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/f_closeout.png\" style=\"width:100%;display:block\" alt=\"Closing a deal. The outcome is the point, not the status change.\"/><div style=\"position:absolute;left:31.94%;top:11.56%;width:36.11%;height:77.00%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">Closing a deal. The outcome is the point, not the status change.</figcaption></figure><p>That outcome is what makes a quarter's reporting mean anything. Without it you can say how many deals closed but nothing about what they were worth or what kind of business is working, which is the part anyone actually wants to know.</p>"
          },
          {
            "t": "Dead deals need closing too",
            "c": "<p>Deals die. That is normal and nobody is judged for it. What causes damage is deals that are abandoned rather than closed.</p><p>A deal left sitting in a stage forever does three things, all bad: it inflates the pipeline so forecasts are wrong, it keeps appearing in stalled-deal alerts and trains everyone to ignore them, and it teaches the company nothing.</p><p>A deal closed out honestly with a reason does the opposite. Enough lost deals with reasons attached is how you find out that a particular lead source never converts, or that deals die at the same stage every time \u2014 which is information worth having.</p>"
          },
          {
            "t": "Before you move on",
            "c": "<p>Quick recap of what you should now be able to do.</p><ul><li>What the deal numbers are</li><li>Why a guess is worse than a blank</li><li>Closing a deal captures what happened</li><li>Dead deals need closing too</li></ul><p>If any of those are still unclear, scroll back up to that section before taking the knowledge check. You can return to this module at any time.</p>"
          }
        ],

      {
        "id": "crm_7",
        "title": "Talking to people",
        "desc": "Calls, texts, logging, appointments and your calendar",
        "minutes": 28,
        "roles": [
          "ALL"
        ],
        "video": "",
        "lessons": [
          {
            "t": "What this module covers",
            "c": "<p>Calls, texts, logging, appointments and your calendar</p><p>Work through it in order \u2014 each part builds on the one before.</p><ul><li>Why communication lives in the CRM</li><li>Calling from inside the CRM</li><li>What makes a good call note</li><li>Texting</li><li>Logging what happened somewhere else</li><li>Appointments and your calendar</li></ul><p>It should take about 28 minutes. There is a short knowledge check at the end.</p>"
          },
          {
            "t": "Why communication lives in the CRM",
            "c": "<p>Every conversation you have with a client is part of the record of that relationship. Kept in the CRM, it is available to whoever needs it \u2014 you next month, a colleague covering for you, a manager reviewing a deal that went wrong.</p><p>Kept on your personal phone, it exists only in your memory, and the company effectively did not have that conversation.</p>"
          },
          {
            "t": "Calling from inside the CRM",
            "c": "<p>You can dial a contact directly from their record. The call goes out on the business line and the CRM logs it against that person automatically.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/f_call.png\" style=\"width:100%;display:block\" alt=\"The call screen.\"/><div style=\"position:absolute;left:31.94%;top:31.11%;width:36.11%;height:37.78%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">The call screen.</figcaption></figure><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_direction.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Whether you called them or they called you. It matters \u2014 inbound and outbound calls mean very different things about how warm someone is.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Whether you called them or they called you. It matters \u2014 inbound and outbound calls mean very different things about how warm someone is.</figcaption></figure><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_duration.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"How long the call ran. A two-minute call and a forty-minute call are different events, and the number tells the story without you writing it.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">How long the call ran. A two-minute call and a forty-minute call are different events, and the number tells the story without you writing it.</figcaption></figure><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_callnote.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"What was actually said. This is the field your future self and your colleagues will thank you for.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">What was actually said. This is the field your future self and your colleagues will thank you for.</figcaption></figure><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_logit.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Then log it, and it lands on the contact timeline immediately.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Then log it, and it lands on the contact timeline immediately.</figcaption></figure>"
          },
          {
            "t": "What makes a good call note",
            "c": "<p>A good note answers what someone picking this up cold would need: what did they say, what did you agree, and what happens next.</p><p>\"Spoke to client\" is not a note. \"Wants to move by September, has 30k down, waiting on wife to see the Cleveland house Saturday \u2014 call Monday\" is a note. It takes fifteen extra seconds and it is the difference between a file anyone can run and a file only you can run.</p>"
          },
          {
            "t": "Texting",
            "c": "<p>Texts sent from the CRM go out on the business line and thread onto the contact record.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/f_text.png\" style=\"width:100%;display:block\" alt=\"Sending a text from inside the CRM.\"/><div style=\"position:absolute;left:31.94%;top:31.11%;width:36.11%;height:37.78%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">Sending a text from inside the CRM.</figcaption></figure><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_textclient.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Choose who it goes to and the whole exchange lives on their record from then on.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Choose who it goes to and the whole exchange lives on their record from then on.</figcaption></figure><p>Because it threads, whoever opens that contact next sees the conversation rather than a gap. That is the practical reason to text from here rather than your own phone.</p>"
          },
          {
            "t": "Logging what happened somewhere else",
            "c": "<p>Not every conversation happens inside the CRM. You will speak to people in person, at a showing, or from your mobile when you are out.</p><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_touchclient.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Log it against them afterwards. It takes a few seconds.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Log it against them afterwards. It takes a few seconds.</figcaption></figure><p>This is not bureaucracy. The follow-up system reads your logged contact to work out who has gone quiet. A conversation you never logged is invisible to it \u2014 so the CRM will nag you about someone you spoke to yesterday, and, far worse, it will stay silent about someone you have genuinely forgotten because it has no way of knowing.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/comms.png\" style=\"width:100%;display:block\" alt=\"Communications \u2014 every call and message in one thread per person.\"/></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">Communications \u2014 every call and message in one thread per person.</figcaption></figure>"
          },
          {
            "t": "Appointments and your calendar",
            "c": "<p>Appointments are booked against a person, which is why they appear in two places at once: on that contact's record and in your calendar.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/new_appt.png\" style=\"width:100%;display:block\" alt=\"Booking an appointment.\"/><div style=\"position:absolute;left:31.94%;top:27.11%;width:36.11%;height:45.89%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">Booking an appointment.</figcaption></figure><p>That dual placement is the point. Looking at the client, you see what is booked with them. Looking at your week, you see everything across every deal you own.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/calendar.png\" style=\"width:100%;display:block\" alt=\"Your calendar \u2014 everything, across every deal.\"/></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">Your calendar \u2014 everything, across every deal.</figcaption></figure>"

        "lessons": [

            "t": "What this module covers",
            "c": "<p>Tasks, automatic follow-ups, and the targets you set for yourself</p><p>Work through it in order \u2014 each part builds on the one before.</p><ul><li>Tasks \u2014 the things you promised to do</li><li>Follow-ups \u2014 the ones you did not think of</li><li>Targets \u2014 measuring yourself against something</li><li>Team KPIs</li></ul><p>It should take about 24 minutes. There is a short knowledge check at the end.</p>"

          {

            "c": "<p>A task is a commitment with a date on it. Call them Tuesday. Chase the appraisal. Send the disclosure before Friday.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/f_task.png\" style=\"width:100%;display:block\" alt=\"Creating a task.\"/><div style=\"position:absolute;left:31.94%;top:31.11%;width:36.11%;height:37.78%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">Creating a task.</figcaption></figure><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_taskclient.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Tasks attach to a person, which is why they show on that contact as well as in your own list. Anyone opening that client can see what was promised.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Tasks attach to a person, which is why they show on that contact as well as in your own list. Anyone opening that client can see what was promised.</figcaption></figure><p>Once created, a task chases you. It appears in your list, and when it goes past its date it moves up into Needs attention on the dashboard where you cannot miss it.</p>"
          },
          {
            "t": "Follow-ups \u2014 the ones you did not think of",
            "c": "<p>Tasks cover what you remembered to promise. Follow-ups cover everything else.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/followups.png\" style=\"width:100%;display:block\" alt=\"The follow-up list, built automatically from time since last contact.\"/></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">The follow-up list, built automatically from time since last contact.</figcaption></figure><p>The CRM tracks how long it has been since anyone spoke to each person and surfaces the ones going quiet, without being asked and without you setting anything up. This is the system doing work on your behalf.</p><p>On a slow day, this is the list to work. It is built from real neglect rather than guesswork, so it is almost always more valuable than whatever you would have chosen to do instead.</p>"
          },
          {
            "t": "Targets \u2014 measuring yourself against something",
            "c": "<p>Targets are the numbers you are working toward: deals, closings, revenue, activity.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/f_targets.png\" style=\"width:100%;display:block\" alt=\"Setting your targets.\"/><div style=\"position:absolute;left:31.94%;top:29.56%;width:36.11%;height:40.89%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">Setting your targets.</figcaption></figure><figure style=\"margin:18px 0;background:#FAF8F5;border:1px solid #E6E1D9;border-radius:12px;padding:13px\"><img src=\"shots/zoom/z_savetargets.png\" style=\"width:100%;display:block;border-radius:8px\" alt=\"Save them and your dashboard starts scoring you against them instead of just reporting raw numbers.\"/><figcaption class=\"figcap\" style=\"font-size:.85rem;color:#4f4941;margin-top:11px;line-height:1.6\">Save them and your dashboard starts scoring you against them instead of just reporting raw numbers.</figcaption></figure><p>Without a target, the dashboard can only tell you what happened. With one, it can tell you whether what happened was enough \u2014 which is a different and more useful question.</p><div class=\"callout-box info\"><div class=\"cb-title\">Set them honestly</div><p>A target you did not really choose is a number you will quietly ignore within a fortnight. Set them slightly beyond comfortable \u2014 far enough that they change what you do, close enough that you believe them.</p></div>"

        "id": "crm_9",
        "title": "Money and visibility",
        "desc": "How you get paid, and who can see what \u2014 and why",
        "minutes": 26,
        "roles": [
          "ALL"
        ],
        "video": "",
        "lessons": [
          {
            "t": "What this module covers",
            "c": "<p>How you get paid, and who can see what \u2014 and why</p><p>Work through it in order \u2014 each part builds on the one before.</p><ul><li>Your commissions</li><li>Splits and flat fees</li><li>Reports</li><li>Who sees what</li></ul><p>It should take about 26 minutes. There is a short knowledge check at the end.</p>"
          },
          {
            "t": "Your commissions",
            "c": "<p>The commissions screen shows what you have earned, what is pending and what has been paid.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/f_commissions.png\" style=\"width:100%;display:block\" alt=\"Your commissions.\"/><div style=\"position:absolute;left:15.42%;top:6.44%;width:84.58%;height:93.56%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">Your commissions.</figcaption></figure><p>Pending means the deal has closed but the money has not yet come through and been paid out. Paid means it has. The distinction matters at month end, when the gap between the two is usually the thing people are asking about.</p>"
          },
          {
            "t": "Splits and flat fees",
            "c": "<p>Not every pipeline pays the same way. Some pay a percentage split of the commission earned; others pay a flat fee per deal regardless of size.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/commissions.png\" style=\"width:100%;display:block\" alt=\"Commission detail, showing how a deal was treated.\"/></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">Commission detail, showing how a deal was treated.</figcaption></figure><p>Which treatment applies comes from the pipeline the deal sits in. That is worth saying plainly because it is one more consequence of the choice you make when creating a deal \u2014 put a deal in the wrong pipeline and it will be paid under the wrong rules until someone catches it.</p>"
          },
          {
            "t": "Reports",
            "c": "<p>Reports are where individual deals stop being individual and become totals \u2014 by month, by vertical, by person.</p><figure style=\"margin:20px 0\"><div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid #E0DAD1;box-shadow:0 8px 26px rgba(20,27,38,.12);line-height:0\"><img src=\"shots/reports.png\" style=\"width:100%;display:block\" alt=\"Reports.\"/><div style=\"position:absolute;left:17.22%;top:42.22%;width:80.97%;height:42.11%;border:2.5px solid #B8972A;border-radius:8px;pointer-events:none\"></div></div><figcaption class=\"figcap\" style=\"font-size:.84rem;color:#6b645c;margin-top:10px;text-align:center;line-height:1.5\">Reports.</figcaption></figure><p>Everything in here is drawn from what people entered on deals. That is the closing argument for accurate stages and honest numbers: the reports the company steers by are only ever as good as the records underneath them.</p>"
          },
          {
            "t": "Who sees what",
            "c": "<p>Not everyone sees the same figures, and that is deliberate.</p><ul><li>An <strong>agent</strong> sees their own production \u2014 their deals, their closings, their commission.</li><li>A <strong>manager</strong> sees their team's sales volume, total closed and what their people are owed. That is what you need to run a team and to know what you are being paid on.</li><li><strong>Ownership</strong> sees company-wide profitability.</li></ul><div class=\"callout-box highlight\"><div class=\"cb-title\">This is design, not oversight</div><p>Managers are measured on production and volume, and those are the numbers they can influence. Company profitability includes costs a manager does not control and is not accountable for, so showing it would invite decisions based on a number that is not theirs to move. If you need a figure you cannot see, ask \u2014 the answer is usually that a different number is the right one for the decision in front of you.</p></div>"
          },
          {
            "t": "Before you move on",
            "c": "<p>Quick recap of what you should now be able to do.</p><ul><li>Your commissions</li><li>Splits and flat fees</li><li>Reports</li><li>Who sees what</li></ul><p>If any of those are still unclear, scroll back up to that section before taking the knowledge check. You can return to this module at any time.</p>"
          }
        ],

        "lessons": [
          {
            "t": "Why This Module Comes First",
            "c": "<p>Before you sell a single loan, a single home, or a single creative financing deal, you have to make one sale first: <strong>you have to sell yourself on you.</strong></p><p>Every top producer in every company shares one trait — total certainty. They believe in what they do, they believe in their company, and most of all they believe in themselves. That certainty is contagious. Clients feel it in the first ten seconds of a conversation, and it is the real reason they say yes.</p><div class=\"callout-box highlight\"><div class=\"cb-title\">The Foundation Rule</div><p>You will never consistently close anyone at a level higher than the level you have closed yourself. Sell yourself first, every single day.</p></div>"
          },
          {
            "t": "Commitment Comes Before Skill",
            "c": "<p>Most people get this backwards. They wait to feel confident before they commit. The truth is reversed: <strong>commitment creates the confidence.</strong></p><p>When you are fully committed — when quitting is off the table — your brain stops looking for exits and starts looking for solutions. You make the extra call. You follow up the fifth time. You learn the product cold. Skill is just commitment repeated over time.</p><p>Decide right now that you are <em>all in</em>. Not interested — committed. Interested people do what is convenient. Committed people do whatever it takes.</p>"
          },
          {
            "t": "You Are the Product",
            "c": "<p>Clients are not just buying a hard money loan or an creative financing home. They are buying <strong>you</strong> — your reliability, your knowledge, your follow-through, the feeling that you have got their back.</p><p>At Real Living, your name and reputation are the company's reputation. Every call, every text, every showing is a chance to make the most important sale: convincing the client that you are someone worth trusting with one of the biggest decisions of their life.</p><div class=\"callout-box info\"><div class=\"cb-title\">Make It Real</div><p>Ask yourself before every client interaction: <em>Would I buy from me right now?</em> If the answer is not an instant yes, fix that first.</p></div>"
          },
          {
            "t": "Average Is a Failing Formula",
            "c": "<p>Here is the hard truth the 10X mindset is built on: <strong>average effort produces below-average results</strong> in a competitive market. Average gets you ignored.</p><p>The goal is not to do a little more than the next person. The goal is to operate at a level so far beyond average that you are simply not in the same conversation as your competition. Ten times the activity. Ten times the follow-up. Ten times the certainty.</p><p>That is not exhausting — it is freeing. When you out-work and out-care everyone around you, you stop competing. You dominate.</p>"

        "lessons": [
          {
            "t": "The 10X Rule of Action",
            "c": "<p>There is one factor that separates the people who make it from the people who quit: <strong>the amount of action they take.</strong></p><p>Most people set a goal, then take just enough action to maybe reach it. The 10X rule says: set the goal, then take <em>ten times</em> the action you think it will require. Why? Because everything takes more effort than you expect, and massive action is the only thing that overcomes obstacles, slow weeks, and bad luck.</p><div class=\"callout-box highlight\"><div class=\"cb-title\">The 10X Standard</div><p>Whatever you think it takes to succeed — calls, follow-ups, posts, showings — multiply it by ten. Massive action is the great equalizer.</p></div>"
          },
          {
            "t": "Activity Is the One Thing You Control",
            "c": "<p>You cannot control whether a client says yes. You cannot control the market or interest rates. But you have total control over <strong>one thing: your activity.</strong></p><p>This is why we measure activity, not just results. Results follow activity with a delay. If you focus on hitting your daily numbers relentlessly, the closings take care of themselves. Obsess over the inputs and the outputs become inevitable.</p>"
          },
          {
            "t": "Your Daily Standards at Real Living",
            "c": "<p>The 10X mindset is not abstract here — it is built into your daily standards. For our marketers and agents, a complete day means:</p><ul><li><strong>25+ outbound calls</strong> every active day</li><li><strong>25+ CRM activities</strong> — texts, notes, follow-ups, appointments</li><li><strong>3-4 hours logged in the CRM</strong></li><li><strong>All available properties posted</strong> daily</li><li><strong>1-2 social/branding posts</strong> daily</li><li><strong>Zero red or overdue tasks</strong> at the end of the day</li></ul><div class=\"callout-box critical\"><div class=\"cb-title\">Non-Negotiable</div><p>These numbers are the floor, not the ceiling. Consistency over intensity — deals close from steady daily activity, not occasional bursts of effort.</p></div>"
          },
          {
            "t": "Persistence Beats Talent",
            "c": "<p>The data on sales is brutal and clear: most sales happen after multiple contacts, but most salespeople quit after one or two. The fortune is in the follow-up.</p><p>Talent is overrated. The most talented person who follows up twice will lose every time to the average person who follows up ten times. <strong>Persistence is a decision, not a gift</strong> — which means anyone can choose it, including you, starting today.</p><div class=\"callout-box info\"><div class=\"cb-title\">Make It Real</div><p>Every voicemail gets a follow-up text within 5 minutes. Every hot lead gets called before any cold lead. Every closed deal gets a referral ask. Follow-up is where the money lives.</p></div>"

        "lessons": [
          {
            "t": "Your Pipeline Is Your Paycheck",
            "c": "<p>Here is a law of sales you can take to the bank: <strong>your income is a direct reflection of your pipeline.</strong> A full pipeline means a full bank account. An empty pipeline means stress, desperation, and bad closes.</p><p>The number one reason salespeople fail is not skill — it is letting the pipeline run dry. They get busy with active deals, stop prospecting, close those deals, and then suddenly have nothing. Then they panic-prospect. The cycle of feast and famine destroys careers.</p><div class=\"callout-box highlight\"><div class=\"cb-title\">The Rule</div><p>Prospect every single day, even when you are busy — especially when you are busy. The best time to fill the pipeline is when you do not think you need to.</p></div>"
          },
          {
            "t": "Quality Contacts Over Random Activity",
            "c": "<p>Cardone's formula for income growth comes down to three levers: <strong>increase your number of quality contacts, improve your follow-up frequency, and sharpen your objection responses.</strong></p><p>Notice the first lever — <em>quality</em> contacts. Calling 100 random people is not prospecting. Reaching the right people — those who actually have a need, a timeline, and the ability to move — is what fills a real pipeline. One qualified lead is worth ten tire-kickers.</p>"
          },
          {
            "t": "Where Real Living Deals Come From",
            "c": "<p>Your prospecting channels depend on your role, but the principle is universal — show up consistently where your buyers and partners are:</p><ul><li><strong>Social media, daily</strong> — Facebook groups, Marketplace, Instagram. Brand yourself as the specialist.</li><li><strong>Referral partners</strong> — realtors, wholesalers, contractors, title companies who send you deals</li><li><strong>Past clients</strong> — the easiest deals you will ever get; a cared-for client refers their friends and family</li><li><strong>Community presence</strong> — investor meetups, events, organic reach</li></ul><div class=\"callout-box info\"><div class=\"cb-title\">Make It Real</div><p>Every lead, every contact, every referral source goes into the CRM the moment you get it. An unlogged lead is a lost lead.</p></div>"
          },
          {
            "t": "Become Known as the Go-To Person",
            "c": "<p>The highest form of prospecting is when deals come to <em>you</em>. That happens when you become known — the creative financing person in Kansas City, the agent who funds investors fast, the one who always picks up and always follows through.</p><p>This is built through consistency, not a single viral post. Show up every day, provide value, stay visible. Six months of consistent presence builds a personal brand that generates inbound deals for years.</p>"
          }
        ],

        "lessons": [
          {
            "t": "Objections Are Buying Signals",
            "c": "<p>Most salespeople fear objections. Top producers <strong>welcome</strong> them. Why? Because a person who is objecting is a person who is <em>engaged</em>. They are still in the conversation. They are telling you exactly what stands between them and yes.</p><p>The customer who says nothing and walks away gave you no chance. The customer who objects just handed you the roadmap to the close. Reframe it: an objection is not rejection — it is a request for more information.</p><div class=\"callout-box highlight\"><div class=\"cb-title\">The Mindset Shift</div><p>Stop hearing 'no.' Start hearing 'not yet — tell me more.' Objections are the path to the close, not a wall in front of it.</p></div>"
          },
          {
            "t": "Most Objections Are Predictable",
            "c": "<p>Here is the good news: in any given business, the same handful of objections come up over and over. Price. Timing. 'Let me think about it.' 'I need to talk to my spouse.' The interest rate. The down payment.</p><p>Because they are predictable, you can <strong>prepare for them in advance.</strong> Top producers are never surprised. They have heard every objection a hundred times and have a calm, practiced response ready. Preparation removes the fear and the fumbling.</p>"
          },
          {
            "t": "Acknowledge, Then Redirect to Value",
            "c": "<p>The structure for handling almost any objection is simple: <strong>acknowledge the concern honestly, then redirect to value.</strong></p><p>Never argue. Never get defensive. Agree that the concern is real, then shift the focus to what matters most — the outcome, the return, the dream of homeownership. For example, on price: <em>'I hear you, fees are a real cost, and I want to be upfront. What I'd focus on is the return on this deal — if it's strong, the cost is small next to the gain.'</em></p><div class=\"callout-box info\"><div class=\"cb-title\">Make It Real</div><p>Your role-specific tracks contain word-for-word scripts for the exact objections you'll hear at ASAP and H2M. Learn them cold. The full Script Books live in your Document Hub.</p></div>"
          },
          {
            "t": "Know Your Line — Escalate When Needed",
            "c": "<p>Confidence handling objections never means stepping outside your role. For our unlicensed marketers especially, some objections touch on terms, contracts, or approvals — and those get <strong>redirected to your manager</strong>, not answered on your own.</p><p>The most powerful objection response in those moments is simple and compliant: <em>'Great question — let me connect you with my manager who can walk you through that exactly.'</em> Knowing when to redirect is itself a sales skill. It protects you, the client, and the company.</p>"

          {
            "t": "You Have to Ask",
            "c": "<p>Here is the simplest, most-ignored truth in all of sales: <strong>you have to ask for the business.</strong></p><p>Studies show a huge percentage of salespeople never actually ask for the close. They present, they answer questions, they build rapport — and then they wait, hoping the customer closes themselves. They almost never do. The close is your job, not the customer's. If you do not ask, the answer is always no.</p><div class=\"callout-box highlight\"><div class=\"cb-title\">The Closing Law</div><p>The sale is made when you ask for it. No ask, no close. Asking is not pushy — it is your job and a service to a client who needs help deciding.</p></div>"
          },
          {
            "t": "Closing Is a Service, Not Pressure",
            "c": "<p>Many salespeople hesitate to close because they confuse closing with high-pressure manipulation. It is the opposite.</p><p>If you genuinely believe what you offer helps the client — and at Real Living, creative financing gives people a path to homeownership they could not get anywhere else — then helping them decide and move forward is a <strong>service</strong>. You are removing the friction of indecision. The most caring thing you can do for a qualified buyer is help them say yes to a better life.</p>"
          },
          {
            "t": "Always Be Closing Toward the Next Step",
            "c": "<p>Closing is not one dramatic moment at the end. It is a series of small commitments along the way. Every interaction should end by <strong>closing toward the next step.</strong></p><p>The next step might be: booking the appointment, getting the intake form completed, scheduling the showing, collecting the documents. You are always gently moving the deal forward to the next clear action. Never end a conversation without a defined next step and a commitment to it.</p><div class=\"callout-box info\"><div class=\"cb-title\">Make It Real</div><p>End every call the way top producers do: <em>'Here's what we'll do next…'</em> followed by a specific action and a time. Then confirm it in the CRM.</p></div>"
          },
          {
            "t": "Persistence Through the Close",
            "c": "<p>Remember the follow-up data — most deals close after multiple contacts, but most reps quit early. This applies at the close more than anywhere. A 'not right now' is not a 'no forever.'</p><p>Stay in the deal. Follow up with value, keep the relationship warm, and keep gently closing toward the next step. The salesperson who is still there, professionally and persistently, when the timing finally aligns is the one who gets paid. <strong>Be that person.</strong></p><div class=\"callout-box critical\"><div class=\"cb-title\">Bringing It All Together</div><p>Sell yourself. Take massive action. Keep the pipeline full. Welcome objections. Ask for the business. Do these five things relentlessly and you will not just survive in sales — you will dominate.</p></div>"
          }

        "title": "Your Agreements & Paperwork",
        "desc": "What you sign, what it means, and what stays true after you leave",
        "minutes": 12,
        "roles": [
          "ALL"
        ],
        "video": "",
        "lessons": [
          {
            "t": "What You Sign — and Why",
            "c": "<p>Everyone at Real Living signs the same core package. Here is what each piece does, in plain language.</p><p><strong>Team Member Agreement + your Addendum.</strong> This is the governing contract. The main agreement covers the relationship; your Addendum covers the terms specific to your business — ASAP Lending, Real Living | H2M, RL Licensed Team, or Virtual Assistant. Together they are the system of record. Any older standalone agent agreement has been retired.</p><p><strong>Confidentiality &amp; NDA.</strong> Protects client data, pricing, scripts, CRM data, and — most importantly — the names of our lending partners and capital sources.</p><p><strong>Non-Compete Agreement.</strong> <strong>This applies to everyone.</strong> It is deliberately narrow: 12 months, the Kansas City metro, and only work that directly competes with what we do. It does not stop you from working in real estate or lending generally.</p><p><strong>Photo, Video &amp; Media Release.</strong> Lets us use your name and likeness in company marketing.</p><p><strong>IRS Form W-9.</strong> <strong>Required for everyone.</strong> You are a 1099 independent contractor — nothing is withheld, and we need your W-9 on file to report your pay at year end.</p><p><strong>Payment &amp; Tax Setup.</strong> How you actually get paid.</p><p><strong>Onboarding Acknowledgement.</strong> The gate. Training does not start until your packet is complete and this is signed.</p>"
          },
          {
            "t": "You Are an Independent Contractor",
            "c": "<p>You run your own business on our platform. Nothing is withheld from your pay, so set money aside for taxes and work with a tax professional. There is no salary and no cap — what you earn follows what you produce.</p><p>Compensation is earned on completed, funded, or closed transactions, exactly as written in your Compensation Schedule or Addendum. Your compensation is confidential. Questions about your pay go to your manager — never to a teammate or a client.</p>"
          },
          {
            "t": "The Rules That Never Bend",
            "c": "<p><strong>Never disclose our lending partners or capital sources.</strong> Not to a client, not to a partner, not on social media. If you are asked, use the approved language and route it to your manager.</p><p><strong>Never delete CRM data.</strong> Records are marked, not erased. The data belongs to the company.</p><p><strong>Know your lane.</strong> If your role is unlicensed, you may not negotiate terms, prepare or explain contracts, give legal or financial advice, or accept funds. Hand those to a licensed team member or a manager.</p><p><strong>Ethics first.</strong> The standard is not \"is it allowed\" — it is \"is it right.\" Never misrepresent anything to a client, on an application, or to a partner. If you are ever asked to, refuse and escalate to leadership immediately.</p>"
          },
          {
            "t": "What Continues After You Leave",
            "c": "<p>If your engagement ends, some obligations survive it. You will return all company property and information, and your system access will be deactivated — your pipeline gets reassigned, never deleted.</p><p>These continue after you leave: <strong>confidentiality</strong> (indefinitely for trade secrets, including lender and capital-source names), <strong>non-solicitation and non-circumvention</strong>, and the <strong>non-compete</strong> for its 12-month term. If you signed the Non-Disparagement Agreement, that continues too.</p><p>None of this is meant to trap anyone. It exists so that the relationships, data, and training the company invested in stay with the company.</p>"
          }
        ]

        "content": "<h2>Welcome to ASAP Lending</h2><p>Welcome to the team. This module is your foundation — by the end of it you will understand exactly who ASAP Lending is, how we operate, and what your role as an agent is day to day.</p><p>ASAP Lending specializes in <strong>hard money and investment property loans</strong> — from quick fix-and-flip financing to long-term rental strategies. As an agent, your job is to match the right loan product to the right client, set accurate expectations, and guide them through the application process confidently.</p><div class=\"callout-box critical\"><div class=\"cb-title\">Important — About Our Role</div><p>ASAP Lending is a <strong>hard money broker</strong>. We work with a network of multiple private lenders and capital sources to find the best funding solution for each deal. The identities of our lending partners are <strong>strictly confidential and are never disclosed to clients</strong>. Your role is to qualify the client, gather required information, and bring the deal to upper management — who will determine the best lending path.</p></div><h2>What You Do as an Agent</h2><p>Your daily mission breaks down into a few clear responsibilities:</p><ul><li><strong>Find investors</strong> who need funding for investment properties</li><li><strong>Qualify the deal</strong> — gather the property, the numbers, and the borrower's exit strategy</li><li><strong>Present our programs</strong> accurately and set correct expectations</li><li><strong>Submit the deal</strong> to upper management / the Transaction Coordinating (TC) Team</li><li><strong>Maintain relationships</strong> with borrowers and referral partners for repeat business</li></ul><div class=\"callout-box highlight\"><div class=\"cb-title\">Your North Star</div><p>You are the relationship and the deal-finder. Upper management and the TC Team handle lender selection and underwriting. You never need to know which lender funds a deal — you need to know how to find good deals and present them well.</p></div><h2>The Tools You'll Use</h2><p>Everything you do runs through the <strong>Real Living CRM</strong>. Every lead, every call, every deal lives there. You'll also use the Deal Analyzer to run numbers and the Document Hub for all your forms, scripts, and rate sheets. We'll cover each of these as you progress.</p><div class=\"callout-box info\"><div class=\"cb-title\">What's Ahead in This Track</div><p>This ASAP Lending track will take you from total beginner to certified agent: our loan products, the client intake and submission process, deal analysis, scripts and objection handling, building your referral network, compliance, and a final certification exam. Let's get started.</p></div>",

        "desc": "What hard money is and why investors choose it",

        "video": "",
        "content": "<h2>Hard Money 101</h2><p>Before you can match a client to a product, you need to understand what hard money actually is and why a sophisticated investor would choose it over a traditional bank loan.</p><h2>What Is Hard Money?</h2><p>Hard money is a <strong>short-term, asset-based loan</strong> secured by real estate. Unlike a conventional mortgage that scrutinizes the borrower's income and credit, hard money underwriting focuses primarily on the <strong>property and the deal</strong>.</p><ul><li><strong>Asset-based</strong> — the property is the collateral</li><li><strong>Short-term</strong> — typically 6 to 24 months</li><li><strong>Fast</strong> — can fund in days, not weeks</li><li><strong>Investor-focused</strong> — non-owner occupied properties only</li></ul><div class=\"callout-box highlight\"><div class=\"cb-title\">Why Speed Wins</div><p>In a competitive market, an investor who can close in 7-10 days beats one waiting 45 days on a bank. Sellers accept lower offers for certainty and speed. That speed is what we sell.</p></div><h2>Who Uses Hard Money?</h2><p>Our borrowers are real estate investors: fix-and-flippers, the BRRRR crowd (Buy, Rehab, Rent, Refinance, Repeat), buy-and-hold landlords, wholesalers, and developers. They use hard money because traditional financing does not fit their timeline, their property condition, or their tax-optimized income profile.</p><h2>Core Concepts Every Agent Must Know</h2><ul><li><strong>ARV (After Repair Value)</strong> — what the property will be worth once renovated</li><li><strong>LTV / LTC</strong> — Loan-to-Value and Loan-to-Cost ratios that cap the loan size</li><li><strong>Rehab Holdback</strong> — renovation funds held by the lender and released in draws as work is completed</li><li><strong>Draw</strong> — a release of holdback funds after an inspection confirms completed work</li><li><strong>Points / Origination</strong> — upfront fee charged as a percentage of the loan</li><li><strong>Interest-Only</strong> — most hard money loans require only monthly interest, with principal due at payoff</li><li><strong>Exit Strategy</strong> — how the borrower repays: sell (flip) or refinance (hold)</li></ul><div class=\"callout-box critical\"><div class=\"cb-title\">The Exit Strategy Rule</div><p>Every deal must have a clear exit strategy. If a borrower cannot explain how they will pay off the loan — whether by selling or refinancing — it is not a fundable deal. This is the single most important qualifying question you will ask.</p></div><h2>Connecting It to Our Products</h2><p>ASAP offers a product for nearly every investor scenario. A flipper with great credit fits one program; an asset-rich investor with no credit fits another; a landlord refinancing a rental fits a DSCR loan. The next module covers our full product suite in detail.</p>",

        "desc": "Every ASAP loan program and who it fits",
        "minutes": 30,
        "roles": [
          "agent",
          "team_lead"

        "video": "",
        "content": "<h2>Our Loan Products</h2><p>ASAP Lending offers a full suite of investment property financing. Your job is not to memorize every rate — rates and terms are set by management and our lending partners at underwriting. Your job is to <strong>recognize which program fits which client</strong> so you can qualify them correctly and bring a clean deal to the TC Team.</p><h2>Fix &amp; Flip Programs</h2><h3>Program 1 — Standard (700+ Credit)</h3><p>Best for experienced investors with strong credit who want the most competitive hard money rates. LLC-friendly, exit-strategy focused, one month minimum interest, non-owner occupied only, rehab scope of work required.</p><h3>Program 2 — Flexible Credit</h3><p>Best for investors with lower or no established credit who are experienced with flips. Same core structure as Program 1 with more flexible credit requirements.</p><h3>Program 3 — Asset-Based (No Credit Required)</h3><p>Best for investors with strong assets but limited or poor credit. Fully asset-based underwriting — the deal carries the loan.</p><div class=\"callout-box highlight\"><div class=\"cb-title\">Quick Matching Guide — Fix &amp; Flip</div><p>Strong credit + exit strategy → <strong>Program 1</strong>. Experienced but weaker credit → <strong>Program 2</strong>. Strong assets, poor credit → <strong>Program 3</strong>. Run the numbers, confirm the down payment, bring it to management.</p></div><h2>Asset-Based Lending Program</h2><p>For investors who need flexible, asset-driven financing with a low barrier to entry and no traditional credit requirements. Fees are split between closing and exit for cash-flow flexibility. Non-owner occupied only.</p><h2>Transactional Funding</h2><p>For wholesalers and investors who need same-day or next-day funding for double-close transactions. Designed for <strong>acquisitions only</strong> — not for rehab. Ideal for wholesalers.</p><h2>DSCR Loans (Debt-Service Coverage Ratio)</h2><p>For buy-and-hold investors financing rentals based on the <strong>property's cash flow</strong> — not personal income. Investment properties only, portfolio-growth friendly. Prepayment penalties vary — confirm per deal.</p><h3>DSCR Refinance — via Elite Mortgage (Preferred Lender)</h3><p>For investors refinancing existing rentals using rental income to qualify. No personal income or employment verification. Ideal for pulling equity or lowering rates on rental holdings — BRRRR-friendly. Terms set by Elite Mortgage at underwriting.</p><div class=\"callout-box critical\"><div class=\"cb-title\">Elite Mortgage Protocol</div><p>For DSCR refinance, contact your team lead for the current Elite Mortgage submission portal and rate sheet. <strong>Always confirm current terms directly before quoting a client.</strong></p></div><h2>Portfolio &amp; Construction Loans</h2><p><strong>Portfolio Loans</strong> — for seasoned investors holding multiple properties who need scaled, custom financing across multiple properties. <strong>Construction Loans</strong> — for experienced investors and developers doing heavy rehab or ground-up new construction, with terms negotiated per project.</p><h2>Partner Lender: Kiavi</h2><p>ASAP agents can also broker deals through <strong>Kiavi</strong>, one of the nation's largest private lenders. For Kiavi products, ASAP acts as a third-party broker. Kiavi offers Fix &amp; Flip / Bridge loans, long-term DSCR rental loans, and ground-up construction. Contact your team lead for submission access and current rate sheets.</p><div class=\"callout-box info\"><div class=\"cb-title\">The Agent's Job, Simplified</div><p>You don't set terms or pick the final lender. You identify the client's situation, match it to the right <em>program type</em>, gather a complete profile, and submit. Management and the TC Team take it from there.</p></div>",

        "content": "<h2>Client Intake &amp; Qualification</h2><p>Every deal begins here. Rushing or skipping qualification is the number-one cause of dead deals and wasted time. Your goal: understand the deal before you pitch, then gather a complete profile.</p><h2>Ask Before You Pitch</h2><p>When an investor reaches out, resist the urge to explain every program. First, understand their deal with these core questions:</p><ul><li><strong>What's the property address?</strong> — confirms it's a real, specific deal</li><li><strong>What's the purchase price?</strong> — sets the loan baseline</li><li><strong>What's the estimated ARV?</strong> — determines the maximum loan</li><li><strong>How much rehab is needed, and what's the scope?</strong> — confirms the holdback</li><li><strong>What's your exit strategy — sell or refinance?</strong> — the make-or-break question</li><li><strong>How much do you have for a down payment?</strong> — confirms they can close</li><li><strong>What's your timeline?</strong> — sets expectations</li></ul><div class=\"callout-box highlight\"><div class=\"cb-title\">The Green Light Signal</div><p>If the client has a property in mind or under contract, a clear exit strategy, and available down payment funds — <strong>this is a real deal</strong>. Move immediately to gather documents and submit.</p></div><h2>Logging Into the CRM — Immediately</h2><p>The moment a lead expresses interest, they go into the <strong>Real Living CRM</strong>. Log their name, contact info, lead source, and notes. Schedule a follow-up reminder if they're not ready to move. An unlogged lead is a lost lead.</p><h2>Red Flags — When to Walk Away or Escalate</h2><div class=\"callout-box critical\"><div class=\"cb-title\">Do Not Proceed If…</div><ul><li>The client has <strong>no clear exit strategy</strong> — they can't explain how they'll repay</li><li>The client <strong>cannot demonstrate down payment funds</strong> — verify early, not at the last minute</li><li>The client wants you to <strong>misrepresent information</strong> on the application — this is fraud. Escalate to management and stop.</li></ul></div><h2>Gathering the Required Documents</h2><p>Once a deal is real, begin collecting the minimum documents: proof of down payment / funds to close, the property details and contract, the rehab scope of work, and borrower entity information (most deals are LLC-friendly). The complete checklist lives in your Document Hub and CRM.</p><h2>Submitting to the TC Team</h2><p>When the profile is complete, you submit the deal to the <strong>Transaction Coordinating (TC) Team</strong> via the CRM. They review, select the product and lender, and issue next steps. Your job is a clean, complete submission — incomplete files go to the back of the queue.</p><div class=\"callout-box info\"><div class=\"cb-title\">Remember the Confidentiality Line</div><p>If a client asks who the lender is, you never disclose it. Use your approved script (covered in the Scripts module) and escalate any questions you're unsure about to your manager.</p></div>",

        "content": "<h2>Deal Analysis — Running the Numbers</h2><p>Numbers are your credibility. An agent who can run a deal accurately in 90 seconds earns instant trust. ASAP provides the <strong>Deal Analyzer</strong> tool to do this precisely, but you must understand the math behind it.</p><h2>The Core Formulas</h2><div class=\"callout-box highlight\"><div class=\"cb-title\">Memorize These</div><p><strong>Max Loan</strong> = ARV × LTV (commonly up to 65% of ARV)<br><strong>Rehab Holdback</strong> = Loan Amount − Purchase Price<br><strong>Monthly Interest</strong> = Loan Amount × Rate ÷ 12<br><strong>Cash to Close</strong> = Down Payment + Origination/Points + Title &amp; Fees</p></div><h2>Worked Example — Kansas City Flip</h2><p>Let's run a real scenario. Property: 4 bed / 2.5 bath. Purchase price: $105,000. ARV: $225,000.</p><ul><li><strong>Max Loan</strong> at 65% of ARV: $225,000 × 0.65 = <strong>$146,250</strong></li><li><strong>Rehab Holdback</strong>: $146,250 − $105,000 = <strong>$41,250</strong></li><li><strong>Monthly Interest</strong> (example rate): the loan amount × the program rate ÷ 12</li><li><strong>Cash to Close</strong>: down payment + points + title and closing fees</li></ul><p>With these numbers in hand, the borrower knows exactly what they need to bring and what the deal costs to carry. That clarity closes deals.</p><div class=\"callout-box info\"><div class=\"cb-title\">Use the Deal Analyzer</div><p>The Real Living Deal Analyzer automates all of this — enter the purchase price, ARV, rate, and fees, and it produces the loan amount, holdback, monthly carry, cash to close, and even sell/refinance scenarios you can present to the client. Always run the deal before you submit.</p></div><h2>Evaluating Whether a Deal Works</h2><p>A deal works when the numbers support it. Check:</p><ul><li>Is the holdback enough to cover the actual rehab scope? (Loan − Purchase = Holdback)</li><li>Can the borrower carry the monthly interest until exit?</li><li>Does the ARV genuinely support the value at the program's LTV?</li><li>Is there enough margin in the deal for the borrower to profit?</li></ul><div class=\"callout-box critical\"><div class=\"cb-title\">The Negative Holdback Trap</div><p>If the purchase price is higher than the max loan amount, the holdback is negative — the deal does not work as structured. Be honest with the borrower: the deal needs a lower purchase price or stronger ARV support. Borrowers respect honesty and come back with better deals.</p></div>",

        "content": "<h2>Scripts &amp; Objection Handling</h2><p>How you communicate determines whether a borrower trusts you. These scripts are proven and align with company policy — especially around lender confidentiality.</p><h2>The Opening Call</h2><div class=\"script-block\"><em>\"Thanks for reaching out to ASAP Lending. Before I walk you through anything, I want to make sure we're the right fit for your deal. Tell me a little about the property you're looking at.\"</em></div><p>Then listen. Qualify the deal before you pitch.</p><h2>Presenting the Program</h2><div class=\"script-block\"><em>\"Based on what you've told me, we lend up to a percentage of the after-repair value. The difference between what we lend and your purchase price becomes your rehab holdback, released as the work gets done. We're investor-focused, we move fast, and we can typically fund in days.\"</em></div><h2>The Lender Confidentiality Script — Know This Cold</h2><div class=\"callout-box critical\"><div class=\"cb-title\">When a Client Asks 'Who Is Your Lender?'</div><div class=\"script-block\" style=\"margin-top:8px\"><em>\"We work with a network of private capital partners. The funding source itself stays confidential — but what I can promise you is speed, consistency, and certainty of close. What matters to you is that the money is there when you need it.\"</em></div><p style=\"margin-top:10px\">Never name a lender. Never hint. If pressed further, repeat the script and escalate to your manager.</p></div><h2>Objection Handling</h2><h3>\"Your rates/fees are too high.\"</h3><div class=\"script-block\"><em>\"I understand — fees are a real cost and I want to be upfront. Our structure is set and there are no surprises at closing; everything is disclosed upfront. What I'd focus on is the return on the deal — if it's strong, the financing cost is a small part of a much bigger gain.\"</em></div><h3>\"I need more than your standard LTV.\"</h3><div class=\"script-block\"><em>\"Our standard program protects both of us — it keeps real equity in the deal. If you have strong comps supporting a higher ARV, let's run the numbers again and see what's possible.\"</em></div><h3>\"Can I pay it off early?\"</h3><div class=\"script-block\"><em>\"Our Fix &amp; Flip programs offer prepayment flexibility, usually with a one-month minimum interest. DSCR and Portfolio loans can carry prepayment terms that vary, so I'll confirm the specifics for your deal.\"</em></div><h2>Closing the Intake</h2><div class=\"script-block\"><em>\"Here's what I'd like to do — let me get your information into our system and collect a few documents. Once I have a complete picture, I'll bring it to our team and we'll get you next steps quickly. Sound good?\"</em></div><div class=\"callout-box info\"><div class=\"cb-title\">Scripts Are Tested — Use Them</div><p>These aren't suggestions. They're refined from real deals and keep you compliant. The full Agent Script Book is in your Document Hub.</p></div>",

        "content": "<h2>Building Your Pipeline</h2><p>Your pipeline is your business. A full pipeline means closed deals and a growing commission rate. Top agents don't chase one-off borrowers — they build referral systems that send deals to them.</p><h2>Your Best Referral Sources</h2><h3>Real Estate Agents &amp; Realtors</h3><p>Licensed agents constantly meet investors who need fast funding. One strong realtor relationship can produce many deals a year. Position yourself as their go-to: <em>\"I can fund your investor clients fast — send them my way.\"</em></p><h3>Wholesalers</h3><p>Wholesalers find deals and need buyers who can close quickly — exactly our borrowers. When a wholesaler sends you a buyer who funds with ASAP, everyone wins. Wholesalers also use our Transactional Funding product themselves.</p><h3>Real Estate Investor (REI) Clubs &amp; Meetups</h3><p>Every market has investor meetups. Show up consistently, become a familiar face, and be known as the lending resource for that community.</p><h3>Contractors &amp; Title Companies</h3><p>Contractors work with investors daily and know who's buying. Title officers see every deal close. Both are excellent, often-overlooked referral sources.</p><div class=\"callout-box highlight\"><div class=\"cb-title\">The First-90-Days Goal</div><p>Per your training schedule, by Days 31-60 you should establish at least two referral relationships — one realtor and one wholesaler minimum — and begin asking for referrals from every warm contact and closed deal.</p></div><h2>The Referral Conversation</h2><div class=\"script-block\"><em>\"I work with ASAP Lending — we fund real estate investors who need to close fast. If you ever have a client who needs quick, investor-focused financing, I'd love to be the resource you send them to. Can I leave you my info?\"</em></div><h2>Track Everything in the CRM</h2><p>Log every referral source in the Real Living CRM: who they are, when you connected, your last follow-up, and deals they've referred. Consistent follow-up is what turns a contact into a pipeline.</p><div class=\"callout-box info\"><div class=\"cb-title\">Consistency Compounds</div><p>Agents who work referral relationships consistently for six months build pipelines that generate deals — and commission — for years. This is the difference between a job and a business.</p></div>",

        "desc": "The rules that protect you, the client, and the company",

          "team_lead"
        ],
        "video": "",
        "content": "<h2>Compliance &amp; Code of Conduct</h2><p>Compliance is how we stay in business. These rules are non-negotiable and apply on every call, every email, every deal. Violations — especially around lender disclosure and misrepresentation — can mean immediate termination and legal liability.</p><h2>The Non-Negotiables</h2><div class=\"callout-box critical\"><div class=\"cb-title\">Firm Company Policy</div><ul><li><strong>Never disclose</strong> the names of our lending partners, capital sources, or hard money lenders to any client or third party</li><li><strong>Never guarantee approval</strong> — only underwriting approves a deal</li><li><strong>Never misrepresent</strong> rates, fees, or terms — everything is disclosed upfront, no surprises</li><li><strong>Never participate in fraud</strong> — if a client wants false information on an application, refuse and escalate</li><li><strong>Never accept funds</strong> directly from a client — all funds go through proper channels</li></ul></div><h2>Your Independent Contractor Status</h2><p>You are an <strong>independent contractor</strong>, not an employee. This means:</p><ul><li>You are solely responsible for your own taxes, withholdings, and government obligations</li><li>You receive no employee benefits — no health insurance, retirement, workers' comp, or paid time off</li><li>You may not represent yourself as an ASAP employee or make commitments on the company's behalf</li><li>Your Agent Agreement governs the relationship — know it</li></ul><h2>Confidentiality of Company Information</h2><p>Commission structures, financial performance data, internal reporting, lender relationships, and the TC Team's internal notes are all confidential. This information stays inside the company.</p><h2>Compensation — How You're Paid</h2><div class=\"callout-box highlight\"><div class=\"cb-title\">Your Commission Structure</div><p><strong>Base commission:</strong> $250 minimum to $500 maximum per closed loan, based on the property's sales price at closing.<br><strong>Escalator:</strong> For every 2 loans you close, your per-loan commission increases by $100 — permanently.<br><strong>Payment timing:</strong> Commissions are paid 10 to 15 days after the confirmed closing date. The TC Team notifies you of the exact date.<br><strong>Important:</strong> No commission is earned on deals that don't fund and close. Partial deals don't qualify.</p></div><h2>When in Doubt, Escalate</h2><div class=\"callout-box info\"><div class=\"cb-title\">The Simple Rule</div><p>Never guess on a compliance matter. If a client asks something you're unsure about — about terms, approvals, or anything legal — escalate to your manager immediately. It's always the right call.</p></div>",

        "content": "<h2>Your Role &amp; The Licensing Line</h2><p>This is the most important compliance module in your track. As an unlicensed marketer, there is a clear legal line you must never cross. Knowing exactly where it is protects you, the buyer, and the company.</p><div class=\"callout-box critical\"><div class=\"cb-title\">The Core Rule</div><p>Your role <strong>ends where licensed real estate begins</strong>. Never cross that line. When in doubt, refer to your manager immediately.</p></div><h2>What You CAN Do</h2><ul><li>Post H2M properties daily on Facebook groups, public pages, and approved social channels</li><li>Respond to inbound inquiries using approved scripts and language</li><li>Qualify leads by asking approved questions about needs, wants, timeline, and down payment availability</li><li>Schedule appointments and walk-ins using the CRM calendar</li><li>Attend client intake meetings <strong>alongside the Sales Manager</strong> to fill out the intake sheet</li><li>Show properties and walk clients through homes to help them identify what fits</li><li>Collect required documents from clients prior to closing</li><li>Communicate timelines and expectations throughout the process</li><li>Log all leads, calls, and activities in the CRM the same day</li></ul><h2>What You CANNOT Do</h2><div class=\"callout-box critical\"><div class=\"cb-title\">Never Do These</div><ul><li>Negotiate price, terms, monthly payments, down payments, or interest rates</li><li>Discuss, explain, or recommend specific contract terms, financing structures, or legal documents</li><li>Represent yourself as a real estate agent, broker, or licensed professional</li><li>Answer legal, tax, or detailed financial questions about a property or transaction</li><li>Accept deposits, earnest money, or any funds from a buyer or seller</li><li>Draft, present, or explain contracts, disclosures, or transactional documents</li><li>Make promises about approval, pricing, or terms without manager confirmation</li><li>Contact sellers, title companies, or lenders directly without manager authorization</li></ul></div><h2>The Golden Script</h2><div class=\"callout-box highlight\"><div class=\"cb-title\">When a Client Asks About Price, Terms, Contracts, or Approvals</div><div class=\"script-block\" style=\"margin-top:8px\"><em>\"Great question — let me connect you with my manager who can walk you through that exactly.\"</em></div><p style=\"margin-top:10px\">This single sentence keeps you compliant in every gray-area situation. Memorize it. Use it without hesitation.</p></div><div class=\"callout-box info\"><div class=\"cb-title\">Why This Matters</div><p>Practicing real estate without a license is illegal and puts the entire company at risk. The line isn't a limitation on your earning — it's what makes the whole model work. You generate the leads and relationships; the licensed team closes the transaction. Both roles win on every deal.</p></div>",

        "content": "<h2>Creative Financing Deep Dive</h2><p>To find and serve buyers well, you need to understand the product — even though the Sales Manager handles all the contract details. Confident, accurate general knowledge builds trust.</p><h2>The Structure</h2><p>H2M sells on a <strong>Contract for Deed (CFD)</strong>, also called a land contract or creative financing agreement. Here's the general structure:</p><ul><li><strong>The seller/H2M holds legal title</strong> until the contract is paid off or the buyer refinances</li><li><strong>The buyer gets equitable title</strong> — the right to live in, use, and benefit from the home — from day one</li><li><strong>The buyer pays a down payment</strong> upfront</li><li><strong>Monthly payments</strong> go directly to the seller/H2M — including taxes and insurance</li><li><strong>30-year amortization</strong> is typical</li><li>When the buyer refinances into a traditional loan, they take full legal title</li></ul><div class=\"callout-box highlight\"><div class=\"cb-title\">This Is NOT Renting</div><p>A buyer on creative financing has real ownership rights from day one. They can make the home their own and build equity. They simply don't hold the deed until the contract is satisfied. This is a genuine path to homeownership.</p></div><h2>Who Creative Financing Serves</h2><p>Our buyers are real people traditional banks turn away:</p><ul><li>Self-employed with hard-to-document income</li><li>Buyers using an <strong>ITIN</strong> instead of an SSN</li><li>Low or no credit history</li><li>Recent financial hardship</li><li>Anyone who wants to skip the slow 30-60 day bank process</li></ul><div class=\"callout-box info\"><div class=\"cb-title\">The Buyer's Path to Full Ownership</div><p>Most buyers plan to refinance within a few years. They close with H2M, make consistent on-time payments, build their credit and payment history, then refinance into a conventional mortgage and take the deed. Your role is to help them start that journey.</p></div><h2>Remember Your Line</h2><div class=\"callout-box critical\"><div class=\"cb-title\">General Knowledge vs. Specific Terms</div><p>You can explain how creative financing works <strong>in general</strong>. You cannot quote a specific buyer's interest rate, monthly payment, or contract terms — that's the Sales Manager's job. Explain the concept; refer the specifics.</p></div>",

        "content": "<h2>The H2M 8-Phase Process</h2><p>Every deal at H2M follows the same eight phases. Know this cold — your role is clearly defined at each one.</p><h2>Phase 1 — Lead Generation &amp; Property Marketing</h2><p><strong>Your responsibility.</strong> H2M provides the properties; you market them every single day. Post every available property on Facebook groups, swap &amp; shop pages, and marketplace listings — daily. Respond to every inquiry the same business day. Brand yourself as the off-market creative financing specialist in KC.</p><div class=\"callout-box highlight\"><div class=\"cb-title\">Best Practice</div><p>The top performers brand themselves as 'the creative financing person' in Kansas City. The more consistently you post and engage, the more inbound interest comes to you organically.</p></div><h2>Phase 2 — Lead Qualification &amp; CRM Entry</h2><p><strong>Your responsibility.</strong> When someone expresses interest, qualify them and enter them in the CRM immediately. Ask: Are you buying for yourself or as an investment? Creative financing, lease option, or cash? What area? Target monthly payment? Down payment available? Timeline? Renting or owning now?</p><div class=\"callout-box critical\"><div class=\"cb-title\">The CRM Rule</div><p>Enter every lead the moment they express interest. Log name, contact, source, and notes. Schedule a follow-up if they're not ready. <strong>An unlogged lead is a lost lead.</strong></p></div><h2>Phase 3 — Schedule the Appointment</h2><p><strong>Your responsibility.</strong> Schedule qualified leads into the CRM calendar. Confirm by text and call 24 hours before. Notify your Sales Manager of all appointments so they can attend.</p><h2>Phase 4 — Client Intake Meeting</h2><p><strong>You + the Sales Manager together.</strong> You both sit with the client and complete the Client Intake Sheet — full name, contact, marital status, type of purchase, desired location and needs, down payment, timeline, and more. This gives H2M a complete picture to match them to the right property.</p><h2>Phase 5 — Property Matching &amp; Showings</h2><p><strong>Your responsibility (with manager oversight).</strong> Match the buyer to suitable properties and show them homes. Know the buyer's intake notes before every showing.</p><h2>Phase 6 — Letter of Intent &amp; Terms</h2><p><strong>Sales Manager's responsibility.</strong> The Sales Manager prepares the Letter of Intent and handles all terms. You support by communicating timelines — but never negotiate or explain specific terms.</p><h2>Phase 7 — Document Collection &amp; Closing Prep</h2><p><strong>Your responsibility (collection) + Sales Manager (coordination).</strong> Collect required documents from the buyer. The Sales Manager coordinates the title company and closing.</p><h2>Phase 8 — Closing &amp; Post-Close Follow-Up</h2><p><strong>Sales Manager closes; you follow up.</strong> The buyer brings their down payment and signs at closing. Afterward, you follow up to ensure they're settled and to generate referrals.</p><div class=\"callout-box info\"><div class=\"cb-title\">Your Best Source of New Buyers</div><p>A buyer who feels cared for after closing refers their friends and family. The post-close follow-up isn't optional — it's how top marketers build a self-sustaining pipeline.</p></div>",

        "content": "<h2>The CRM &amp; Your Daily Standards</h2><p>Everything you do runs through the <strong>Real Living CRM</strong>, and your success is built on consistent daily activity. This module covers the daily standards that separate top performers from everyone else.</p><div class=\"callout-box critical\"><div class=\"cb-title\">Core Daily Standards — Every Active Day</div><p><strong>25+ outbound calls</strong> • <strong>25+ CRM activities</strong> (texts, notes, follow-ups, appointments) • <strong>3-4 hours logged in the CRM</strong> • <strong>All available properties posted</strong> • <strong>1-2 social/branding posts</strong> • <strong>Zero red/overdue tasks at end of day</strong></p></div><h2>Your Day, Block by Block</h2><h3>Morning Block — 9:00 to 11:00 AM</h3><p>Log into the CRM. Review alerts, new inventory, and pending tasks. <strong>Clear all red/overdue tasks before any new outbound.</strong> Post all new properties to your Facebook groups. Post 1-2 creative financing / educational content pieces. Post to Instagram.</p><h3>Mid-Morning Block — 11:00 AM to 1:00 PM</h3><p>Your <strong>primary outbound calling window</strong>. Protect this time — no distractions, no admin. Call hot leads and follow-ups first, then work your aged lead batch. Log every call. Text every voicemail within 5 minutes.</p><h3>Afternoon Block — 1:00 to 3:00 PM</h3><p>Appointments, follow-up scheduling, file maintenance, and CRM clean-up before showings begin.</p><h3>Showings Block — 3:00 to 6:30 PM</h3><p>Showings happen <strong>every day</strong>, not just weekends. Be available and prepared. Know your client's intake notes before you pull up to the property.</p><h2>Weekly Standards</h2><ul><li><strong>5 appointments per week</strong> minimum</li><li><strong>3 office days per week</strong> minimum</li><li><strong>2 new Facebook groups</strong> added per week minimum</li><li>Showings available 3:00-6:30 PM daily</li></ul><div class=\"callout-box highlight\"><div class=\"cb-title\">The KPI Self-Check</div><p>Before you log off each day: 25 calls + 25 activities + 3-4 hours in CRM + properties posted + 1-2 social posts + zero red tasks = a complete day. Anything less is below standard. Your manager reviews your CRM activity log against this benchmark.</p></div><h2>Why This Discipline Matters</h2><div class=\"callout-box info\"><div class=\"cb-title\">Consistency Over Intensity</div><p>Deals close from consistent daily activity — not occasional bursts of effort. If you're not hitting 25 calls and 25 activities daily, your pipeline won't sustain itself. The marketers who win are the ones who show up and hit their numbers every single day.</p></div>",
